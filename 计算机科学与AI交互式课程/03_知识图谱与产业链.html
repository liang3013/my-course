<h3>Cypher查询：图谱的语言</h3>

<pre><code>// Neo4j Cypher：找到宁德时代的所有上游供应商
MATCH (ningde:Company {name: '宁德时代'})<-[r:SUPPLIES_TO]-(supplier)

let completedLessons = new Set(JSON.parse(localStorage.getItem('csai_kg_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('csai_kg_quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);

function save() {
  localStorage.setItem('csai_kg_completed', JSON.stringify([...completedLessons]));
  localStorage.setItem('csai_kg_quiz_results', JSON.stringify(quizResults));
}
function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  card.querySelectorAll('.quiz-option').forEach((o, i) => { o.style.pointerEvents = 'none'; if (i === correctChoice) o.classList.add('correct'); else o.classList.add('wrong'); });
  const r = card.querySelector('.quiz-result'); if (r) r.classList.add('show');
}
function calcProgress() {
  let total = 0; modules.forEach(m => total += m.lessons.length); total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) if (quizResults['final_' + i] !== undefined) done++;
  return Math.round(done / total * 100);
}
function updateUI() {
  document.getElementById('progressPct').textContent = calcProgress() + '%';
  document.getElementById('progressBar').style.width = calcProgress() + '%';
  let html = '';
  modules.forEach(mod => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach(l => {
      const done = completedLessons.has(l.id), active = currentSection === l.id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + l.id + '\')"><span class="check">' + (done ? '✅' : l.emoji || '📖') + '</span>' + l.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')"><span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  document.getElementById('navContainer').innerHTML = html;
}
function navigateTo(id) { currentSection = id; updateUI(); renderContent(id); window.scrollTo(0, 0); }
function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }
  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++)
    for (let li = 0; li < modules[mi].lessons.length; li++)
      if (modules[mi].lessons[li].id === id) { lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break; }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }
  let html = '';
  if (lesson.quiz) {
    const saved = quizResults[id] || [];
    html += '<div class="lesson-card"><h2>' + lesson.emoji + ' ' + lesson.title + '</h2><div class="meta">共' + lesson.quiz.questions.length + '题</div>';
    lesson.quiz.questions.forEach((q, qi) => {
      const ua = saved[qi], answered = ua !== undefined, ok = answered && ua === q.correct;
      html += '<div class="quiz-card"><h3>📝 第' + (qi + 1) + '题</h3><div class="quiz-question">' + q.q + '</div>';
      q.options.forEach((o, oi) => {
        let cls = 'quiz-option'; if (answered && oi === q.correct) cls += ' correct'; if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
        html += '<button class="' + cls + '" onclick="answerQuiz(\'' + id + '\',' + qi + ',' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + o + '</button>';
      });
      if (answered) html += '<div class="quiz-result show ' + (ok ? 'pass' : 'fail') + '"><strong>' + (ok ? '✅ 正确！' : '❌ 不太对') + '</strong><p>' + (q.explain || '') + '</p></div>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="lesson-card"><h2>' + lesson.emoji + ' ' + lesson.title + '</h2><div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>' + lesson.content + '</div>';
    markComplete(id);
  }
  html += '<div class="nav-btns">';
  let prev = null; if (lesIndex > 0) prev = modules[modIndex].lessons[lesIndex - 1].id; else if (modIndex > 0) prev = modules[modIndex - 1].lessons[modules[modIndex - 1].lessons.length - 1].id;
  html += prev ? '<button class="btn btn-secondary" onclick="navigateTo(\'' + prev + '\')">⬅ 上一节</button>' : '<div></div>';
  let next = null; if (lesIndex < modules[modIndex].lessons.length - 1) next = modules[modIndex].lessons[lesIndex + 1].id; else if (modIndex < modules.length - 1) next = modules[modIndex + 1].lessons[0].id;
  html += next ? '<button class="btn btn-primary" onclick="navigateTo(\'' + next + '\')">下一节 ➡</button>' : '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>'; main.innerHTML = html;
}
function answerQuiz(lessonId, qi, choice) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = choice; save();
  const l = modules.flatMap(m => m.lessons).find(x => x.id === lessonId);
  if (l && l.quiz && quizResults[lessonId].filter(v => v !== undefined).length === l.quiz.questions.length) markComplete(lessonId);
  renderContent(lessonId);
}
function markComplete(id) { if (!completedLessons.has(id)) { completedLessons.add(id); save();  } }
function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">共' + finalExam.questions.length + '题</div>';
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi], answered = ua !== undefined, ok = answered && ua === q.correct;
    html += '<div class="quiz-card"><h3>📝 第' + (qi + 1) + '题</h3><div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((o, oi) => {
      let cls = 'quiz-option'; if (answered && oi === q.correct) cls += ' correct'; if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFE(' + qi + ',' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + o + '</button>';
    });
    html += '</div>';
  });
  if (finalExamDone) {
    const s = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length, t = finalExam.questions.length, p = s / t >= 0.6;
    html += '<div class="lesson-card" style="text-align:center"><h2>' + (p ? '🎉 恭喜通过！' : '📚 还需要再练练') + '</h2><p style="font-size:2em">' + s + ' / ' + t + '</p><p>' + (p ? '你已经掌握了知识图谱在量化中的核心应用！' : '建议复习后再试。') + '</p></div>';
  }
  html += '</div>'; main.innerHTML = html;
}
function answerFE(qi, choice) { quizResults['final_' + qi] = choice; if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true; save(); renderFinalExam(document.getElementById('mainContent')); }
function resetAll() { localStorage.removeItem('csai_kg_completed'); localStorage.removeItem('csai_kg_quiz_results'); location.reload(); }
(function init() { currentSection = 'zero-kg'; updateUI(); renderContent('zero-kg'); })();
</script>
