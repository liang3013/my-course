<h3>假设你开了一家餐厅</h3>

<div class="analogy">

  <p><span class="hl">如果买来的菜是烂的，后面的厨师再厉害也做不出好菜。量化交易中，数据就是你的食材。</span>这一课教你当好采购员、清洁工和仓库管理员——三个角色，一个都少不了。</p>

<div class="analogy">

  <p><span class="hl">数据存储的道理完全一样。</span>几千只股票、几十年的历史、成百上千个指标——没有分类和索引，你永远找不到需要的数据。</p>
</div>

<div class="deep">
  <div class="label">🍳 三个故事 = 数据工程的全部</div>

<h3>数据不是凭空出现的——它来自具体的"供货商"</h3>

<div class="analogy">
  <div class="label">🏗️ 五种菜市场</div>
  <p>你开餐厅需要食材。你不会只去一个地方买——有的去农贸市场（新鲜但需要自己挑）、有的打电话让供应商送货（方便但量受限制）、有的从批发市场整车拉（便宜但需要自己用车运）。</p>
  <p>量化数据也一样。不同的数据来源就像不同的"菜市场"：</p>
  <table>
    <tr><th>数据来源</th><th>像什么</th><th>典型的用法</th></tr>

    <tr><td><strong>WebSocket</strong></td><td>水管——打开水龙头，水就一直流。数据持续不断地推送给你</td><td>实时行情、L2逐笔数据</td></tr>

    <tr><td><strong>SDK直连</strong></td><td>供应商给了你一张专用的采购卡——插进系统直接连通</td><td>通达信底层行情（mootdx）</td></tr>
    <tr><td><strong>网页爬虫</strong></td><td>自己去各个店里看、记、抄——自动浏览网页抓取信息</td><td>证监会公告、财报PDF</td></tr>

<h3>五个人、五种方言——怎么让所有人听懂同一种语言？</h3>

<div class="deep">
  <div class="label">🏗️ 统一"点菜窗口"：抽象层的智慧</div>
  <p>五个供货商，每个用不同的"语言"。你总不能在后厨雇五个翻译——太乱了。</p>
  <p><span class="hl">解决方案：在厨房门口设一个统一的"点菜窗口"。</span></p>
  <p>你只要告诉这个窗口：我要"今天的茅台日线数据"。窗口后面发生了什么你不用管——它自己去判断该找东财还是找通达信，该用哪种通信方式。</p>
  <p>这个窗口在技术术语里叫<strong>统一抽象层</strong>。它的核心想法很简单：</p>
  <ol>
    <li>定义一套标准化的"菜单"——比如<code>fetch("茅台", "2025-01-01", "2025-06-01", "日线")</code>（就是用统一格式说：取茅台某段时间的日线数据）</li>

  <p><span class="hl">数据处理的四层架构，就是自来水厂的翻版。</span>每一层有且只有一个任务——做完自己的事，把水（数据）交给下一层。</p>

<div class="deep">

    <tr><th>楼层</th><th>数据状态</th><th>这层的任务</th><th>生活中的类比</th></tr>

  <p><strong>❌ 原始层"顺便"洗一下：</strong>"这个缺失值我顺手填上了"——完了。以后你永远无法区分"数据源本身就是空的"还是"被我填的"。原始层必须绝对干净——一步不动。</p>

  <div class="quiz-result"><strong>答案：B。</strong> 影子模式（Shadow Mode）是从手动到自动化的标准过渡方式。在真实数据流中测试但不影响实际数据——所有问题在"影子"中暴露，不会造成任何破坏。</div>
</div>

        `

      {
        id: 'glossary',
        title: '📖 术语表：那些你刚才学到的词',
        emoji: '📖',
        content: '<h3>数据工程核心术语速查</h3><div class="deep"><div class="label">📖 本课涉及的全部关键术语</div><table><tr><th>中文</th><th>English</th><th>用一句话理解</th></tr><tr><td><strong>数据管道</strong></td><td><code>Data Pipeline</code></td><td>从"买菜"到"上菜"的自动化流水线——采集→清洗→存储→分发</td></tr><tr><td><strong>多源异构</strong></td><td><code>Multi-source Heterogeneous</code></td><td>数据来自不同的"菜市场"且用不同的"语言"→需要统一的"翻译窗口"</td></tr><tr><td><strong>增量更新</strong></td><td><code>Incremental Update</code></td><td>只取上次之后新增的——像下载电影从80%接着下，不重下全部</td></tr><tr><td><strong>断点续传</strong></td><td><code>Checkpoint/Resume</code></td><td>像做Excel时随时保存——断了从上次保存的地方继续，不重来</td></tr><tr><td><strong>限流</strong></td><td><code>Rate Limiting</code></td><td>控制请求速度不超过数据源的"肚量"——像超市限购</td></tr><tr><td><strong>熔断</strong></td><td><code>Circuit Breaker</code></td><td>连续失败→自动暂停→等一会儿再试→像微波炉过热自动停</td></tr><tr><td><strong>指数退避</strong></td><td><code>Exponential Backoff</code></td><td>重试间隔逐次加倍（1秒→2秒→4秒→8秒）——给数据源喘气时间</td></tr><tr><td><strong>ELT</strong></td><td><code>Extract-Load-Transform</code></td><td>先原样取回来→再洗好存起来→最后加工成成品。数据源变了不怕</td></tr><tr><td><strong>时间戳对齐</strong></td><td><code>Timestamp Alignment</code></td><td>把所有不同时区的"表"统一到同一把标尺上——全部转UTC</td></tr><tr><td><strong>前复权</strong></td><td><code>Forward-Adjusted</code></td><td>把历史价格按今天的股本重新算——因子计算专用，保证可比</td></tr><tr><td><strong>后复权</strong></td><td><code>Backward-Adjusted</code></td><td>维持每个历史时点的"原样视角"——回测专用，保证真实</td></tr><tr><td><strong>前视偏差</strong></td><td><code>Look-Ahead Bias</code></td><td>回测中"偷看了剧透"——用了当时市场还不知道的信息。致命错误</td></tr><tr><td><strong>交易日历</strong></td><td><code>Trading Calendar</code></td><td>记录哪些天开市、哪些天休市——就像知道不同国家的"周末"是哪天</td></tr><tr><td><strong>数据分层</strong></td><td><code>Data Layering</code></td><td>原始→清洗→因子→信号——像自来水厂的四道工序，每道只管一件事</td></tr><tr><td><strong>数据版本控制</strong></td><td><code>Data Version Control (DVC)</code></td><td>给数据打版本号——像Git管代码一样管数据。代码+数据+参数=完全可复现</td></tr><tr><td><strong>幂等性</strong></td><td><code>Idempotency</code></td><td>同一件事做一百遍结果不变——重复跑不会产生重复数据</td></tr><tr><td><strong>时序数据库</strong></td><td><code>Time-Series Database</code></td><td>专门为"时间+数值"这种数据优化的数据库——查历史行情特别快</td></tr><tr><td><strong>HyperTable</strong></td><td><code>Hypertable (TimescaleDB)</code></td><td>自动按时间分区+压缩——让普通表升级成时序表的功能</td></tr><tr><td><strong>另类数据</strong></td><td><code>Alternative Data</code></td><td>传统财报/行情之外的数据——卫星图、社媒情绪、消费流水——新的Alpha来源</td></tr><tr><td><strong>NLP情绪分析</strong></td><td><code>Sentiment Analysis</code></td><td>让计算机"读懂"文字里的情绪——是兴奋、愤怒还是担忧</td></tr><tr><td><strong>影子模式</strong></td><td><code>Shadow Mode</code></td><td>新管道在后台跑但不影响真实数据——先观察一周再正式上。像新厨师先试做不上菜</td></tr><tr><td><strong>事件溯源</strong></td><td><code>Event Sourcing</code></td><td>每一条数据每次变化都记录下来——理论上可以"倒带"到任意历史时刻</td></tr><tr><td><strong>公告日对齐</strong></td><td><code>Announcement-Date Alignment</code></td><td>保证策略只在"市场知道信息之后"才用信息——不"偷看"</td></tr></table></div>'
      },
      {
        id: 'quiz-mod5',
        title: '🧪 综合测验',
        emoji: '🧪',
        quiz: {
          questions: [
            {

              options: ['分别写三套处理代码', '设计一个统一"点菜窗口"——每个数据源对接这个窗口，你只用一套标准方式调用。换数据源不改任何代码', '只用最快那个', '手动复制粘贴'],
              correct: 1,
              explain: '统一抽象层=外卖App。后面有多少家饭店你不管，你永远用同样的方式点菜。'

            {
              q: '如果某个数据源突然不可用了（比如被限流了），你的系统应该怎么反应？',
              options: ['报错停止', '先自动重试（指数退避）→还不通就自动切备用数据源→都不可用就用昨天的缓存数据+发送告警通知你', '一直重试', '不管，跳过'],
              correct: 1,
              explain: '生产级系统的核心=优雅降级。主源挂了用备源，备源挂了用缓存，全挂了发告警——系统不崩、数据不丢。'

              correct: 1,

// ===== APP STATE =====
let completedLessons = new Set(JSON.parse(localStorage.getItem(P + 'completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem(P + 'quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);

function save() {
  localStorage.setItem(P + 'completed', JSON.stringify([...completedLessons]));
  localStorage.setItem(P + 'quiz_results', JSON.stringify(quizResults));
}

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correctChoice) o.classList.add('correct');
    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let total = 0;
  modules.forEach(m => { total += m.lessons.length; });
  total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / total) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';
  html += '<span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }
  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }
  let html = '';
  if (lesson.quiz) {
    const savedAnswers = quizResults[id] || [];
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">共' + lesson.quiz.questions.length + '题</div>';
    lesson.quiz.questions.forEach((q, qi) => {
      const ua = savedAnswers[qi];
      const answered = ua !== undefined;
      const isCorrect = answered && ua === q.correct;
      html += '<div class="quiz-card"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
      html += '<div class="quiz-question">' + q.q + '</div>';
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answered && oi === q.correct) cls += ' correct';
        if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
        html += '<button class="' + cls + '" onclick="answerQuiz(\'' + id + '\', ' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
      });
      if (answered) {
        html += '<div class="quiz-result show ' + (isCorrect ? 'pass' : 'fail') + '">';
        html += '<strong>' + (isCorrect ? '✅ 正确！' : '❌ 不太对') + '</strong><p>' + (q.explain || '') + '</p></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>';
    html += lesson.content;
    html += '</div>';
    markComplete(id);
  }
  html += '<div class="nav-btns">';
  let prevId = null;
  if (lesIndex > 0) prevId = modules[modIndex].lessons[lesIndex - 1].id;
  else if (modIndex > 0) { const pm = modules[modIndex - 1]; prevId = pm.lessons[pm.lessons.length - 1].id; }
  if (prevId) html += '<button class="btn btn-secondary" onclick="navigateTo(\'' + prevId + '\')">⬅ 上一节</button>';
  else html += '<div></div>';
  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) nextId = modules[modIndex].lessons[lesIndex + 1].id;
  else if (modIndex < modules.length - 1) nextId = modules[modIndex + 1].lessons[0].id;
  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>';
  else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';
  main.innerHTML = html;
}

function answerQuiz(lessonId, qi, choice) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = choice;
  save();
  const lesson = modules.flatMap(m => m.lessons).find(l => l.id === lessonId);
  if (lesson && lesson.quiz && quizResults[lessonId].length === lesson.quiz.questions.length) {
    const allAnswered = quizResults[lessonId].every(v => v !== undefined);
    if (allAnswered) markComplete(lessonId);
  }
  renderContent(lessonId);
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
  }
}

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">共' + finalExam.questions.length + '题 — 检验你对数据工程的掌握</div>';
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    const isCorrect = answered && ua === q.correct;
    html += '<div class="quiz-card"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
    html += '<div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFinalExam(' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
    });
    html += '</div>';
  });
  if (finalExamDone) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const passed = score / total >= 0.6;
    html += '<div class="lesson-card" style="text-align:center"><h2>' + (passed ? '🎉 恭喜通过！' : '📚 还需要再练练') + '</h2>';
    html += '<p style="font-size:2em;margin:20px 0">' + score + ' / ' + total + '</p>';
    html += '<p>' + (passed ? '你已经掌握了数据工程在量化中的核心概念！数据管道+清洗对齐+存储分层+另类数据——量化系统的地基已经打好。' : '建议复习薄弱环节后再试。') + '</p>';
    if (!passed) {
      const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
      html += '<div style="margin-top: 16px; text-align: left;"><p style="color: var(--accent2);">需要复习的题目：</p>';
      wrong.forEach(w => { html += '<p style="color:var(--sub);font-size:0.9em">• ' + w.q.q.substring(0, 60) + '…</p>'; });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  main.innerHTML = html;
}

function answerFinalExam(qi, choice) {
  quizResults['final_' + qi] = choice;
  if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true;
  save();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem(P + 'completed');
  localStorage.removeItem(P + 'quiz_results');
  location.reload();
}

// ===== INIT =====
(function init() {
  currentSection = 'warmup-intro';
  updateUI();
  renderContent('warmup-intro');
})();
</script>
</body>
