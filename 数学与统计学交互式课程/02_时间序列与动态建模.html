<script>
// ===== COURSE DATA =====
const modules = [
  {
    title: '📈 模块一：时间序列基础——为什么昨天的收益率影响今天',
    lessons: [
      {
        id: 'why-timeseries',
        title: '金融数据的独特性——为什么不能用普通回归',
        emoji: '📈',
        content: `
<h3>普通回归的三个假设，金融数据全部违反</h3>

<div class="warning">
  <div class="label">⚠️ OLS回归的三个前提</div>
  <p><strong>1. 观测独立：</strong>第i个数据点和第i+1个无关<br><span class="hl4">金融现实：</span>昨天的收益率强烈影响今天的波动率（波动率聚集）</p>
  <p><strong>2. 同方差：</strong>误差的方差恒定<br><span class="hl4">金融现实：</span>危机时方差是平时的3-5倍（异方差）</p>
  <p><strong>3. 正态分布：</strong>误差~N(0,σ²)<br><span class="hl4">金融现实：</span>肥尾——极端事件比正态预测多10-100倍</p>
</div>

<h3>自相关——时间序列最核心的概念</h3>

<div class="deep">
  <div class="label">📈 什么是自相关？</div>
  <p><strong>自相关 = 今天的值和昨天的值之间的相关性。</strong></p>
  <p>• 如果今天涨的股票明天倾向于继续涨 → <span class="hl">正自相关（动量效应）</span><br>
  • 如果今天涨的股票明天倾向于跌回来 → <span class="hl3">负自相关（均值回归）</span><br>
  • 如果今天的涨跌和明天毫无关系 → 自相关≈0（随机游走）</p>
</div>

<div class="diagram-svg">
<svg viewBox="0 0 780 220" xmlns="http://www.w3.org/2000/svg">
  <text x="30" y="30" fill="#6c5ce7" font-size="13" font-weight="600">正自相关：趋势延续（动量）</text>
  <path d="M30,70 Q120,40 200,55 Q280,70 360,40 Q440,20 520,45 Q600,70 680,35 Q720,25 750,40" fill="none" stroke="#6c5ce7" stroke-width="2.5"/>
  
  <text x="30" y="130" fill="#d2991d" font-size="13" font-weight="600">负自相关：均值回归（反转）</text>
  <path d="M30,150 Q120,190 200,160 Q280,130 360,170 Q440,200 520,160 Q600,120 680,165 Q720,185 750,155" fill="none" stroke="#d2991d" stroke-width="2.5"/>
  
  <text x="30" y="200" fill="#7c8aa2" font-size="11">自相关系数 ρ(1) = Corr(Yₜ, Yₜ₋₁) —— 时间序列建模从这里开始</text>
</svg>
</div>

<h3>平稳性——时间序列建模的前提条件</h3>

<div class="deep">
  <div class="label">📈 平稳 = 统计特性不随时间变化</div>
  <p><strong>严平稳：</strong>任何时间窗口的联合分布相同<br>
  <strong>弱平稳（我们关心的）：</strong>均值恒定 + 方差恒定 + 自协方差只依赖于时间间隔</p>
  <p><strong>为什么平稳性重要？</strong>ARIMA、GARCH等所有经典时序模型都假设数据平稳。非平稳数据的均值和方差随时间漂移→基于历史数据的任何推断都不可靠。</p>
</div>

<div class="tip">
  <div class="label">💡 实战检查清单</div>
  <p>拿到任何金融时间序列，第一件事：<br>
  1. 画图看趋势（肉眼判断有没有明显的向上/向下漂移）<br>
  2. ADF检验（Augmented Dickey-Fuller）——统计检验单位根<br>
  3. 如果不平稳→差分（对价格取对数收益率）→再检验</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">金融收益率数据最显著违反OLS回归的哪个假设？</div>
  <button class="quiz-option" onclick="answerQuiz('why-timeseries',0,0)">A. 线性假设——金融关系是非线性的</button>
  <button class="quiz-option" onclick="answerQuiz('why-timeseries',0,1)">B. 独立同分布假设——存在自相关（动量/反转）+ 异方差（波动率聚集）+ 肥尾</button>
  <button class="quiz-option" onclick="answerQuiz('why-timeseries',0,2)">C. 无多重共线性</button>
  <button class="quiz-option" onclick="answerQuiz('why-timeseries',0,3)">D. 大样本假设</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'acf-pacf',
        title: '自相关(ACF)与偏自相关(PACF)——怎么读懂这些图',
        emoji: '📉',
        content: `
<h3>ACF和PACF是时间序列的「指纹」</h3>

<div class="analogy">
  <div class="label">🕵️ 侦探破案</div>
  <p>你看到地上有一串脚印（时间序列数据）。ACF告诉你「每一步和上一步有多像」——如果第3步和第2步高度相关，可能是同一个人。PACF告诉你「去掉中间步骤的间接影响后，第3步和第1步还有直接关系吗」——纯直接影响。</p>
</div>

<h3>ACF（自相关函数）——看原始相关性</h3>

<div class="deep">
  <div class="label">📉 ACF(k) = Corr(Yₜ, Yₜ₋ₖ)</div>
  <p><strong>含义：</strong>今天的值和k天前的值的相关系数。</p>
  <p><strong>ACF的典型模式：</strong></p>
  <p>• <strong>AR(1)模型：</strong>ACF指数衰减——今天的值通过明天→后天→大后天间接影响……像涟漪慢慢消散</p>
  <p>• <strong>MA(1)模型：</strong>ACF在滞后1期后截尾（突然变0）——冲击只直接影响今天和明天，后天就消失了</p>
  <p>• <strong>ARMA模型：</strong>ACF从某点开始衰减——既有直接又有间接影响</p>
</div>

<h3>PACF（偏自相关函数）——去掉中间干扰</h3>

<div class="deep">
  <div class="label">📉 PACF(k) = 控制Yₜ₋₁...Yₜ₋ₖ₋₁后，Yₜ与Yₜ₋ₖ的纯相关</div>
  <p><strong>含义：</strong>「如果我已经知道昨天和前天的值，再知道大前天的值，对预测今天还有额外帮助吗？」</p>
  <p><strong>PACF的典型模式：</strong></p>
  <p>• <strong>AR(p)模型：</strong>PACF在滞后p期后截尾——p阶之后就没了直接贡献</p>
  <p>• <strong>MA(q)模型：</strong>PACF衰减——没有明确的「截断点」</p>
</div>

<h3>如何用ACF/PACF确定ARIMA的p和q</h3>

<div class="table-wrap">
<table>
  <tr><th>模型类型</th><th>ACF的形态</th><th>PACF的形态</th></tr>
  <tr><td><strong>AR(p)</strong></td><td>指数衰减（拖尾）</td><td>滞后p后截尾</td></tr>
  <tr><td><strong>MA(q)</strong></td><td>滞后q后截尾</td><td>衰减（拖尾）</td></tr>
  <tr><td><strong>ARMA(p,q)</strong></td><td>衰减（拖尾）</td><td>衰减（拖尾）</td></tr>
</table>
</div>

<div class="tip">
  <div class="label">💡 实战口诀</div>
  <p>「ACF截尾选MA，PACF截尾选AR，俩都拖尾选ARMA，俩都截尾→数据有问题。」</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>

  <button class="quiz-option" onclick="answerQuiz('acf-pacf',0,0)">A. MA(2)</button>
  <button class="quiz-option" onclick="answerQuiz('acf-pacf',0,1)">B. AR(2)——PACF截尾在p=2，ACF拖尾，正是AR模型的指纹</button>
  <button class="quiz-option" onclick="answerQuiz('acf-pacf',0,2)">C. ARIMA(0,1,0)</button>
  <button class="quiz-option" onclick="answerQuiz('acf-pacf',0,3)">D. 数据有问题</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'arima-basics',
        title: 'ARIMA——时间序列预测的经典模型',

<h3>HMM的两个核心算法——一个学习、一个推断</h3>

<div class="deep">
  <div class="label">🧬 Baum-Welch（学习）——HMM怎么「训练」</div>
  <p><strong>问题：</strong>给你一堆历史数据（PMI、利差、库存等），但你不知道历史上每个月的真实周期状态。怎么估计转移矩阵和发射矩阵？</p>
  <p><strong>解法：</strong>Baum-Welch算法（EM算法的特例）——迭代两步直到收敛：</p>
  <p><strong>E步（期望）：</strong>基于当前参数估计，推断每个时间点最可能处于哪个状态（这是软分配——73%复苏+22%过热+5%滞胀）</p>
  <p><strong>M步（最大化）：</strong>基于E步的状态分配，重新估计转移矩阵和发射矩阵</p>
  <p><strong>收敛：</strong>重复E→M→E→M……直到参数不再明显变化</p>
  <p style="margin-top:8px"><span class="hl">关键：Baum-Welch不需要人工标注「2015年6月是过热期」——模型自己从数据中学习什么是过热。</span></p>
</div>

<h3>Viterbi算法（解码）——给定观测序列，最优状态路径是什么</h3>

<div class="deep">
  <div class="label">🧬 Viterbi——找到最可能的状态序列</div>
  <p><strong>问题：</strong>模型已经训练好了（已知A、B、π），现在给你一段观测序列（比如过去12个月的PMI和利差），这12个月各自处于什么周期阶段？</p>
  <p><strong>解法：</strong>Viterbi算法用动态规划高效找到最优路径——不是逐月独立推断，而是全局最优。</p>
  <p><strong>为什么不逐月独立推断？</strong>因为状态有持续性——如果上个月是复苏，这个月大概率还是复苏（转移矩阵的自我转移概率很高）。Viterbi考虑了这种持续性。</p>
</div>

<h3>📝 实战例题：Viterbi解码12个月的经济状态</h3>

<div class="deep">
  <div class="label">📅 简化案例——只有2个状态（正常/衰退）</div>
  <p><strong>转移矩阵：</strong>P(正常→正常)=0.9, P(衰退→衰退)=0.85</p>
  <p><strong>观测：</strong>过去3个月PMI分别为51、48、47</p>
  <div class="table-wrap">
  <table>
    <tr><th>月份</th><th>PMI</th><th>P(正常|PMI)</th><th>P(衰退|PMI)</th><th>Viterbi最优</th></tr>
    <tr><td>第1月</td><td>51</td><td>0.75</td><td>0.25</td><td class="hl2">正常</td></tr>
    <tr><td>第2月</td><td>48</td><td>0.35</td><td>0.65</td><td class="hl4">衰退</td></tr>
    <tr><td>第3月</td><td>47</td><td>0.20</td><td>0.80</td><td class="hl4">衰退</td></tr>
  </table>

  <p><strong>如果只看单月：</strong>第2月PMI=48→衰退概率65%。但如果第1月是正常，转入衰退只有10%的概率→Viterbi可能仍然判第2月为正常（全局最优 ≠ 逐月独立推断）。</p>
  <p><strong>这就是Viterbi的价值：</strong><span class="hl">不只看这一个月的观测，还考虑前后的状态连贯性。</span></p>

let completedLessons = new Set(JSON.parse(localStorage.getItem('ts_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('ts_course_quiz') || '{}');
let finalDone = false;
let currentSection = 'why-timeseries';

function save() {
  localStorage.setItem('ts_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('ts_course_quiz', JSON.stringify(quizResults));
}

function updateUI() {
  const totalLessons = modules.reduce((s,m)=>s+m.lessons.length,0);
  const done = completedLessons.size;
  const pct = Math.round(done/totalLessons*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = pct+'%';
  let navHTML = '';
  modules.forEach((m,mi) => {
    navHTML += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach((l) => {
      const isActive = l.id === currentSection;
      const isDone = completedLessons.has(l.id);
      navHTML += '<div class="nav-item'+(isActive?' active':'')+(isDone?' done':'')+'" onclick="navigateTo(\''+l.id+'\')">';
      navHTML += '<span class="check">'+(isDone?'✅':'○')+'</span>';
      navHTML += '<span>'+l.emoji+' '+l.title+'</span></div>';
    });
    navHTML += '</div>';
  });
  navHTML += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div>';
  navHTML += '<div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = navHTML;
}

function navigateTo(id) {
  currentSection = id;
  completedLessons.add(id);
  if (id !== 'final') save();
  updateUI();
  if (id === 'final') renderFinalExam();
  else renderContent(id);
  window.scrollTo(0,0);
}

function renderContent(id) {
  let lesson = null;
  for (const m of modules) { const found = m.lessons.find(l => l.id === id); if (found) { lesson = found; break; } }
  if (!lesson) return;
  let allLessons = []; modules.forEach(m => allLessons.push(...m.lessons));
  const idx = allLessons.findIndex(l => l.id === id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  let html = '<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html += '<div class="meta">📈 时间序列与动态建模 · 第二课</div>';
  html += lesson.content;
  const qd = quizData[id];
  if (qd) {
    const script = '\n<script>\n(function(){\n  const answers = '+JSON.stringify(qd)+';\n  const userAnswers = quizResults[\''+id+'\'] || [];\n  answers.forEach((a,qi) => {\n    if (userAnswers[qi] !== undefined) {\n      const card = document.querySelectorAll(\'.quiz-card\')[qi];\n      if (!card) return;\n      const btns = card.querySelectorAll(\'.quiz-option\');\n      const result = card.querySelector(\'.quiz-result\');\n      btns.forEach((b,oi) => {\n        b.disabled = true;\n        if (oi === a.correct) b.classList.add(\'correct\');\n        if (oi === userAnswers[qi] && oi !== a.correct) b.classList.add(\'wrong\');\n      });\n      if (result) {\n        result.innerHTML = \'<span class=\"ans\">✅ 正确！</span> \' + a.explain;\n        result.classList.add(\'show\', userAnswers[qi]===a.correct ? \'pass\' : \'fail\');\n      }\n    }\n  });\n})();\n<\\/script>\n';
    html += script;
  }
  html += '<div class="nav-btns">';
  if (prev) html += '<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>';
  else html += '<span></span>';
  if (next) html += '<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>';
  else html += '<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
  if (typeof simAR1 === 'function') simAR1();
  if (typeof simGARCH === 'function') simGARCH();
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save(); renderContent(lessonId);
}

// ===== SIMULATORS =====
function simAR1() {
  const phi = parseFloat(document.getElementById('ar1-phi')?.value||0.7);
  const n = parseInt(document.getElementById('ar1-n')?.value||50);
  const el = document.getElementById('ar1Val');
  if (!el) return;
  let y = 0, vals = [];
  for (let t = 0; t < n; t++) { y = phi*y + (Math.random()-0.5)*2; vals.push(y); }
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min || 1;
  const lines = [];
  for (let i = 0; i < Math.min(10, n); i++) {
    const pct = Math.round((vals[i]-min)/range*100);
    lines.push('█'.repeat(Math.max(1,Math.round(pct/5))));
  }
  el.textContent = 'φ₁='+phi+' | '+(phi>0?'动量延续':phi<0?'反转回归':'白噪声')+'\n前10期: '+vals.slice(0,10).map(v=>v.toFixed(1)).join(' ');
}

function simGARCH() {
  const alpha = parseFloat(document.getElementById('garch-alpha')?.value||0.1);
  const beta = parseFloat(document.getElementById('garch-beta')?.value||0.85);
  const el = document.getElementById('garchVal');
  const sumEl = document.getElementById('garchSum');
  if (!el) return;
  if (sumEl) sumEl.textContent = (alpha+beta).toFixed(2);
  let sigma2 = 1;
  const sigmas = [];
  for (let t = 0; t < 40; t++) {
    const eps = (Math.random()-0.5)*2;
    sigma2 = 0.05 + alpha*eps*eps + beta*sigma2;
    sigmas.push(Math.sqrt(sigma2));
  }
  const lines = sigmas.map((s,i) => {
    const bar = '█'.repeat(Math.round(s*10));
    return bar + ' ' + s.toFixed(2);
  });
  el.textContent = 'α+β='+(alpha+beta).toFixed(2)+' | '+(alpha+beta>0.97?'高持续（恐慌持久）':alpha+beta>0.9?'中等持续':'低持续（快速衰减）')+'\n' + lines.join('\n');
}

    html += '<div class="grade">'+score+' / 8 （'+pct+'%）</div>';
    html += '<p style="color:var(--sub)">'+(passed?'你已掌握时间序列分析的核心工具。下一步：随机过程与连续金融——学习股价的随机运动规律。':'再看看薄弱环节——GARCH和HMM是量化周期策略的核心。')+'</p>';
    html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}

function answerFinal(qi, oi) {
  quizResults['final_'+qi] = oi;
  save();
  finalDone = finalExam.every((_,i) => quizResults['final_'+i] !== undefined);
  if (finalDone) completedLessons.add('final');
  updateUI(); renderFinalExam();
}

function resetFinal() {
  finalExam.forEach((_,i) => delete quizResults['final_'+i]);
  completedLessons.delete('final'); finalDone = false;
  save(); updateUI(); renderFinalExam();
}

function resetAll() {
  localStorage.removeItem('ts_course_done');
  localStorage.removeItem('ts_course_quiz');
  completedLessons = new Set(); quizResults = {}; finalDone = false;
  currentSection = 'why-timeseries';
  save(); updateUI(); renderContent('why-timeseries'); window.scrollTo(0,0);
}
window.resetAll = resetAll;

// ===== INIT =====
(function() {
  currentSection = 'why-timeseries';
  updateUI();
  renderContent('why-timeseries');
})();
</script>
</body>
