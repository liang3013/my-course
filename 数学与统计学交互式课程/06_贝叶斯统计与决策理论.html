const modules = [
  {
    title: '🧠 模块一：贝叶斯深度——超越P(θ|D)',
    lessons: [
      {
        id: 'bayes-vs-frequentist',
        title: '贝叶斯 vs 频率派——Agent该信谁？',
        emoji: '⚔️',
        content: `
<h3>两种统计哲学——不只是公式的差异</h3>

<div class="deep">
  <div class="label">⚔️ 核心分歧：参数是固定的还是随机的？</div>
  <div class="table-wrap">
  <table>
    <tr><th>维度</th><th>频率派</th><th>贝叶斯派</th><th>Agent选择</th></tr>
    <tr><td>参数本质</td><td>固定未知常数</td><td>随机变量（有分布）</td><td class="hl">✅ 贝叶斯</td></tr>
    <tr><td>不确定性来源</td><td>仅来自抽样</td><td>参数本身也有不确定性</td><td class="hl">✅ 更诚实</td></tr>
    <tr><td>先验信息</td><td>不能用</td><td>可以纳入（大师智慧=先验）</td><td class="hl">✅ 先验=经验</td></tr>
    <tr><td>小样本</td><td>不可靠</td><td>有先验兜底→稳健</td><td class="hl">✅ 新上市/稀有事件</td></tr>
    <tr><td>更新方式</td><td>重新估计</td><td>贝叶斯递推：后验→新先验</td><td class="hl">✅ 持续学习</td></tr>
  </table>
  </div>
</div>

<div class="analogy">
  <div class="label">🎯 Agent需要贝叶斯思维的三个理由</div>
  <p><strong>1. 持续学习：</strong>频率派每天重新跑回归→昨天的信息和今天的信息没关联。贝叶斯把昨天的后验变成今天的先验→信息累积。</p>
  <p><strong>2. 表达不确定性：</strong>Agent应该说「我认为衰退概率65%（95%CI:55%-73%）」而不是「经济在衰退」。后者是频率派的点估计，前者是贝叶斯的分布。</p>
  <p><strong>3. 融合多源：</strong>宏观Agent+行业Agent+个股Agent→各自输出先验→贝叶斯融合为统一后验。</p>
</div>

<h3>📝 案例：频率派 vs 贝叶斯估计硬币正面概率</h3>

<div class="deep">
  <div class="label">🪙 抛10次，7次正面。硬币正面概率是多少？</div>
  <p><strong>频率派（MLE）：</strong>θ̂=7/10=70%。但如果你事先知道「市面上绝大多数硬币是公平的」→这个先验信息被浪费了。</p>
  <p><strong>贝叶斯（Beta(2,2)先验→「偏公平」）：</strong>后验=Beta(2+7,2+3)=Beta(9,5)→后验均值=9/(9+5)=<strong>64.3%</strong>。比70%更保守→先验把它拉回50%。</p>
  <p><strong>如果抛100次，70次正面：</strong>后验=Beta(2+70,2+30)→均值=72/104=<strong>69.2%</strong>→大样本下先验被淹没，贝叶斯≈频率派。</p>
</div>

<div class="quiz-card"><h3>🧩 随堂测验</h3>
  <div class="quiz-question">贝叶斯方法在小样本下比频率派更稳健的原因？</div>
  <button class="quiz-option" onclick="answerQuiz('bayes-vs-frequentist',0,0)">A. 公式更简单</button>
  <button class="quiz-option" onclick="answerQuiz('bayes-vs-frequentist',0,1)">B. 先验提供了额外的「虚拟数据」——Beta(2,2)先验等价于「已经抛了4次硬币2正2反」。小样本时先验权重高，防止被极端数据带偏</button>
  <button class="quiz-option" onclick="answerQuiz('bayes-vs-frequentist',0,2)">C. 计算更快</button>
  <button class="quiz-option" onclick="answerQuiz('bayes-vs-frequentist',0,3)">D. 不需要数据</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'conjugate-prior',
        title: '共轭先验——让贝叶斯更新有闭式解',
        emoji: '🔗',
        content: `
<h3>不是所有先验都需要MCMC——共轭先验让公式保持简洁</h3>

<div class="deep">
  <div class="label">🔗 共轭先验=先验和后验属于同一个分布族</div>
  <p><strong>Beta-Binomial（最经典）：</strong>先验Beta(α,β) + 观测到k次成功(n−k次失败)→后验=Beta(α+k, β+n−k)。<span class="hl">不需要积分，不需要MCMC——直接代数更新。</span></p>
  <p><strong>Normal-Normal（最常用）：</strong>先验μ~N(μ₀,τ²) + 观测X̄~N(μ,σ²/n)→后验μ~N(加权平均, 调和精度)。精确到一行公式。</p>
</div>

<h3>📝 案例：用Normal-Normal更新市场预期收益</h3>

<div class="deep">
  <div class="label">📊 先验：μ~N(10%, 4%²)。观测：过去5年平均收益=12%，SE=3%/√5≈1.34%</div>
  <p><strong>精度加权：</strong>先验精度=1/4²=0.0625。似然精度=1/1.34²≈0.557。</p>
  <div class="formula">
    后验均值 = (0.0625×10% + 0.557×12%)/(0.0625+0.557) = 11.8%<br>
    后验方差 = 1/(0.0625+0.557) = 1.61%² → 后验≈N(11.8%, 1.61%²)
  </div>
  <p><strong>解读：</strong>先验10%被观测12%拉高到11.8%。因为观测精度(0.557)>>先验精度(0.0625)→观测权重是后验的90%。<span class="hl">如果只观测了1年→似然精度=1/9=0.11→后验≈10.6%→先验仍占主导。</span></p>
</div>

<div class="quiz-card"><h3>🧩 随堂测验</h3>
  <div class="quiz-question">Beta(2,2)先验+抛10次7正→后验是Beta(9,5)。Beta(2,2)等价于「已经抛了几次」？</div>
  <button class="quiz-option" onclick="answerQuiz('conjugate-prior',0,0)">A. 0次</button>
  <button class="quiz-option" onclick="answerQuiz('conjugate-prior',0,1)">B. 4次(2+2)——2次成功2次失败。先验=虚拟的历史数据。α=成功次数+1, β=失败次数+1</button>
  <button class="quiz-option" onclick="answerQuiz('conjugate-prior',0,2)">C. 10次</button>
  <button class="quiz-option" onclick="answerQuiz('conjugate-prior',0,3)">D. 2次</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'hierarchical-bayes',
        title: '层次贝叶斯——借用统计强度的艺术',
        emoji: '🏗️',
        content: `
<h3>参数分三层——每层借用上一层的信息</h3>

<div class="diagram-svg">
<svg viewBox="0 0 780 200" xmlns="http://www.w3.org/2000/svg">
  <rect x="240" y="20" width="300" height="40" rx="8" fill="rgba(168,128,224,0.12)" stroke="#a880e0" stroke-width="1.5"/>
  <text x="390" y="45" text-anchor="middle" fill="#a880e0" font-size="12" font-weight="600">全局层：所有股票的「平均因子溢价」 μ₀~N(0,10²)</text>
  <line x1="390" y1="60" x2="390" y2="75" stroke="#7c8aa2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="75" width="300" height="40" rx="8" fill="rgba(108,92,231,0.1)" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" fill="#6c5ce7" font-size="12" font-weight="600">行业层：消费μ_cons ~N(μ₀,τ²)  周期μ_cyc~N(μ₀,τ²)</text>
  <line x1="300" y1="115" x2="300" y2="130" stroke="#7c8aa2" stroke-width="1.5"/>
  <line x1="480" y1="115" x2="480" y2="130" stroke="#7c8aa2" stroke-width="1.5"/>
  <rect x="150" y="130" width="140" height="40" rx="8" fill="rgba(64,168,224,0.08)" stroke="#40a8e0" stroke-width="1"/>
  <text x="220" y="155" text-anchor="middle" fill="#40a8e0" font-size="11">茅台μ~N(μ_cons,σ²)</text>
  <rect x="350" y="130" width="140" height="40" rx="8" fill="rgba(64,168,224,0.08)" stroke="#40a8e0" stroke-width="1"/>
  <text x="420" y="155" text-anchor="middle" fill="#40a8e0" font-size="11">五粮液μ~N(μ_cons,σ²)</text>
  <rect x="530" y="130" width="140" height="40" rx="8" fill="rgba(64,168,224,0.08)" stroke="#40a8e0" stroke-width="1"/>
  <text x="600" y="155" text-anchor="middle" fill="#40a8e0" font-size="11">三一重工μ~N(μ_cyc,σ²)</text>
</svg>
</div>

<div class="deep">
  <div class="label">🏗️ 为什么层次贝叶斯适合量化？——解决小样本困境</div>
  <p><strong>场景：</strong>新上市的股票只有6个月数据→单独估计其因子暴露β极不稳定。</p>
  <p><strong>层次贝叶斯解法：</strong>β_i ~ N(β_industry, σ²)。从同行业几十只股票的β中「借」统计强度。新股票的β被拉向行业均值→估计不再飘忽不定。</p>
  <p><strong>收缩效应：</strong>数据越少→越靠向行业均值（更保守）。数据越多→越靠向自身数据（更自信）。<span class="hl">这正是Black-Litterman「先验+似然→后验」在参数估计层面的推广。</span></p>
</div>

<h3>📝 案例：5只新消费股的ROE估计</h3>

  <div class="label">⛓️ MCMC=构建一条马尔可夫链，其平稳分布=后验分布</div>
  <p><strong>核心思想：</strong>我不需要知道后验分布的公式——我只需要能从里面「抽样」。抽10000个样本→样本的直方图就是后验分布的近似。</p>
  <p><strong>Metropolis-Hastings算法（最简单的MCMC）：</strong></p>
  <p>1. 从当前位置w出发→随机「提议」一个新位置w*<br>2. 计算接受率 α=P(w*|data)/P(w|data)<br>3. 以α的概率接受w*（跳到新位置），否则留在w<br>4. 重复10000次→链的轨迹就是后验的样本</p>

  'stein-paradox': [{ correct:1, explain:'正确。Stein悖论的前提是k≥3。只有1或2个参数时，各自MLE就是最优的。1983年，Stein的学生Efron证明收缩在3个以上参数时严格改进MSE。这就是层次贝叶斯能在量化中广泛应用的数学保证。' }],
  'mcmc-diagnostics': [{ correct:1, explain:'正确。Ȓ>1.1=链间方差显著大于链内方差→不同链还在不同区域→未收敛。需要增加迭代（burn-in期不够）或调整proposal（步长太保守导致探索太慢）。' }],
  'bayesian-deep-learning': [{ correct:1, explain:'正确。Gal&Ghahramani(2016)证明的Dropout=VI近似。训练时见过的样本→不同Dropout mask给出相似预测→方差小（确定）。训练时没见过的样本→Dropout导致预测不一致→方差大（不确定）。' }],
  'decision-theory': [{ correct:1, explain:'正确。对数效用的导数递减→收益20%的边际快乐<亏损20%的边际痛苦。全债+3.6%虽然期望略低，但确定性高→对数效用下可能成为最优。这就是为什么保守投资者自然倾向债券。' }],
};

const finalExam = [
  { q:'贝叶斯方法在小样本下比频率派更稳健的根本原因？', opts:['公式更简单','先验提供虚拟数据——小样本时先验权重高，防止被极端数据带偏','计算更快','不需要数据'], correct:1 },
  { q:'层次贝叶斯中「收缩效应」的含义？', opts:['所有估计趋同','数据少时向群体均值靠拢；数据多时向自身数据靠拢——自适应平衡偏差与方差','估计越来越准','方差越来越大'], correct:1 },
  { q:'MCMC的burn-in期为什么必要？', opts:['预热硬件','去掉链从随机起点走向高概率区的非代表性样本','加速计算','增加精度'], correct:1 },
  { q:'VI相比MCMC的核心取舍？', opts:['VI更好','速度换精度——VI用优化替代采样，快但近似；MCMC慢但渐近精确','VI更精确','没有取舍'], correct:1 },
  { q:'粒子滤波相比GARCH的优势？', opts:['更简单','灵敏度更高——不假设线性方差动态，新数据→粒子权重快速调整。股灾后一天内σ后验从35%→25% vs GARCH仍32%','不需要数据','没有优势'], correct:1 },
  { q:'Agent认知循环中「后验=新先验」的数学意义？', opts:['数学形式','贝叶斯递推更新——知识累积而非每天重启。P(θ|D_t)成为下一轮P(θ)，不需要存储全部历史','简化计算','公式要求'], correct:1 },
  { q:'多Agent融合的价值在什么时候最大？', opts:['三Agent都同意时','三Agent严重分歧时——贝叶斯融合给出比任何单一Agent都可靠的概率，折中而非简单投票','只有一个Agent','不需要融合'], correct:1 },
  { q:'共轭先验的最大优势？', opts:['更精确','后验与先验同分布→贝叶斯更新有闭式解→不需要MCMC。Beta-Binomial, Normal-Normal是最常用的共轭对','计算更快','不需要数据'], correct:1 },
];

let completedLessons = new Set(JSON.parse(localStorage.getItem('bayes_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('bayes_course_quiz') || '{}');
let finalDone = false, currentSection = 'bayes-vs-frequentist';

function save() {
  localStorage.setItem('bayes_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('bayes_course_quiz', JSON.stringify(quizResults));
}
function updateUI() {
  const total = modules.reduce((s,m)=>s+m.lessons.length,0);
  document.getElementById('progressPct').textContent = Math.round(completedLessons.size/total*100)+'%';
  document.getElementById('progressBar').style.width = Math.round(completedLessons.size/total*100)+'%';
  let nav = '';
  modules.forEach(m => {
    nav += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach(l => {
      const isA=l.id===currentSection, isD=completedLessons.has(l.id);
      nav += '<div class="nav-item'+(isA?' active':'')+(isD?' done':'')+'" onclick="navigateTo(\''+l.id+'\')"><span class="check">'+(isD?'✅':'○')+'</span><span>'+l.emoji+' '+l.title+'</span></div>';
    });
    nav += '</div>';
  });
  nav += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div><div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = nav;
}
function navigateTo(id) { currentSection=id; completedLessons.add(id); if(id!=='final')save(); updateUI(); if(id==='final')renderFinalExam(); else renderContent(id); window.scrollTo(0,0); }
function renderContent(id) {
  let lesson=null; for(const m of modules){const f=m.lessons.find(l=>l.id===id);if(f){lesson=f;break;}} if(!lesson)return;
  let all=[]; modules.forEach(m=>all.push(...m.lessons)); const idx=all.findIndex(l=>l.id===id);
  const prev=idx>0?all[idx-1]:null,next=idx<all.length-1?all[idx+1]:null;
  let html='<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html+='<div class="meta">🧠 贝叶斯统计与决策理论 · 第六课</div>'+lesson.content;
  const qd=quizData[id];
  if(qd){html+='\n<script>\n(function(){const a='+JSON.stringify(qd)+';const u=quizResults[\''+id+'\']||[];a.forEach((x,qi)=>{if(u[qi]!==undefined){const c=document.querySelectorAll(\'.quiz-card\')[qi];if(!c)return;c.querySelectorAll(\'.quiz-option\').forEach((b,oi)=>{b.disabled=true;if(oi===x.correct)b.classList.add(\'correct\');if(oi===u[qi]&&oi!==x.correct)b.classList.add(\'wrong\')});const r=c.querySelector(\'.quiz-result\');if(r){r.innerHTML=\'<span class=\"ans\">✅ 正确！</span> \'+x.explain;r.classList.add(\'show\',u[qi]===x.correct?\'pass\':\'fail\')}}});})();\n<\\/script>\n';}
  html+='<div class="nav-btns">';
  if(prev)html+='<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>'; else html+='<span></span>';
  if(next)html+='<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>'; else html+='<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html+='</div></div>'; document.getElementById('mainContent').innerHTML=html;
}
function answerQuiz(lessonId,qi,oi){if(!quizResults[lessonId])quizResults[lessonId]=[];quizResults[lessonId][qi]=oi;save();renderContent(lessonId);}
function startFinalExam(){navigateTo('final');}
function renderFinalExam(){
  let html='<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8道题 · 覆盖三大模块 · 70%及格</div>'; let allDone=true;
  finalExam.forEach((q,qi)=>{
    const ua=quizResults['final_'+qi];if(ua===undefined)allDone=false;
    html+='<div class="quiz-card"><h3>📝 第'+(qi+1)+'题</h3><div class="quiz-question">'+q.q+'</div>';
    q.opts.forEach((o,oi)=>{let cls='quiz-option';if(ua!==undefined&&oi===q.correct)cls+=' correct';if(ua!==undefined&&oi===ua&&oi!==q.correct)cls+=' wrong';html+='<button class="'+cls+'" onclick="answerFinal('+qi+','+oi+')" '+(ua!==undefined?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';});
    html+='</div>';
  }); html+='</div>';
  if(allDone){
    const score=finalExam.filter((q,i)=>quizResults['final_'+i]===q.correct).length;const pct=Math.round(score/8*100),passed=pct>=70;
    html+='<div class="certificate show"><div style="font-size:3em">'+(passed?'🎉':'💪')+'</div><h2>'+(passed?'恭喜毕业！':'再练练')+'</h2><div class="grade">'+score+'/8 ('+pct+'%)</div><p style="color:var(--sub)">'+(passed?'掌握了贝叶斯决策的核心。下一步：ML数学基础。':'再看看薄弱环节。')+'</p><div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  } document.getElementById('mainContent').innerHTML=html;
}
function answerFinal(qi,oi){quizResults['final_'+qi]=oi;save();finalDone=finalExam.every((_,i)=>quizResults['final_'+i]!==undefined);if(finalDone)completedLessons.add('final');updateUI();renderFinalExam();}
function resetFinal(){finalExam.forEach((_,i)=>delete quizResults['final_'+i]);completedLessons.delete('final');finalDone=false;save();updateUI();renderFinalExam();}
function resetAll(){localStorage.removeItem('bayes_course_done');localStorage.removeItem('bayes_course_quiz');completedLessons=new Set();quizResults={};finalDone=false;currentSection='bayes-vs-frequentist';save();updateUI();renderContent('bayes-vs-frequentist');window.scrollTo(0,0);} window.resetAll=resetAll;
(function(){currentSection='bayes-vs-frequentist';updateUI();renderContent('bayes-vs-frequentist');})();
</script>
