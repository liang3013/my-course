// ===== COURSE DATA =====
const modules = [
  {
    title: '🎢 模块一：随机过程基础——股价不是光滑曲线',
    lessons: [
      {
        id: 'why-stochastic',
        title: '为什么需要随机过程——确定性世界的破产',
        emoji: '🎢',
        content: `
<h3>确定性方程给不了真实世界的答案</h3>

<div class="analogy">
  <div class="label">🏦 银行存款 vs 股市投资</div>
  <p><strong>银行存款（确定性）：</strong>dS = μS·dt —— 年利3%，100元一年后=103元。没有随机项，没有意外。<br>
  <strong>股市（随机性）：</strong>dS = μS·dt + σS·dW —— 同样的期望回报，但加了一个「随机震动项」dW。100元一年后可能是80元，也可能是130元。</p>
  <p style="margin-top:8px"><span class="hl">dW 就是「你无法预测的部分」——它让股价从一条直线变成了一条蜿蜒的曲线。</span></p>
</div>

<h3>随机过程的三层理解</h3>

<div class="step-list">
  <div class="step-card">
    <div class="num">1</div>
    <div class="title">随机≠混乱</div>
    <div class="desc">随机过程有统计规律——虽然每一条路径不同，但大量路径的分布是可以建模的</div>
  </div>
  <div class="step-card">
    <div class="num">2</div>
    <div class="title">随机→概率分布</div>
    <div class="desc">我们不再预测「股价=105」，而是预测「股价在95-115之间的概率是68%」</div>
  </div>
  <div class="step-card">
    <div class="num">3</div>
    <div class="title">随机→风险可以管理</div>
    <div class="desc">知道分布→可以算VaR、定价期权、做蒙特卡洛——不确定性被量化了</div>
  </div>
</div>

<h3>布朗运动——所有随机金融模型的基石</h3>

<div class="deep">
  <div class="label">🎢 布朗运动（Wiener过程）的四条定义</div>
  <p><strong>1. W₀ = 0：</strong>从原点出发</p>
  <p><strong>2. 独立增量：</strong>Wₜ − Wₛ 与过去无关——每一步都是新的开始。投资映射：过去的涨跌不保证未来。</p>
  <p><strong>3. 正态增量：</strong>Wₜ − Wₛ ~ N(0, t−s)。时间间隔越长，不确定性越大。√(t−s)而非(t−s)——风险随时间的平方根增长。</p>
  <p><strong>4. 连续路径：</strong>没有跳跃——价格不会瞬间从100变成200。但现实中有跳空缺口（财报、突发事件）→需要跳跃扩散补丁。</p>
</div>

<div class="diagram-svg">
<svg viewBox="0 0 780 200" xmlns="http://www.w3.org/2000/svg">
  <text x="30" y="25" fill="#e28413" font-size="13" font-weight="600">五条可能的布朗运动路径——同一起点，终点散落</text>
  <line x1="20" y1="160" x2="760" y2="160" stroke="#253049" stroke-width="1"/>
  <path d="M20,160 Q60,130 100,150 Q140,170 180,140 Q220,120 260,145 Q300,165 340,135 Q380,115 420,150 Q460,170 500,130 Q540,110 580,140 Q620,155 660,125 Q700,105 740,135" fill="none" stroke="#e28413" stroke-width="1.5"/>
  <path d="M20,160 Q60,175 100,155 Q140,135 180,165 Q220,185 260,150 Q300,125 340,155 Q380,175 420,140 Q460,120 500,155 Q540,180 580,145 Q620,120 660,150 Q700,170 740,140" fill="none" stroke="#fdcb6e" stroke-width="1.5"/>
  <path d="M20,160 Q60,145 100,165 Q140,185 180,155 Q220,130 260,160 Q300,180 340,145 Q380,125 420,160 Q460,185 500,140 Q540,115 580,150 Q620,170 660,135 Q700,115 740,145" fill="none" stroke="#e86040" stroke-width="1.5"/>
  <text x="390" y="190" text-anchor="middle" fill="#7c8aa2" font-size="11">每条路径不可预测——但所有路径的统计特性（均值·方差）是可知的</text>
</svg>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">布朗运动中，Wₜ−Wₛ的方差是t−s而不是(t−s)²。这意味着什么？</div>
  <button class="quiz-option" onclick="answerQuiz('why-stochastic',0,0)">A. 时间越长越确定</button>
  <button class="quiz-option" onclick="answerQuiz('why-stochastic',0,1)">B. 不确定性随时间的平方根增长——1天后的不确定性是σ，100天后的不确定性是10σ而非100σ。风险增长速度慢于时间</button>
  <button class="quiz-option" onclick="answerQuiz('why-stochastic',0,2)">C. 时间没有影响</button>
  <button class="quiz-option" onclick="answerQuiz('why-stochastic',0,3)">D. 不确定性随时间线性增长</button>
  <div class="quiz-result"></div>
</div>
`

      {
        id: 'random-walk',
        title: '随机游走——从醉汉回家到股价模型',
        emoji: '🍺',
        content: `
<h3>最简单的随机过程——醉汉走路</h3>

<div class="analogy">
  <div class="label">🍺 醉汉回家问题</div>
  <p>一个醉汉从原点出发，每一步50%概率往左、50%概率往右，步长固定1米。100步后他在哪？<br>
  <strong>期望位置=0</strong>（左右抵消），但<strong>期望距离≠0</strong>——因为随机游走有扩散效应。</p>
  <p>方差=步数×步长²=100×1=100。标准差=10米。<span class="hl">醉汉大概率在原点±10米的范围内——不是原点。</span></p>
</div>

<h3>随机游走的三个核心性质（每个都是投资直觉）</h3>

<div class="deep">
  <div class="label">🍺 性质一：期望为0，方差随时间线性增长</div>
  <p>E[Xₙ] = 0, Var[Xₙ] = nσ²。第n步后的不确定性∝√n。</p>
  <p><strong>投资映射：</strong>如果股价是随机游走，今天100元，一年后的期望仍是100元（没有漂移的版本）。但95%区间大约是100±1.96σ√252。区间随√t扩大。</p>
</div>

<div class="deep">
  <div class="label">🍺 性质二：首达时间的反直觉</div>
  <p>随机游走<strong>一定会</strong>回到原点（一维和二维），但<strong>期望回归时间=无穷大</strong>。</p>
  <p><strong>投资映射：</strong>均值回归一定会发生——但你不知道是下周还是十年后。这就是为什么「低估了一定会涨」这句话本身没错，但「你不知道什么时候涨」让杠杆做多变得极其危险。</p>
</div>

<div class="deep">
  <div class="label">🍺 性质三：从离散到连续</div>
  <p>让步长越来越小、步数越来越多→随机游走收敛到布朗运动。离散的±1变成连续的dW~N(0,dt)。</p>
  <p><strong>这是连接简单直觉和高深数学的桥梁——</strong><span class="hl">布朗运动就是「步长无穷小、频率无穷高」的随机游走。</span></p>
</div>

<h3>📝 案例：用随机游走理解S&P 500日收益率的不可预测性</h3>

<div class="deep">
  <div class="label">🇺🇸 S&P 500 过去10年约2520个交易日——如果股价是随机游走？</div>
  <p><strong>随机游走预测：</strong>如果日收益率真的是随机游走（无漂移），10年后95%区间≈0±1.96×1%×√2520≈0±98%。即指数可能在近乎0到翻倍之间的任何位置。</p>
  <p><strong>实际数据：</strong>过去10年S&P 500涨了约180%（年化~11%）。这远超随机游走的预测区间→<span class="hl">说明有正向漂移（μ>0），不是纯随机游走。</span></p>
  <p><strong>关键教训：</strong>真实市场=随机游走+正向漂移（风险溢价）。经济学告诉我们μ≈5-7%是合理的。但<strong>你不能假设μ一定为正</strong>——日本股市30年零增长就是反例。</p>
</div>

<div class="formula">

// ===== MC SIMULATOR =====
function runMC() {
  const fcf = parseFloat(document.getElementById('mc-fcf')?.value||800);
  const gMean = parseFloat(document.getElementById('mc-g')?.value||12)/100;
  const wacc = parseFloat(document.getElementById('mc-wacc')?.value||8)/100;
  const nSim = parseInt(document.getElementById('mc-n')?.value||5000);
  const el = document.getElementById('mcVal'), sub = document.getElementById('mcSub');
  if (!el) return;
  const results = [];
  for (let s = 0; s < nSim; s++) {
    const g = gMean + (Math.random()+Math.random()+Math.random()-1.5)*0.06; // approx normal
    const r = Math.max(wacc + (Math.random()-0.5)*0.04, 0.03);
    const gTerm = Math.max(0.015 + (Math.random()-0.5)*0.02, 0.01);
    let pv = 0, cf = fcf;
    for (let t = 1; t <= 5; t++) { cf *= (1 + Math.max(g, -0.3)); pv += cf / Math.pow(1+r, t); }
    const tv = cf*(1+gTerm)/(r-gTerm) / Math.pow(1+r, 5);
    if (tv > 0 && tv < 1e6) results.push(pv + tv);
  }
  results.sort((a,b)=>a-b);
  const p10 = results[Math.floor(nSim*0.1)], p50 = results[Math.floor(nSim*0.5)], p90 = results[Math.floor(nSim*0.9)];
  el.textContent = '中位数='+Math.round(p50)+'亿 | 10%='+Math.round(p10)+'亿 | 90%='+Math.round(p90)+'亿';
  sub.textContent = '80%置信区间: ['+Math.round(p10)+', '+Math.round(p90)+']亿 · 基于'+nSim+'次模拟';
}

function runGBM2() {
  const mu = parseFloat(document.getElementById('gbm2-mu')?.value||12)/100;
  const sigma = parseFloat(document.getElementById('gbm2-sigma')?.value||30)/100;
  const years = parseFloat(document.getElementById('gbm2-years')?.value||5);
  const nPaths = parseInt(document.getElementById('gbm2-paths')?.value||5);
  const longEl = document.getElementById('gbm2Long'), valEl = document.getElementById('gbm2Val');
  if (!valEl) return;
  const longGrowth = (mu - sigma*sigma/2)*100;
  if (longEl) longEl.textContent = longGrowth.toFixed(1)+'%';
  const steps = years*52;
  const dt = 1/52;
  let output = 'μ='+(mu*100).toFixed(0)+'% σ='+(sigma*100).toFixed(0)+'% 长期增长='+longGrowth.toFixed(1)+'%\n';
  for (let p = 0; p < nPaths; p++) {
    let s = 100;
    const vals = [100];
    for (let t = 0; t < steps; t++) {
      const z = Math.sqrt(-2*Math.log(Math.random()))*Math.cos(2*Math.PI*Math.random());
      s *= Math.exp((mu - sigma*sigma/2)*dt + sigma*Math.sqrt(dt)*z);
      vals.push(Math.round(s));
    }
    output += '路径'+(p+1)+': 100→'+Math.round(s)+' ';
  }
  valEl.textContent = output;
}

    html += '<div class="grade">'+score+'/8 ('+pct+'%)</div>';
    html += '<p style="color:var(--sub)">'+(passed?'你已掌握随机过程和蒙特卡洛的核心。下一步：最优化理论——选股和资金配置的科学。':'再看看薄弱环节。')+'</p>';
    html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}
function answerFinal(qi, oi) { quizResults['final_'+qi]=oi; save(); finalDone=finalExam.every((_,i)=>quizResults['final_'+i]!==undefined); if(finalDone)completedLessons.add('final'); updateUI(); renderFinalExam(); }
function resetFinal() { finalExam.forEach((_,i)=>delete quizResults['final_'+i]); completedLessons.delete('final'); finalDone=false; save(); updateUI(); renderFinalExam(); }
function resetAll() { localStorage.removeItem('sp_course_done'); localStorage.removeItem('sp_course_quiz'); completedLessons=new Set(); quizResults={}; finalDone=false; currentSection='why-stochastic'; save(); updateUI(); renderContent('why-stochastic'); window.scrollTo(0,0); }
window.resetAll = resetAll;

// ===== INIT =====
(function(){ currentSection='why-stochastic'; updateUI(); renderContent('why-stochastic'); })();
</script>
</body>
