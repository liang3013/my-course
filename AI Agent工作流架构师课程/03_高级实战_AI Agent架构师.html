<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦾 AI Agent 架构师 · 高级实战</title>
<style>
:root {
  --bg: #0a0e14; --card: #131820; --card2: #1a2130; --border: #2a3345;
  --text: #e2e8f0; --sub: #8896ad; --accent: #f0a040; --accent2: #40c0f0;
  --green: #40c080; --red: #f06060; --purple: #a080e0;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(240,160,64,0.3); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4a5d; }
body {
  font-family: -apple-system,'SF Pro Display','PingFang SC',sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #101820 0%, var(--bg) 70%);
  color: var(--text); line-height: 1.8; min-height:100vh;
  -webkit-font-smoothing: antialiased;
}
.app { display:flex; min-height:100vh; }
.sidebar {
  width:290px; background:var(--card); border-right:1px solid var(--border);
  padding:24px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0;
}
.main { flex:1; padding:32px 48px; max-width:1000px; }

.logo { font-size:1.15em; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.logo .i { font-size:1.4em; }
.sub { color:var(--sub); font-size:0.8em; margin-bottom:6px; }
.badge {
  display:inline-block; background:linear-gradient(135deg,#e08020,#f0a040);
  color:#fff; padding:3px 10px; border-radius:20px; font-size:0.7em; font-weight:600; margin-bottom:18px;
}
.prog-wrap { background:var(--border); border-radius:8px; height:6px; margin-bottom:22px; overflow:hidden; }
.prog-bar { height:100%; background:linear-gradient(90deg,#e08020,#40c0f0); border-radius:8px; transition:width .6s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 12px rgba(240,160,64,0.2); }
.prog-txt { font-size:0.78em; color:var(--sub); margin-bottom:4px; }
.nav-mod { margin-bottom:18px; }
.nav-mod-t {
  font-size:0.7em; text-transform:uppercase; color:var(--sub); opacity:0.7;
  letter-spacing:1.5px; margin-bottom:8px; padding:0 8px;
}
.nav-i {
  display:flex; align-items:center; gap:10px; padding:9px 14px; margin-bottom:2px;
  border-radius:8px; cursor:pointer; font-size:0.84em; color:var(--sub); transition:.2s ease;
  border-left:3px solid transparent;
}
.nav-i:hover { background:var(--card2); color:var(--text); border-left-color:rgba(240,160,64,0.3); }
.nav-i.act { background:rgba(240,160,64,0.1); color:var(--accent); font-weight:600; border-left-color:var(--accent); }
.nav-i.done { color:var(--green); }
.nav-i .ch { width:20px; text-align:center; font-size:0.75em; }
.dv { border:none; border-top:1px solid var(--border); margin:18px 0; opacity:0.6; }

.lesson {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:32px 34px; margin-bottom:24px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.lesson:hover { border-color:rgba(240,160,64,0.2); box-shadow:0 2px 20px rgba(240,160,64,0.05); }
.lesson h2 { font-size:1.5em; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
.lesson .meta { color:var(--sub); font-size:0.85em; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.lesson h3 { font-size:1.15em; margin:28px 0 14px; color:var(--accent); position:relative; padding-left:14px; }
.lesson h3::before { content:''; position:absolute; left:0; top:3px; bottom:3px; width:3px; border-radius:2px; background:linear-gradient(180deg,#e08020,var(--accent)); }
.lesson p { margin-bottom:14px; }
.lesson ul,.lesson ol { padding-left:24px; margin-bottom:14px; }
.lesson li { margin-bottom:8px; }

.analogy {
  background:linear-gradient(135deg,rgba(240,160,64,0.04),rgba(64,192,240,0.04));
  border:1px solid rgba(240,160,64,0.14); border-left:3px solid var(--accent);
  border-radius:var(--radius); padding:18px 22px; margin:20px 0;
  transition: border-color 0.2s;
}
.analogy:hover { border-color:rgba(240,160,64,0.24); }
.analogy .lbl { font-size:0.74em; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; font-weight:600; display:flex; align-items:center; gap:6px; }

.diagram {
  background:#0a0e14; border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; margin:18px 0;
  text-align:center; font-family:'SF Mono','Menlo',monospace; font-size:0.82em; line-height:2; white-space:pre; overflow-x:auto;
}
.diagram-svg {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px 12px; margin:20px 0;
  text-align:center; overflow-x:auto;
}
.diagram-svg svg {
  max-width:100%; height:auto; display:block; margin:0 auto;
}
.diagram-svg text {
  font-family: inherit;
}

.tip,.warn,.deep {
  border-radius:var(--radius); padding:18px 22px; margin:20px 0;
}
.tip { background:rgba(64,192,128,0.05); border:1px solid rgba(64,192,128,0.18); border-left:3px solid var(--green); }
.warn { background:rgba(240,96,96,0.05); border:1px solid rgba(240,96,96,0.18); border-left:3px solid var(--red); }
.deep { background:rgba(160,128,224,0.05); border:1px solid rgba(160,128,224,0.18); border-left:3px solid var(--purple); }
.tip .lbl,.warn .lbl,.deep .lbl { font-weight:700; margin-bottom:6px; font-size:0.85em; display:flex; align-items:center; gap:6px; }
.tip .lbl { color:var(--green); }
.warn .lbl { color:var(--red); }
.deep .lbl { color:var(--purple); }

.quiz {
  background:var(--card); border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius); padding:28px 30px; margin:28px 0;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.quiz:hover { border-color:rgba(240,160,64,0.3); box-shadow:0 2px 16px rgba(240,160,64,0.04); }
.quiz h3 { font-size:1.1em; margin-bottom:10px; }
.q-q { margin:18px 0 10px; font-weight:600; font-size:0.95em; }
.q-o {
  display:block; width:100%; text-align:left; background:var(--bg);
  border:1px solid var(--border); border-radius:8px; padding:13px 18px;
  margin:8px 0; cursor:pointer; color:var(--text); font-size:0.93em; transition:.2s ease;
}
.q-o:hover { border-color:var(--accent); background:var(--card2); transform:translateX(4px); }
.q-o.ok { border-color:var(--green); background:rgba(64,192,128,0.08); color:var(--green); }
.q-o.no { border-color:var(--red); background:rgba(240,96,96,0.08); color:var(--red); }
.q-o:disabled { cursor:default; opacity:0.85; transform:none; }
.q-r { margin-top:14px; padding:14px; border-radius:8px; display:none; }
.q-r.show { display:block; }
.q-r.ok { background:rgba(64,192,128,0.07); border:1px solid var(--green); }
.q-r.no { background:rgba(240,96,96,0.07); border:1px solid var(--red); }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:11px 26px; border-radius:8px; border:none;
  cursor:pointer; font-size:0.93em; font-weight:600; transition:.2s ease;
  letter-spacing:0.3px;
}
.btn:active { transform:scale(0.97); }
.btn-p { background:linear-gradient(135deg,#e08020,#f0a040); color:#fff; box-shadow:0 2px 8px rgba(240,160,64,0.25); }
.btn-p:hover { box-shadow:0 4px 16px rgba(240,160,64,0.35); }
.btn-s { background:var(--border); color:var(--text); }
.btn-s:hover { background:#3a4358; }
.btn-go { background:var(--green); color:#fff; box-shadow:0 2px 8px rgba(64,192,128,0.25); }
.btn-go:hover { box-shadow:0 4px 16px rgba(64,192,128,0.35); }
.btns { display:flex; justify-content:space-between; margin-top:36px; }

.steps { display:flex; gap:14px; flex-wrap:wrap; margin:18px 0; }
.step {
  flex:1; min-width:180px; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px 16px; text-align:center;
  transition: all 0.2s ease;
}
.step:hover { border-color:rgba(240,160,64,0.3); transform:translateY(-2px); }
.step .n {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,#e08020,#f0a040); color:#fff;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 10px; font-weight:700; font-size:0.85em;
  box-shadow:0 2px 8px rgba(240,160,64,0.25);
}
.step .t { font-weight:600; margin-bottom:6px; font-size:0.9em; }
.step .d { font-size:0.8em; color:var(--sub); line-height:1.6; }

.table-wrap { overflow-x:auto; margin:18px 0; border-radius:var(--radius); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:0.88em; margin:0; }
th { background:rgba(240,160,64,0.06); padding:12px 16px; text-align:left; font-weight:600; color:var(--accent); font-size:0.82em; text-transform:uppercase; letter-spacing:0.5px; }
td { padding:11px 16px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(240,160,64,0.02); }

/* Interactive components */
.sim-box {
  background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; margin:18px 0;
}
.sim-box h4 { font-size:0.95em; margin-bottom:16px; color:var(--accent); }
.decision-tree { display:flex; gap:12px; flex-wrap:wrap; }
.d-node {
  background:var(--card2); border:2px solid var(--border);
  border-radius:10px; padding:14px 18px; cursor:pointer; font-size:0.9em;
  text-align:center; min-width:140px; transition:.2s;
}
.d-node:hover { border-color:var(--accent); }
.d-node.pick { border-color:var(--accent); background:rgba(240,160,64,0.1); }
.d-node .arrow { font-size:1.2em; color:var(--sub); margin-top:8px; }
.d-selected { margin-top:14px; padding:14px; background:rgba(240,160,64,0.08); border-radius:8px; display:none; }
.d-selected.show { display:block; }

.match-cont { display:flex; gap:20px; flex-wrap:wrap; }
.match-col { flex:1; min-width:200px; }
.match-item {
  background:var(--card2); border:2px solid var(--border);
  border-radius:8px; padding:12px 16px; margin:8px 0; cursor:pointer;
  font-size:0.85em; transition:.2s; user-select:none;
}
.match-item:hover { border-color:var(--accent); }
.match-item.sel { border-color:var(--accent); background:rgba(240,160,64,0.12); }
.match-item.paired { border-color:var(--green); background:rgba(64,192,128,0.08); pointer-events:none; }

.drag-zone {
  background:var(--bg); border:2px dashed var(--border);
  border-radius:var(--radius); padding:24px; min-height:120px; margin:14px 0;
  display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:center;
}
.drag-node {
  background:var(--card2); border:1px solid var(--border);
  border-radius:8px; padding:10px 16px; cursor:grab; font-size:0.85em;
  display:flex; align-items:center; gap:6px; transition:.2s;
}
.drag-node:hover { border-color:var(--accent); }
.drag-node.connected { border-color:var(--accent2); }

.flow-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:10px 0; }
.flow-node-s {
  background:var(--card2); border:2px solid var(--border);
  border-radius:8px; padding:10px 14px; font-size:0.83em;
}
.flow-arrow { color:var(--sub); font-size:1em; }
.flow-node-s.placed { border-color:var(--green); }

/* Fill-in */
.fill-input {
  background:var(--bg); border:2px solid var(--border);
  color:var(--accent2); padding:8px 12px; border-radius:6px;
  font-size:0.9em; width:180px; font-family:inherit;
}
.fill-input:focus { outline:none; border-color:var(--accent); }
.fill-input.correct { border-color:var(--green); color:var(--green); }
.fill-input.wrong { border-color:var(--red); }

.hl { color:var(--accent); font-weight:600; }
.hl2 { color:var(--accent2); font-weight:600; }
.hl3 { color:var(--green); font-weight:600; }
.hl4 { color:var(--red); font-weight:600; }
code { background:rgba(136,150,173,0.15); padding:2px 6px; border-radius:4px; font-size:0.87em; }
pre { background:var(--bg); padding:16px; border-radius:8px; font-size:0.8em; overflow-x:auto; line-height:1.7; }

.cert {
  display:none; background:linear-gradient(135deg,rgba(224,128,32,0.05),rgba(64,192,240,0.04));
  border:2px solid var(--accent); border-radius:var(--radius); padding:48px 40px; text-align:center; margin:28px 0;
  box-shadow:0 4px 32px rgba(240,160,64,0.06);
}
.cert.show { display:block; animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.cert h2 { font-size:2em; color:var(--accent); margin-bottom:8px; }
.cert .grade { font-size:3.5em; margin:20px 0; background:linear-gradient(135deg,#e08020,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; }

@media(max-width:768px) {
  .app { flex-direction:column; }
  .sidebar { width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border); }
  .main { padding:20px 16px; }
  .steps,.match-cont { flex-direction:column; }
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><span class="i">⚙️</span> Agent 架构师</div>
  <div class="sub">高级实战 · 系统搭建篇</div>
  <div class="badge">⬆ 需完成初级+中级</div>
  <div class="prog-txt">课程进度 <span id="pp">0%</span></div>
  <div class="prog-wrap"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <div id="nav"></div>
  <div class="dv"></div>
  <button class="btn btn-p" style="width:100%" onclick="navTo('final')">🏆 终极测验</button>
  <button class="btn btn-s" style="width:100%;margin-top:8px;font-size:0.8em" onclick="if(confirm('确定要重置所有课程进度吗？这个操作不可撤销。'))rstA()">🔄 重置进度</button>
</aside>
<main class="main" id="mc"></main>
</div>

<script>
const M = [
  {
    t:'🏗️ 模块一：Agent系统设计方法论',
    l:[{
      id:'sdlc',ti:'Agent也有「生命周期」',em:'🔄',
      c:`
<h3>Agent不是一次性产品——它有生老病死</h3>
<div class="analogy"><div class="lbl">🏠 盖房子类比</div>
<p>你不会直接开始砌墙——你先画图纸、打地基、搭框架、装水电、验收、然后搬进去。<br>
盖完不是结束——还要定期维护、修修补补、过几十年可能推倒重建。</p>
<p>Agent系统也一样——它有完整的<strong>生命周期</strong>。</p></div>

<h3>Agent生命周期的六个阶段</h3>
<div class="steps">
<div class="step"><div class="n">1</div><div class="t">需求分析</div><div class="d">Agent要解决什么问题？<br>用户是谁？成功标准是什么？</div></div>
<div class="step"><div class="n">2</div><div class="t">架构设计</div><div class="d">用什么模式？<br>多少个Agent？怎么分工？</div></div>
<div class="step"><div class="n">3</div><div class="t">原型开发</div><div class="d">快速搭一个能跑的版本<br>验证核心假设</div></div>
<div class="step"><div class="n">4</div><div class="t">测试打磨</div><div class="d">红队测试、用户反馈<br>迭代优化</div></div>
<div class="step"><div class="n">5</div><div class="t">部署上线</div><div class="d">投放给真实用户<br>监控运行状态</div></div>
<div class="step"><div class="n">6</div><div class="t">持续运维</div><div class="d">收集反馈、更新知识库<br>修复问题、功能迭代</div></div>
</div>

<div class="tip"><div class="lbl">💡 最关键的一步</div>
<p><strong>需求分析阶段</strong>决定了整个项目的成败。一个经典错误：上来就搭Agent，结果发现Agent在解决一个不存在的问题。<br>
先问：<span class="hl">「用户到底需要什么？这件事没有Agent就不能做吗？」</span></p></div>

<h3>需求分析的三个核心问题</h3>
<ol>
<li><span class="hl">谁在用？</span>——最终用户是技术人员还是普通用户？他们对错误的容忍度多高？</li>
<li><span class="hl">做什么？</span>——Agent的输入是什么？期望的输出是什么？边界在哪里？</li>
<li><span class="hl">怎么算成功？</span>——任务完成率>90%？用户满意度>4/5？成本<每次0.1元？</li>
</ol>
`
    },{
      id:'arch-choose',ti:'怎么选Agent架构？',em:'🎯',
      c:`
<h3>不是越复杂越好——是越合适越好</h3>
<div class="analogy"><div class="lbl">🚗 买车类比</div>
<p>你不会为了接送孩子上学买一辆卡车——也不会用跑车去搬家。</p>
<p>选Agent架构也是同理：<strong>看任务需求，选最简方案。</strong></p></div>

<h3>架构选择决策树</h3>
<div class="sim-box"><h4>🔀 点击走一遍决策树</h4>
<div class="decision-tree" id="dtree1">
<div class="d-node" onclick="dtPick(1,'a')">任务步骤固定且已知？<br>→ 是<small style="color:var(--sub)">（点我）</small></div>
<div class="d-node" onclick="dtPick(1,'b')">步骤不固定需探索？<br>→ 是<small style="color:var(--sub)">（点我）</small></div>
<div class="d-node" onclick="dtPick(1,'c')">有多个独立子任务？<br>→ 是<small style="color:var(--sub)">（点我）</small></div>
<div class="d-node" onclick="dtPick(1,'d')">需要人审核最终结果？<br>→ 是<small style="color:var(--sub)">（点我）</small></div>
</div>
<div class="d-selected" id="dt1r"></div></div>

<h3>四个常用架构模板</h3>
<table>
<tr><th>模板</th><th>适用场景</th><th>复杂度</th></tr>
<tr><td><span class="hl">单Agent+工具</span></td><td>单一明确的任务，比如「回答公司政策问题」</td><td>⭐</td></tr>
<tr><td><span class="hl">工作流链</span></td><td>固定流程的多步任务，比如「申请审批」</td><td>⭐⭐</td></tr>
<tr><td><span class="hl">路由+专家Agent</span></td><td>多种类型问题，比如「客服系统（退换货/咨询/投诉）」</td><td>⭐⭐⭐</td></tr>
<tr><td><span class="hl">编排器+工作者集群</span></td><td>复杂、多变的任务，比如「市场调研报告」</td><td>⭐⭐⭐⭐</td></tr>
</table>

<div class="warn"><div class="lbl">⚠️ 反模式警告</div>
<p>最常见的架构错误：<strong>过早优化</strong>——任务还没跑通就用编排器集群。<br>
黄金法则：先在「单Agent+工具」上验证可行性，确认不够再升级。</p></div>
`
    },{
      id:'q1',ti:'🧪 小测验 #1',em:'🧪',qz:{qs:[

  <strong>HITL = Human-in-the-Loop</strong> — 人在回路中，关键决策不交给机器<br>
  <strong>Tool Call = Function Calling</strong> — Agent调外部函数/API的能力</p>
</div>
`
    }]
  }
];

const FE = {qs:[
  {q:'Agent系统生命周期第一阶段应该做什么？',o:['架构设计','需求分析','写代码','部署'],c:1},
  {q:'JSON Schema最主要的用途是？',o:['美化代码','定义输出格式模板','增加Token','加密数据'],c:1},
  {q:'多Agent系统中，Agent之间最推荐的数据传递格式是？',o:['自然语言聊天','结构化JSON','图片','语音'],c:1},
  {q:'「角色漂移」是指什么？',o:['Agent的名字变了','Agent偏离自己被分配的角色','Agent崩溃了','Agent升级了'],c:1},
  {q:'Agent安全防护中，最根本的数据库安全措施是？',o:['备份数据','给Agent只读账户','加密传输','隐藏IP'],c:1},
  {q:'模型蒸馏的价值在于？',o:['让模型更复杂','用小模型保留大模型能力,大幅降低成本','增加训练时间','需要更多数据'],c:1},
  {q:'客服Agent中，投诉类为什么应快速升级到人工？',o:['AI客服太贵','愤怒的用户不想跟机器人聊天，需要真人安抚','法律规定','投诉类太少不值得建Agent'],c:1},
  {q:'「纵深防御」的含义是？',o:['只有一道防线','多层防线互为补充','防线越少越好','只在最外层设防'],c:1}
]};

let doneL = new Set(JSON.parse(localStorage.getItem('agent_adv2_done')||'[]'));
let qR = JSON.parse(localStorage.getItem('agent_adv2_quiz')||'{}');
let cur = null;
let ms=null,msr=null;
let flowOrder=[];

function save(){localStorage.setItem('agent_adv2_done',JSON.stringify([...doneL]));localStorage.setItem('agent_adv2_quiz',JSON.stringify(qR));}
function pg(){let t=0;M.forEach(m=>t+=m.l.length);t+=FE.qs.length;let d=doneL.size;for(let i=0;i<FE.qs.length;i++)if(qR['f_'+i]!==undefined)d++;return Math.round(d/t*100);}
function upd(){let p=pg();document.getElementById('pp').textContent=p+'%';document.getElementById('pb').style.width=p+'%';let n=document.getElementById('nav'),h='';M.forEach(m=>{h+='<div class="nav-mod-t">'+m.t+'</div>';m.l.forEach(l=>{let dn=doneL.has(l.id),ac=cur===l.id;h+='<div class="nav-i'+(ac?' act':'')+(dn?' done':'')+'" onclick="navTo(\''+l.id+'\')"><span class="ch">'+(dn?'✅':l.em)+'</span>'+l.ti+'</div>';});});let fd=FE.qs.every((_,i)=>qR['f_'+i]!==undefined);h+='<div class="nav-i'+(cur==='final'?' act':'')+(fd?' done':'')+'" onclick="navTo(\'final\')"><span class="ch">'+(fd?'✅':'🏆')+'</span>终极测验</div>';n.innerHTML=h;}
function navTo(id){cur=id;upd();render(id);window.scrollTo(0,0);}
function mk(id){if(!doneL.has(id)){doneL.add(id);save();upd();}}

function render(id){
  let main=document.getElementById('mc');
  if(id==='final'){renderF(main);return;}
  let ls=null,mi=-1,li=-1;
  for(let i=0;i<M.length;i++)for(let j=0;j<M[i].l.length;j++)if(M[i].l[j].id===id){ls=M[i].l[j];mi=i;li=j;break;}
  if(!ls){main.innerHTML='<p>未找到</p>';return;}
  let h='';
  if(ls.qz){
    let sv=qR[id]||[];
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>';
    ls.qz.qs.forEach((q,qi)=>{
      let ua=sv[qi],an=ua!==undefined,ok=an&&ua===q.c;
      h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';
      q.o.forEach((o,oi)=>{
        let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';
        h+='<button class="'+cl+'" onclick="ans(\''+id+'\','+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';
      });
      if(an)h+='<div class="q-r show '+(ok?'ok':'no')+'"><strong>'+(ok?'✅ 正确':'❌ 不太对')+'</strong><p>'+q.x+'</p></div>';
      h+='</div>';
    });
    h+='</div>';
  }else{
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>'+ls.c+'</div>';
    mk(id);
  }
  h+='<div class="btns">';
  let pr=null;if(li>0)pr=M[mi].l[li-1].id;else if(mi>0){let pm=M[mi-1];pr=pm.l[pm.l.length-1].id;}
  h+=pr?'<button class="btn btn-s" onclick="navTo(\''+pr+'\')">⬅ 上一节</button>':'<div></div>';
  let nx=null;if(li<M[mi].l.length-1)nx=M[mi].l[li+1].id;else if(mi<M.length-1)nx=M[mi+1].l[0].id;
  h+=nx?'<button class="btn btn-p" onclick="navTo(\''+nx+'\')">下一节 ➡</button>':'<button class="btn btn-go" onclick="navTo(\'final\')">🏆 终极测验 ➡</button>';
  h+='</div>';
  main.innerHTML=h;mk(id);
}
function ans(lid,qi,oi){if(!qR[lid])qR[lid]=[];qR[lid][qi]=oi;save();render(lid);}
function navF(){navTo('final');}
function renderF(main){
  let h='<div class="lesson"><h2>🏆 终极测验</h2><div class="meta">8题 · 覆盖7个模块 · 70%及格</div>';
  let ad=true;
  FE.qs.forEach((q,qi)=>{let ua=qR['f_'+qi],an=ua!==undefined;if(!an)ad=false;h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';q.o.forEach((o,oi)=>{let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';h+='<button class="'+cl+'" onclick="ansF('+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';});h+='</div>';});
  h+='</div>';
  if(ad){
    let sc=FE.qs.filter((q,i)=>qR['f_'+i]===q.c).length,pc=Math.round(sc/8*100),pass=pc>=70;
    let gr=pc>=90?'🏅 S级':pc>=80?'🥇 A级':pc>=70?'🥈 B级':'📝 继续加油';
    h+='<div class="cert show"><div style="font-size:3em">'+(pass?'🎉':'💪')+'</div><h2>'+(pass?'恭喜完成高级课程！':'还需要再巩固')+'</h2><div class="grade">'+gr+'</div><div style="font-size:1.5em;color:var(--accent)">'+sc+'/8（'+pc+'%）</div><p style="margin-top:16px;color:var(--sub)">'+(pass?'你现在能独立设计一个完整的Agent系统了！':'薄弱环节已标出，针对性复习后再战。')+'</p><div style="margin-top:20px"><button class="btn btn-s" onclick="rstF()">🔄 重新测验</button><button class="btn btn-p" onclick="rstA()" style="margin-left:8px">🔁 重学全部</button></div></div>';
    let wr=FE.qs.map((q,i)=>({q,i})).filter(x=>qR['f_'+x.i]!==x.q.c);
    if(wr.length){let mp=['→ 模块一：需求分析','→ 模块三：结构化输出','→ 模块四：多Agent通信','→ 模块四：角色漂移','→ 模块六：安全红线','→ 模块五：模型蒸馏','→ 模块七：客服案例','→ 模块六：纵深防御'];h+='<div class="tip" style="margin-top:16px"><div class="lbl">📚 薄弱环节</div>';wr.forEach(w=>{h+='<p>❌ 第'+(w.i+1)+'题 '+mp[w.i]+'</p>';});h+='</div>';}
  }
  main.innerHTML=h;if(ad)upd();
}
function ansF(qi,oi){qR['f_'+qi]=oi;save();renderF(document.getElementById('mc'));upd();}
function rstF(){FE.qs.forEach((_,i)=>delete qR['f_'+i]);save();upd();renderF(document.getElementById('mc'));}
function rstA(){localStorage.removeItem('agent_adv2_done');localStorage.removeItem('agent_adv2_quiz');doneL=new Set();qR={};cur=null;navTo('sdlc');}
function dtPick(i,ch){
  let map={a:'→ 用 <strong>Workflow（工作流）</strong><br>步骤固定就不用Agent。固定流程的任务用工作流最可靠。',b:'→ 用 <strong>Agent</strong><br>步骤不固定、需要探索——这正是Agent的强项。',c:'→ 考虑 <strong>并行化</strong><br>互不依赖的子任务可以同时跑，大幅缩短总时间。',d:'→ 需要加 <strong>评估优化器</strong> 或 <strong>人工审核节点</strong><br>需要人的最终判断时，在流程末尾加审核Gate。'};
  let e=document.getElementById('dt1r');e.innerHTML='<strong>你的选择：</strong><br>'+map[ch];e.className='d-selected show';
}
function selDragNode(n){flowOrder.push(n);if(flowOrder.length>4)flowOrder=flowOrder.slice(-4);let dz=document.getElementById('dropzone');let arr=['▶','🔍','🧠','⏹'];dz.innerHTML=flowOrder.map((x,i)=>'<span class="drag-node connected">'+arr[i]+' '+({start:'开始',search:'知识检索',llm:'LLM回答',end:'输出'}[x])+'</span>').join('<span class="flow-arrow">→</span>');let fr=document.getElementById('flow-result');if(flowOrder.length===4&&flowOrder[0]==='start'&&flowOrder[1]==='search'&&flowOrder[2]==='llm'&&flowOrder[3]==='end'){fr.innerHTML='<span style="color:var(--green);font-weight:600">✅ 完美！这是一个标准的RAG问答工作流：开始→知识检索→LLM回答→输出。</span>';}else if(flowOrder.length===4){fr.innerHTML='<span style="color:var(--red)">❌ 顺序不太对。标准流程是：开始 → 知识检索 → LLM回答 → 输出。试试看？</span>';}}
function resetDrag(){flowOrder=[];document.getElementById('dropzone').innerHTML='<span style="color:var(--sub)">👆 按正确顺序点击上方节点（开始→检索→LLM→输出）</span>';document.getElementById('flow-result').innerHTML='';}
function checkFill(){
  let f1=document.getElementById('fi1').value.trim(),f2=document.getElementById('fi2').value.trim(),f3=document.getElementById('fi3').value.trim();
  let s=0;if(f1){document.getElementById('fi1').className='fill-input correct';document.getElementById('fir1').textContent='✅';s++;}else{document.getElementById('fi1').className='fill-input wrong';document.getElementById('fir1').textContent='❌';}
  if(f2){document.getElementById('fi2').className='fill-input correct';document.getElementById('fir2').textContent='✅';s++;}else{document.getElementById('fi2').className='fill-input wrong';document.getElementById('fir2').textContent='❌';}
  if(f3){document.getElementById('fi3').className='fill-input correct';document.getElementById('fir3').textContent='✅';s++;}else{document.getElementById('fi3').className='fill-input wrong';document.getElementById('fir3').textContent='❌';}
  let r=document.getElementById('fill-result');
  if(s===3)r.innerHTML='<span style="color:var(--green);font-weight:600">✅ 三要素完整！一个好的工具描述 = 名称 + 用途 + 参数。Agent就能正确理解和调用了。</span>';
  else r.innerHTML='<span style="color:var(--red)">还要填'+(3-s)+'项。工具描述越完整，Agent调用越准确。</span>';
}
function checkPT(){
  let p1=document.getElementById('pti1').value.trim(),p2=document.getElementById('pti2').value.trim(),p3=document.getElementById('pti3').value.trim();
  let c=0;if(p1)c++;if(p2)c++;if(p3)c++;
  let r=document.getElementById('pt-result');
  if(c>=3)r.innerHTML='<span style="color:var(--green);font-weight:600">✅ 模板要素完整！角色（'+p1+'）+ 任务（'+p2+'）+ 风格（'+p3+'）——换不同的值就能复用到不同场景。</span>';
  else r.innerHTML='<span style="color:var(--accent)">💡 提示词模板至少需要角色、任务、风格三个参数才能复用。试试补全？</span>';
}
// Matching game
{let sl=null,sr=null;let pairs={A:1,B:2,C:3,D:4};let paired=new Set();
document.addEventListener('click',function(e){
  let el=e.target.closest('.match-item');if(!el)return;
  let col=el.closest('.match-col');
  if(col.id==='match-col-l'){document.querySelectorAll('#match-col-l .match-item').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');sl=el;}else{document.querySelectorAll('#match-col-r .match-item').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');sr=el;}
  if(sl&&sr&&!paired.has(sl.dataset.id)){
    if(pairs[sl.dataset.id]===parseInt(sr.dataset.id)){sl.classList.add('paired');sr.classList.add('paired');paired.add(sl.dataset.id);sl=null;sr=null;document.getElementById('match-msg').textContent='✅ 匹配成功！继续配对剩下的。';if(paired.size===4)document.getElementById('match-msg').textContent='🎉 全部配对正确！你理解了Agent角色分工。';}else{document.getElementById('match-msg').textContent='❌ 再想想——这个角色的核心工作是什么？';setTimeout(()=>{document.querySelectorAll('#match-col-l .match-item,#match-col-r .match-item').forEach(x=>x.classList.remove('sel'));sl=null;sr=null;},500);}
  }
});}
function perfPick(i){let r=document.getElementById('perf-result');if(i===0)r.innerHTML='✅ <strong>正确！</strong> 1万封邮件是批量任务，质量要求一般——成本优先。用便宜模型+批处理，跑完就行。如果选质量优先，1万封用大模型会贵得离谱。';else if(i===1)r.innerHTML='⚠️ 质量要求「一般」还选质量优先？1万封邮件用大模型跑，成本会非常高。批处理+便宜模型就能满足需求。';else r.innerHTML='⚠️ 批量处理不需要实时性，速度不是瓶颈。优先降成本。';r.className='d-selected show';}
function caseDecide(i){
  let o0=document.getElementById('case-opt0'),o1=document.getElementById('case-opt1'),r=document.getElementById('case-result');
  o0.style.pointerEvents='none';o1.style.pointerEvents='none';
  if(i===0){
    o0.style.borderColor='var(--green)';o0.style.background='rgba(64,192,128,0.1)';
    o1.style.borderColor='var(--red)';o1.style.background='rgba(240,96,96,0.08)';
    r.innerHTML='<span style="color:var(--green);font-weight:600">✅ 正确决策！</span><p>退款涉及资金安全，Agent可以生成退款申请，但<strong>必须人工审批</strong>。这在银行、电商都是行业惯例。</p>';
  }else{
    o1.style.borderColor='var(--green)';o1.style.background='rgba(64,192,128,0.1)';
    o0.style.borderColor='var(--red)';o0.style.background='rgba(240,96,96,0.08)';
    r.innerHTML='<span style="color:var(--red);font-weight:600">⚠️ 风险极大</span><p>某电商平台曾因AI客服误判退款，一天损失数十万。涉及资金的决策<strong>必须有人类确认</strong>。Agent可以辅助但不能自主。</p>';
  }
  r.style.padding='14px';r.style.borderRadius='8px';r.style.background='rgba(64,192,128,0.07)';r.style.border='1px solid var(--green)';
}

(function(){cur='sdlc';upd();render('sdlc');})();
</script>
