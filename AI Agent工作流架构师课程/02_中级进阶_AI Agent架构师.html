code {

<script>
const modules = [
  {
    title: '🧬 模块一：大语言模型的内部世界',
    lessons: [
      {
        id: 'how-llm-works',
        title: 'AI是怎么「思考」的？',
        emoji: '🧠',
        content: `
<h3>AI不是魔法——是一台概率预测机</h3>
<p>你问ChatGPT「今天天气怎么样？」，它怎么知道要回答什么？</p>

<div class="analogy">
  <div class="label">📱 手机输入法类比</div>
  <p>你有没有发现，输入法在你打了「我今天想去」之后，会推荐「吃饭」「逛街」「看电影」？<br>
  这不是因为它知道你要干什么——而是它<strong>统计过</strong>，在这些词后面，哪些字出现的概率最高。</p>
  <p>大语言模型本质上就是<strong>一个超级升级版的输入法</strong>——它预测「下一个词应该是什么」。</p>
</div>

<h3>Token：AI的"字母"</h3>
<p>AI不认汉字，也不认英文字母。它把所有文字切成最小的「零件」，叫<span class="hl">Token</span>。</p>
<pre>"我喜欢AI" → 可能被切成：["我", "喜欢", "AI"]
"Hello World" → 可能被切成：["He", "llo", " World"]</pre>
<p>一个英文单词 ≈ 1.3个Token，一个汉字 ≈ 1.5-2个Token。<br>
这就是为什么AI处理中文比英文「贵」——同样的意思，Token更多。</p>

<h3>三个关键参数，决定AI的"性格"</h3>
<div class="step-list">
  <div class="step-card">
    <div class="num">🌡️</div>
    <div class="title">温度 Temperature</div>
    <div class="desc">0 = 死板但准确<br>1 = 有创意但可能胡说<br>推荐：分析用0.3，写作用0.7</div>
  </div>
  <div class="step-card">
    <div class="num">🎯</div>
    <div class="title">Top-P</div>
    <div class="desc">AI只从「概率累加到P」的词里选<br>P=0.1 → 很保守<br>P=0.9 → 很开放</div>
  </div>
  <div class="step-card">
    <div class="num">🪟</div>
    <div class="title">上下文窗口</div>
    <div class="desc">AI一次能「记住」多少Token<br>小模型：8K（一本短篇小说）<br>大模型：128K-1M（一整部《三体》）</div>
  </div>
</div>

<div class="tip">
  <div class="label">💡 架构师要记住的</div>
  <p>当你设计Agent时：<br>
  • 分析任务用低温（0.1-0.3）→ 保证一致性<br>
  • 创意任务用高温（0.7-0.9）→ 更多样<br>
  • 长文档处理注意窗口大小 → 超了就要切分</p>
</div>
`
      },
      {
        id: 'attention',
        title: '注意力机制：AI的「高亮笔」',
        emoji: '🔦',
        content: `
<h3>读一段话时，你的大脑在干什么？</h3>
<p>看这句话：<strong>「猫追着老鼠，但它跑得更快」</strong></p>
<p>你瞬间就知道「它」指的是猫。你的大脑自动把「它」和「猫」连在了一起。<br>
AI也是这样做的——这叫<span class="hl">注意力机制（Attention）</span>。</p>

<div class="analogy">
  <div class="label">📖 阅读考试类比</div>
  <p>做阅读理解时，你会：<br>
  1. 先看问题问什么<br>
  2. 快速扫文章找到相关段落<br>
  3. <strong>把注意力集中在关键句子</strong>上</p>
  <p>AI的注意力机制就是自动决定「读哪个词时，应该关注哪些其他的词」。</p>
</div>

<h3>为什么这跟Agent有关？</h3>
<p>Agent最怕的一件事叫<span class="hl4">「上下文丢失」</span>——当对话太长，AI开始「忘记」前面说过什么。</p>
<p>注意力机制决定了AI在长对话中的「记忆力」：<br>
• 好的注意力 → 即使对话很长，也能抓住关键信息<br>
• 差的注意力 → 说着说着就「偏题」了</p>

<div class="deep">
  <div class="label">🔬 深入理解（选读）</div>
  <p>Transformer架构的核心公式：<br>
  <code>Attention(Q,K,V) = softmax(QK^T/√d_k) × V</code></p>
  <p>不用被公式吓到。核心思想就一句话：<strong>让每个词都能「看到」句子里的所有其他词，并自动判断哪些词和自己相关。</strong>这和传统方法（只能看相邻几个词）相比，是一个革命性的突破。</p>
</div>

<div class="tip">
  <div class="label">💡 在Agent设计中的应用</div>
  <p>• 长对话Agent → 优先选大窗口模型（128K+）<br>
  • 多步推理Agent → 关键信息要在prompt中重复强调<br>
  • 多Agent协作 → 每个Agent的对话窗口要分开管理</p>
</div>
`
      },
      {
        id: 'quiz-1',
        title: '🧪 小测验 #1',
        emoji: '🧪',
        quiz: {
          questions: [
            {
              q: '大语言模型在生成文字时，本质上在做什么？',
              options: ['理解问题后给出最优答案', '预测下一个最可能出现的Token', '从知识库中检索相关信息', '执行预先写好的规则'],
              correct: 1,
              explain: 'LLM本质是概率预测机——根据前文预测下一个Token。输入法的智能补全就是它的雏形。'
            },
            {
              q: '如果你想让Agent给出严谨、一致的分析结果，温度参数应该设多少？',

              correct: 2,
              explain: '低温(0.1-0.3)让AI倾向于选概率最高的词，输出更稳定一致。适合分析、计算、事实性任务。'
            },
            {
              q: '上下文窗口大小直接影响Agent的什么能力？',
              options: ['响应速度', '「记忆力」——能处理多长的对话/文档', '回答的准确率', '调用工具的种类数量'],
              correct: 1,
              explain: '上下文窗口就是AI一次能「看到」的最大Token数。窗口太小，长对话中就会丢失前面的内容。'
            }
          ]
        }
      }
    ]
  },
  {
    title: '✍️ 模块二：提示词工程的科学',
    lessons: [
      {
        id: 'prompt-science',
        title: '提示词不是玄学——是控制论',
        emoji: '🎛️',
        content: `
<h3>先打破一个迷思</h3>
<p>你听说「提示词工程师年薪百万」，好像有个神奇的咒语能让AI变聪明。</p>
<p>真相是：<span class="hl">提示词不是魔法咒语，而是一套输入控制方法。</span>就像给遥控车编程——不同的按键组合产生不同的动作。</p>

<div class="deep">
  <div class="label">🔬 Few-Shot Learning：给AI看例题</div>
  <p>零样本（Zero-Shot）：直接问，不给例子<br>
  "这句话的情感是正面还是负面？「这家餐厅太棒了」"</p>
  <p>少样本（Few-Shot）：先给2-3个例题<br>
  "「服务很差」→ 负面<br>
   「物超所值」→ 正面<br>

<table>

<h3>成本控制的三个铁律</h3>
<ol>
  <li><span class="hl">设置硬限额</span>：每个任务最多消耗多少Token、最多调用多少次工具</li>
  <li><span class="hl">缓存重复调用</span>：同一问题短时间内多次问 → 返回缓存结果，不重新跑</li>
  <li><span class="hl">分级模型</span>：简单任务用小模型（便宜），复杂任务用大模型（贵但有价值）</li>
</ol>

<div class="deep">
  <div class="label">🔬 Dify生产级部署指南要点</div>

  • 发布为「API」→ 让其他工具能集成<br>
  • 配置「环境变量」→ 敏感信息（API Key）不写死在代码里</p>
</div>

  questions: [
    { q: '大语言模型生成文字时，本质在做什么？', options: ['从数据库检索答案', '预测下一个最可能的Token', '执行预设规则', '人类在后台打字'], correct: 1 },

    { q: '上线前，API Key类敏感信息应如何处理？', options: ['写在代码注释里', '存储在环境变量中', '打印出来放在抽屉里', '发给全团队'], correct: 1 }

// ===== APP STATE =====
let completedLessons = new Set(JSON.parse(localStorage.getItem('agent_adv_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('agent_adv_quiz_results') || '{}');
let currentSection = null;

function save() {
  localStorage.setItem('agent_adv_completed', JSON.stringify([...completedLessons]));
  localStorage.setItem('agent_adv_quiz_results', JSON.stringify(quizResults));
}

function calcProgress() {
  let total = 0;
  modules.forEach(m => total += m.lessons.length);
  total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round(done / total * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach(mod => {
    html += `<div class="nav-module-title">${mod.title}</div>`;
    mod.lessons.forEach(lesson => {
      const done = completedLessons.has(lesson.id);
      const active = currentSection === lesson.id;
      html += `<div class="nav-item${active?' active':''}${done?' done':''}" onclick="navigateTo('${lesson.id}')">
        <span class="check">${done ? '✅' : lesson.emoji}</span>${lesson.title}</div>`;
    });
  });
  const finalDone = finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined);
  html += `<div class="nav-item${currentSection==='final'?' active':''}${finalDone?' done':''}" onclick="navigateTo('final')">
    <span class="check">${finalDone ? '✅' : '🏆'}</span>终极测验</div>`;
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
    updateUI();
  }
}

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }

  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li];
        modIndex = mi; lesIndex = li; break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>未找到</p>'; return; }

  let html = '';
  if (lesson.quiz) {
    const saved = quizResults[id] || [];
    html += `<div class="lesson-card"><h2><span>${lesson.emoji}</span> ${lesson.title}</h2><div class="meta">${modules[modIndex].title}</div>`;
    lesson.quiz.questions.forEach((q, qi) => {
      const ua = saved[qi]; const answ = ua !== undefined; const ok = answ && ua === q.correct;
      html += `<div class="quiz-card"><h3>📝 第${qi+1}题</h3><div class="quiz-question">${q.q}</div>`;
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answ && oi === q.correct) cls += ' correct';
        if (answ && oi === ua && oi !== q.correct) cls += ' wrong';
        html += `<button class="${cls}" onclick="answer('${id}',${qi},${oi})" ${answ?'disabled':''}>${['A','B','C','D'][oi]}. ${opt}</button>`;
      });
      if (answ) html += `<div class="quiz-result show ${ok?'pass':'fail'}"><strong>${ok?'✅ 正确':'❌ 不对'}</strong><p>${q.explain}</p></div>`;
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += `<div class="lesson-card"><h2><span>${lesson.emoji}</span> ${lesson.title}</h2><div class="meta">${modules[modIndex].title}</div>${lesson.content}</div>`;
    markComplete(id);
  }

  html += '<div class="nav-btns">';
  let prev = null;
  if (lesIndex > 0) prev = modules[modIndex].lessons[lesIndex-1].id;
  else if (modIndex > 0) { const pm = modules[modIndex-1]; prev = pm.lessons[pm.lessons.length-1].id; }
  html += prev ? `<button class="btn btn-secondary" onclick="navigateTo('${prev}')">⬅ 上一节</button>` : '<div></div>';

  let next = null;
  if (lesIndex < modules[modIndex].lessons.length-1) next = modules[modIndex].lessons[lesIndex+1].id;
  else if (modIndex < modules.length-1) next = modules[modIndex+1].lessons[0].id;
  html += next
    ? `<button class="btn btn-primary" onclick="navigateTo('${next}')">下一节 ➡</button>`
    : `<button class="btn btn-success" onclick="navigateTo('final')">🏆 终极测验 ➡</button>`;
  html += '</div>';
  main.innerHTML = html;
  markComplete(id);
}

function answer(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save();
  renderContent(lessonId);
}

function startFinalExam() { navigateTo('final'); }

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8题 · 覆盖7个模块 · 70%及格</div>';
  let allDone = true;
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_'+qi]; const answ = ua !== undefined; if (!answ) allDone = false;
    html += `<div class="quiz-card"><h3>📝 第${qi+1}题</h3><div class="quiz-question">${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answ && oi === q.correct) cls += ' correct';
      if (answ && oi === ua && oi !== q.correct) cls += ' wrong';
      html += `<button class="${cls}" onclick="answerFinal(${qi},${oi})" ${answ?'disabled':''}>${['A','B','C','D'][oi]}. ${opt}</button>`;
    });
    html += '</div>';
  });
  html += '</div>';

  if (allDone) {
    const score = finalExam.questions.filter((q,i) => quizResults['final_'+i] === q.correct).length;
    const pct = Math.round(score/8*100);
    const passed = pct >= 70;
    const grade = pct >= 90 ? '🏅 S级' : pct >= 80 ? '🥇 A级' : pct >= 70 ? '🥈 B级' : '📝 继续加油';
    html += `<div class="certificate show">
      <div style="font-size:3em">${passed?'🎉':'💪'}</div><h2>${passed?'恭喜完成中级课程！':'还需要再巩固'}</h2>
      <div class="grade">${grade}</div>
      <div style="font-size:1.5em;color:var(--accent)">${score}/8（${pct}%）</div>
      <p style="margin-top:16px;color:var(--sub)">${passed?'你现在对Agent的底层原理有了系统性的理解！':'薄弱环节已标出，针对性复习后再战。'}</p>
      <div style="margin-top:20px">
        <button class="btn btn-secondary" onclick="resetFinalExam()">🔄 重新测验</button>
        <button class="btn btn-primary" onclick="resetAll()" style="margin-left:8px">🔁 重学全部</button>
      </div></div>`;

    const wrong = finalExam.questions.map((q,i)=>({q,i})).filter(x=>quizResults['final_'+x.i]!==x.q.correct);
    if (wrong.length) {
      const map = ['→ 模块一：LLM如何工作','→ 模块一：温度参数','→ 模块二：Few-Shot','→ 模块三：嵌入向量','→ 模块四：Function Calling','→ 模块五：单Agent优先','→ 模块六：评估指标','→ 模块七：安全部署'];
      html += '<div class="tip" style="margin-top:16px"><div class="label">📚 薄弱环节</div>';
      wrong.forEach(w => { html += `<p>❌ 第${w.i+1}题 ${map[w.i]}</p>`; });
      html += '</div>';
    }
  }
  main.innerHTML = html;
  if (allDone) updateUI();
}

function answerFinal(qi, oi) { quizResults['final_'+qi] = oi; save(); renderFinalExam(document.getElementById('mainContent')); updateUI(); }
function resetFinalExam() { finalExam.questions.forEach((_,i)=>delete quizResults['final_'+i]); save(); updateUI(); renderFinalExam(document.getElementById('mainContent')); }
function resetAll() { localStorage.removeItem('agent_adv_completed'); localStorage.removeItem('agent_adv_quiz_results'); completedLessons=new Set(); quizResults={}; currentSection=null; navigateTo('how-llm-works'); }

(function init() {
  currentSection = 'how-llm-works';
  updateUI();
  renderContent('how-llm-works');
})();
</script>
