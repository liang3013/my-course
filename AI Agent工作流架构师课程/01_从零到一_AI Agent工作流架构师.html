<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦾 AI Agent 工作流架构师 · 从零到一</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #22263a;
  --border: #2a2e3f;
  --text: #e1e4ed;
  --sub: #8b90a0;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --green: #00b894;
  --red: #e17055;
  --yellow: #fdcb6e;
  --orange: #e28413;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(108,92,231,0.35); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3e50; }
body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #141725 0%, var(--bg) 70%);
  color: var(--text);
  line-height: 1.75;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar {
  width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky; top:0; height:100vh;
  overflow-y: auto;
  flex-shrink: 0;
}
.main {
  flex:1;
  padding: 32px 48px;
  max-width: 900px;
}

/* Sidebar */
.logo {
  font-size: 1.2em;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.logo .icon { font-size: 1.4em; }
.subtitle { color: var(--sub); font-size: 0.82em; margin-bottom: 20px; opacity: 0.8; }

.progress-bar-wrap {
  background: var(--border); border-radius: 8px; height: 6px;
  margin-bottom: 22px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 8px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 12px rgba(108,92,231,0.25);
}
.progress-text { font-size: 0.78em; color: var(--sub); margin-bottom: 4px; }

.nav-module {
  margin-bottom: 18px;
}
.nav-module-title {
  font-size: 0.72em; text-transform: uppercase;
  color: var(--sub); letter-spacing: 1.5px;
  margin-bottom: 8px; padding: 0 8px;
  opacity: 0.7;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 0.88em; color: var(--sub);
  border-left: 3px solid transparent;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--card-hover); color: var(--text); border-left-color: rgba(108,92,231,0.3); }
.nav-item.active { background: rgba(108,92,231,0.12); color: var(--accent2); font-weight: 600; border-left-color: var(--accent2); }
.nav-item.done { color: var(--green); }
.nav-item .check { width: 20px; text-align: center; font-size: 0.8em; }

.divider { border-top: 1px solid var(--border); margin: 16px 0; }

/* Main Content */
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.lesson-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 34px;
  margin-bottom: 24px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.lesson-card:hover {
  border-color: rgba(108,92,231,0.2);
  box-shadow: 0 2px 20px rgba(108,92,231,0.06);
}
.lesson-card h2 {
  font-size: 1.5em; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.lesson-card h2 .emoji { font-size: 1.3em; }
.lesson-card .meta {
  color: var(--sub); font-size: 0.85em; margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.lesson-card h3 {
  font-size: 1.1em; margin: 28px 0 14px; color: var(--accent2);
  position: relative;
  padding-left: 14px;
}
.lesson-card h3::before {
  content: '';
  position: absolute; left: 0; top: 3px; bottom: 3px;
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
}
.lesson-card p { margin-bottom: 14px; }
.lesson-card ul, .lesson-card ol { padding-left: 24px; margin-bottom: 14px; }
.lesson-card li { margin-bottom: 8px; }

/* Analogy Box */
.analogy {
  background: linear-gradient(135deg, rgba(0,206,201,0.06), rgba(108,92,231,0.06));
  border: 1px solid rgba(0,206,201,0.15);
  border-left: 3px solid var(--accent2);
  border-radius: var(--radius); padding: 18px 22px;
  margin: 20px 0;
  transition: border-color 0.2s;
}
.analogy:hover { border-color: rgba(0,206,201,0.25); }
.analogy .label {
  font-size: 0.78em; color: var(--accent2); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

/* Diagram */
.diagram {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; margin: 16px 0;
  text-align: center;
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
  font-size: 0.85em; line-height: 1.9;
  overflow-x: auto;
  white-space: pre;
}
.diagram-svg {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 12px; margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}
.diagram-svg svg {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}
.diagram-svg text {
  font-family: inherit;
}
.diagram-svg .sub {
  fill: var(--sub);
}
.diagram-svg .accent {
  fill: var(--accent);
}

/* Callout */
.tip, .warning {
  border-radius: var(--radius); padding: 18px 22px; margin: 20px 0;
  position: relative;
}
.tip { background: rgba(0,184,148,0.06); border: 1px solid rgba(0,184,148,0.2); border-left: 3px solid var(--green); }
.warning { background: rgba(225,112,85,0.06); border: 1px solid rgba(225,112,85,0.2); border-left: 3px solid var(--red); }
.tip .label, .warning .label { font-weight: 700; margin-bottom: 6px; font-size: 0.85em; display: flex; align-items: center; gap: 6px; }
.tip .label { color: var(--green); }
.warning .label { color: var(--red); }

/* Quiz */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 28px 30px; margin: 28px 0;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.quiz-card:hover {
  border-color: rgba(108,92,231,0.3);
  box-shadow: 0 2px 16px rgba(108,92,231,0.05);
}
.quiz-card h3 {
  font-size: 1.15em; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.quiz-question { margin: 18px 0 10px; font-weight: 600; font-size: 0.95em; }
.quiz-option {
  display: block; width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 18px;
  margin: 8px 0; cursor: pointer;
  color: var(--text); font-size: 0.93em;
  transition: all 0.2s ease;
}
.quiz-option:hover { border-color: var(--accent); background: var(--card-hover); transform: translateX(4px); }
.quiz-option.correct { border-color: var(--green); background: rgba(0,184,148,0.08); color: var(--green); }
.quiz-option.wrong { border-color: var(--red); background: rgba(225,112,85,0.08); color: var(--red); }
.quiz-option:disabled { cursor: default; opacity: 0.8; transform: none; }

.quiz-result {
  margin-top: 16px; padding: 16px; border-radius: 8px;
  display: none;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: rgba(0,184,148,0.1); border: 1px solid var(--green); }
.quiz-result.fail { background: rgba(225,112,85,0.1); border: 1px solid var(--red); }

.score-bar {
  display: flex; align-items: center; gap: 12px;
  margin: 8px 0;
}
.score-label { font-size: 0.85em; min-width: 60px; }
.score-track {
  flex: 1; background: var(--border); height: 8px; border-radius: 4px;
  overflow: hidden;
}
.score-fill {
  height: 100%; border-radius: 4px; transition: width 0.5s;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 26px;
  border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.93em; font-weight: 600;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }
.btn-primary:hover { background: #5b4bd5; box-shadow: 0 4px 16px rgba(108,92,231,0.4); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #3a3e50; }
.btn-success { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(0,184,148,0.3); }
.btn-success:hover { background: #00a381; box-shadow: 0 4px 16px rgba(0,184,148,0.4); }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

/* Step Cards */
.step-list { display: flex; gap: 14px; flex-wrap: wrap; margin: 18px 0; }
.step-card {
  flex: 1; min-width: 180px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px; text-align: center;
  transition: all 0.2s ease;
}
.step-card:hover { border-color: rgba(108,92,231,0.3); transform: translateY(-2px); }
.step-card .num {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #5a4bd1);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-weight: 700; font-size: 0.85em;
  box-shadow: 0 2px 8px rgba(108,92,231,0.3);
}
.step-card .title { font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
.step-card .desc { font-size: 0.82em; color: var(--sub); line-height: 1.6; }

/* Nav btns */
.nav-btns { display: flex; justify-content: space-between; margin-top: 32px; }

/* Final exam */
.final-exam { display: none; }
.final-exam.active { display: block; }
.certificate {
  display: none;
  background: linear-gradient(135deg, rgba(108,92,231,0.08), rgba(0,206,201,0.06));
  border: 2px solid var(--accent2);
  border-radius: var(--radius);
  padding: 48px 40px; text-align: center; margin: 28px 0;
  box-shadow: 0 4px 32px rgba(0,206,201,0.08);
}
.certificate.show { display: block; animation: fadeIn 0.5s ease; }
.certificate h2 { font-size: 2em; color: var(--accent2); margin-bottom: 8px; }
.certificate .grade { font-size: 3.5em; margin: 20px 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

/* Table */
.table-wrap { overflow-x: auto; margin: 18px 0; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
th { background: rgba(108,92,231,0.08); padding: 12px 16px; text-align: left; font-weight: 600; color: var(--accent2); font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(108,92,231,0.03); }

/* Highlight */
.hl { color: var(--accent2); font-weight: 600; }
.hl2 { color: var(--yellow); font-weight: 600; }
.hl3 { color: var(--green); font-weight: 600; }
.hl4 { color: var(--orange); font-weight: 600; }

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 20px 16px; }
  .step-list { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app">
<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo"><span class="icon">🦾</span> Agent 架构师</div>
  <div class="subtitle">从小学生都能懂的课程开始</div>
  <div class="progress-text">课程进度 <span id="progressPct">0%</span></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div id="navContainer"></div>
  <div class="divider"></div>
  <button class="btn btn-primary" style="width:100%" onclick="startFinalExam()">🏆 终极测验</button>
  <button class="btn btn-secondary" style="width:100%;margin-top:8px;font-size:0.8em" onclick="if(confirm('确定要重置所有课程进度吗？这个操作不可撤销。'))resetAll()">🔄 重置进度</button>
</aside>

<!-- Main Content -->
<main class="main" id="mainContent"></main>
</div>

<script>
// ===== COURSE DATA =====
const modules = [
  {
    title: '🍳 序幕：凉拌黄瓜和工作流',
    lessons: [
      {
        id: 'welcome',
        title: '欢迎来到AI厨房',
        emoji: '👋',
        content: `
<p>你好！想象一下你第一次走进厨房——锅碗瓢盆、油盐酱醋，看起来很复杂。</p>
<p>但如果你只需要<strong>做一道凉拌黄瓜</strong>呢？</p>
<div class="analogy">
  <div class="label">🍳 厨房类比</div>
  <p><span class="hl">做凉拌黄瓜</span> = 洗黄瓜 → 拍黄瓜 → 加调料 → 拌匀 → 上桌</p>
  <p>这就是一个<span class="hl">「工作流」</span>——<strong>你知道每一步要做什么，按顺序走就行了</strong>。</p>
</div>
<p>但如果我跟你说了句<span class="hl2">「做一顿好吃的饭」</span>——你就得自己决定：做什么菜？用什么食材？先做哪个？调料放多少？</p>
<p>这就是<span class="hl">「Agent」</span>——<strong>它自己决定每一步做什么</strong>。</p>
<p>在这套课程里，你会从「凉拌黄瓜」开始，一步一步学会指挥AI做「满汉全席」。</p>
<div class="tip">
  <div class="label">💡 本课程承诺</div>
  <p>• 不写一行代码也能学会（会用到的代码我们帮你写好了）<br>
  • 每个概念都配生活类比<br>
  • 学完能做两个实际项目<br>
  • 零基础友好，小学生都能懂</p>
</div>
`
      },
      {
        id: 'workflow-vs-agent',
        title: '工作流 vs Agent：遥控车 vs 自动驾驶',
        emoji: '🚗',
        content: `
<h3>两个概念，一辈子不会忘</h3>
<div class="step-list">
  <div class="step-card">
    <div class="num">1</div>
    <div class="title">🎮 遥控车 = 工作流</div>
    <div class="desc">你按遥控器，它才动<br>路线是固定的<br>永远不会迷路</div>
  </div>
  <div class="step-card">
    <div class="num">2</div>
    <div class="title">🚘 自动驾驶 = Agent</div>
    <div class="desc">它自己决定怎么走<br>路线随时可能变<br>堵车了会绕路</div>
  </div>
</div>

<div class="analogy">
  <div class="label">📋 生活中的对比</div>
  <table>
    <tr><th>场景</th><th>工作流（遥控车）</th><th>Agent（自动驾驶）</th></tr>
    <tr><td>做菜</td><td>按菜谱一步一步来</td><td>打开冰箱看有什么，自己决定做什么</td></tr>
    <tr><td>写作业</td><td>按老师布置的顺序做</td><td>先做难的再做简单的，灵活调整</td></tr>
    <tr><td>网购</td><td>收藏夹→购物车→下单→付款</td><td>对比三家→看评论→选性价比最高的→下单</td></tr>
  </table>
</div>

<h3>什么时候用哪个？</h3>
<p><span class="hl3">用工作流</span>：步骤固定、每次做的事都一样<br>
<span class="hl3">用Agent</span>：步骤不固定、需要根据情况灵活决定</p>
<p>比如你写一份「AI情报日报」：采集新闻→筛选→格式化→保存——这是<strong>工作流</strong>。<br>
但如果你问「帮我研究一下这家公司值不值得买」——这是<strong>Agent</strong>的活。</p>
`
      },
      {
        id: 'quiz-1',
        title: '🧪 小测验 #1',
        emoji: '🧪',
        quiz: {
          questions: [
            {
              q: '以下哪个场景最适合用「工作流」而不是Agent？',
              options: ['帮我做一份旅游攻略', '每天早上自动生成AI新闻早报', '给我推荐一本适合我现在读的书', '分析为什么这个产品销量下滑了'],
              correct: 1,
              explain: '生成早报的步骤是固定的（采集→筛选→格式化→保存），完全可以用工作流搞定！另外三个选项都需要灵活判断，更适合Agent。'
            },
            {
              q: '一辆「自动驾驶汽车」对应AI中的什么概念？',
              options: ['工作流（Workflow）', '智能体（Agent）', '数据库', 'API'],
              correct: 1,
              explain: '自动驾驶自己决定路线、遇到障碍物自己绕行——这就是Agent的核心特征：自主决策。'
            },
            {
              q: '做一道凉拌黄瓜最适合比喻什么？',
              options: ['Agent自主决策复杂任务', '工作流按固定步骤执行', 'AI模型训练', '数据采集分析'],
              correct: 1,
              explain: '凉拌黄瓜步骤固定：洗→拍→调味→拌匀→上桌。每一步都知道要做什么，典型的工作流！'
            }
          ]
        }
      }
    ]
  },
  {
    title: '🔧 模块二：Agent的工具箱',
    lessons: [
      {
        id: 'augmented-llm',
        title: '给AI装上手脚和眼睛',
        emoji: '🦿',
        content: `
<h3>普通的AI就像一个被关在房间里的人</h3>
<p>他能思考、能说话，但<strong>没有手脚、没有眼睛、没有耳朵</strong>——只能靠自己的记忆来回答。</p>

<div class="analogy">
  <div class="label">🏠 房间里的人</div>
  <p><strong>普通AI</strong>：被锁在房间里，只能凭记忆回答。<br>
  你问「今天天气怎么样？」→ 它瞎猜 😓<br>
  你问「帮我查一下今天的天气？」→ 它不知道 😰</p>
  <p><strong>增强版AI</strong>：房间装了窗户（<span class="hl">检索</span>）、给了他一双手（<span class="hl">工具</span>）、还有一个笔记本（<span class="hl">记忆</span>）。<br>
  你问「今天天气怎么样？」→ 从窗户看一眼告诉你 ✅<br>
  你问「帮我查一下商品价格？」→ 用手打开网页查 ✅</p>
</div>

<h3>增强型AI的三件法宝</h3>
<div class="step-list">
  <div class="step-card">
    <div class="num">🔍</div>
    <div class="title">检索 Retrieval</div>
    <div class="desc">让AI能「查资料」<br>不瞎编、有依据</div>
  </div>
  <div class="step-card">
    <div class="num">🔧</div>
    <div class="title">工具 Tools</div>
    <div class="desc">让AI能「做事」<br>查数据、发消息、写文件</div>
  </div>
  <div class="step-card">
    <div class="num">🧠</div>
    <div class="title">记忆 Memory</div>
    <div class="desc">让AI能「记住」<br>不每次从头开始</div>
  </div>
</div>

<div class="tip">

// ===== APP STATE =====
let completedLessons = new Set(JSON.parse(localStorage.getItem('agent_course_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('agent_course_quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);

function save() {
  localStorage.setItem('agent_course_completed', JSON.stringify([...completedLessons]));
  localStorage.setItem('agent_course_quiz_results', JSON.stringify(quizResults));
}

function calcProgress() {
  let totalLessons = 0;
  modules.forEach(m => { totalLessons += m.lessons.length; });
  totalLessons += finalExam.questions.length; // count exam questions
  let done = completedLessons.size;
  // count answered final exam questions
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / totalLessons) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  // Build nav
  const nav = document.getElementById('navContainer');
  let html = '';
  let lessonIdx = 0;
  modules.forEach((mod, mi) => {
    html += `<div class="nav-module-title">${mod.title}</div>`;
    mod.lessons.forEach((lesson, li) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += `<div class="nav-item${active?' active':''}${done?' done':''}" onclick="navigateTo('${id}')">
        <span class="check">${done ? '✅' : lesson.emoji}</span>
        ${lesson.title}
      </div>`;
      lessonIdx++;
    });
  });
  html += `<div class="nav-item${currentSection==='final'?' active':''}${finalExamDone?' done':''}" onclick="navigateTo('final')">
    <span class="check">${finalExamDone ? '✅' : '🏆'}</span> 终极测验
  </div>`;
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
    updateUI();
  }
}

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') {
    renderFinalExam(main);
    return;
  }

  // Find the lesson
  let lesson = null;
  let modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li];
        modIndex = mi; lesIndex = li;
        break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }

  let html = '';

  if (lesson.quiz) {
    // Render quiz
    const savedAnswers = quizResults[id] || [];
    html += `<div class="lesson-card"><h2><span class="emoji">${lesson.emoji}</span> ${lesson.title}</h2>`;
    html += `<div class="meta">测试你对${modules[modIndex].title.replace(/^[^\s]+\s/,'')}的理解—共${lesson.quiz.questions.length}题</div>`;
    lesson.quiz.questions.forEach((q, qi) => {
      const userAnswer = savedAnswers[qi];
      const answered = userAnswer !== undefined;
      const isCorrect = answered && userAnswer === q.correct;
      html += `<div class="quiz-card" id="quiz-${qi}">
        <h3>📝 第 ${qi + 1} 题</h3>
        <div class="quiz-question">${q.q}</div>`;
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answered && oi === q.correct) cls += ' correct';
        if (answered && oi === userAnswer && oi !== q.correct) cls += ' wrong';
        html += `<button class="${cls}" onclick="answerQuiz('${id}', ${qi}, ${oi})" ${answered ? 'disabled' : ''}>${['A','B','C','D'][oi]}. ${opt}</button>`;
      });
      if (answered) {
        const resultCls = isCorrect ? 'pass' : 'fail';
        html += `<div class="quiz-result show ${resultCls}" id="result-${id}-${qi}">
          <strong>${isCorrect ? '✅ 正确！' : '❌ 不太对'}</strong>
          <p>${q.explain}</p>
        </div>`;
      }
      html += `</div>`;
    });
    html += '</div>';
  } else {
    // Render lesson
    html += `<div class="lesson-card"><h2><span class="emoji">${lesson.emoji}</span> ${lesson.title}</h2>`;
    html += `<div class="meta">${modules[modIndex].title.replace(/^[^\s]+\s/,'')}</div>`;
    html += lesson.content;
    html += '</div>';
    // Mark as complete on view
    markComplete(id);
  }

  // Nav buttons
  html += '<div class="nav-btns">';
  // Prev
  let prevId = null;
  if (lesIndex > 0) {
    prevId = modules[modIndex].lessons[lesIndex - 1].id;
  } else if (modIndex > 0) {
    const prevMod = modules[modIndex - 1];
    prevId = prevMod.lessons[prevMod.lessons.length - 1].id;
  }
  if (prevId) html += `<button class="btn btn-secondary" onclick="navigateTo('${prevId}')">⬅ 上一节</button>`;
  else html += '<div></div>';

  // Next
  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) {
    nextId = modules[modIndex].lessons[lesIndex + 1].id;
  } else if (modIndex < modules.length - 1) {
    nextId = modules[modIndex + 1].lessons[0].id;
  }
  if (nextId) {
    html += `<button class="btn btn-primary" onclick="navigateTo('${nextId}')">下一节 ➡</button>`;
  } else {
    html += `<button class="btn btn-success" onclick="navigateTo('final')">🏆 去终极测验 ➡</button>`;
  }
  html += '</div>';

  main.innerHTML = html;
  markComplete(id);
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save();

  // Re-render
  renderContent(lessonId);
}

// ===== FINAL EXAM =====
function startFinalExam() {
  navigateTo('final');
}

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2>';
  html += '<div class="meta">8道题 · 覆盖全部模块 · 70%及格</div>';

  let allAnswered = true;
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    if (!answered) allAnswered = false;
    const isCorrect = answered && ua === q.correct;
    html += `<div class="quiz-card" id="final-q-${qi}">
      <h3>📝 第 ${qi + 1} 题</h3>
      <div class="quiz-question">${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += `<button class="${cls}" onclick="answerFinal(${qi}, ${oi})" ${answered ? 'disabled' : ''}>${['A','B','C','D'][oi]}. ${opt}</button>`;
    });
    html += '</div>';
  });

  html += '</div>';

  // Score + certificate
  if (allAnswered) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const pct = Math.round(score / total * 100);
    const passed = pct >= 70;
    const grade = pct >= 90 ? '🏅 S级' : pct >= 80 ? '🥇 A级' : pct >= 70 ? '🥈 B级' : '📝 继续加油';

    html += `<div class="certificate show">
      <div style="font-size:3em">${passed ? '🎉' : '💪'}</div>
      <h2>${passed ? '恭喜毕业！' : '还需要再练练'}</h2>
      <div class="grade">${grade}</div>
      <div style="font-size:1.5em;color:var(--accent2)">${score} / ${total} 题正确（${pct}%）</div>
      <p style="margin-top:16px;color:var(--sub)">${passed ? '你已经掌握了AI Agent工作流架构师的核心知识！' : '再看看薄弱环节，重做一次你就能过！'}</p>
      <div style="margin-top:20px">
        <button class="btn btn-secondary" onclick="resetFinalExam()">🔄 重新测验</button>
        <button class="btn btn-primary" onclick="resetAll()" style="margin-left:8px">🔁 重学全部课程</button>
      </div>
    </div>`;

    // Weak areas
    const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
    if (wrong.length > 0) {
      html += '<div class="tip" style="margin-top:16px"><div class="label">📚 建议补强的知识点</div>';
      const topicMap = {
        0: '→ 复习「模块一：工作流 vs Agent」',
        1: '→ 复习「模块二：增强型AI的三件法宝」',
        2: '→ 复习「模块二：MCP协议」',
        3: '→ 复习「模块三：提示链模式」',
        4: '→ 复习「模块三：编排器-工作者模式」',
        5: '→ 复习「模块四：人机分工原则」',
        6: '→ 复习「模块四：信任校准」',
        7: '→ 复习「模块四：分工原则 - 什么绝对不能交给AI」'
      };
      wrong.forEach(w => {
        html += `<p>❌ 第${w.i+1}题 ${topicMap[w.i]}</p>`;
      });
      html += '</div>';
    }
  }

  main.innerHTML = html;
  if (allAnswered) updateUI();
}

function answerFinal(qi, oi) {
  quizResults['final_' + qi] = oi;
  save();
  renderFinalExam(document.getElementById('mainContent'));
  updateUI();
}

function resetFinalExam() {
  finalExam.questions.forEach((_, i) => delete quizResults['final_' + i]);
  save();
  updateUI();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('agent_course_completed');
  localStorage.removeItem('agent_course_quiz_results');
  completedLessons = new Set();
  quizResults = {};
  finalExamDone = false;
  currentSection = null;
  navigateTo('welcome');
}

// ===== INIT =====
(function init() {
  const startId = 'welcome';
  currentSection = startId;
  updateUI();
  renderContent(startId);
})();
</script>
</body>
</html>
