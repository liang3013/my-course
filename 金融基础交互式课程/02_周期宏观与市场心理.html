<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔄 周期、宏观与行业轮动 · 金融基础交互式课程</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card-hover: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --sub: #8b949e;
  --accent: #58a6ff;
  --accent2: #1a6fc4;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d2991d;
  --orange: #e28413;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(88,166,255,0.3); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4a60; }
body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #101825 0%, var(--bg) 70%);
  color: var(--text);
  line-height: 1.75;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar {
  width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky; top:0; height:100vh;
  overflow-y: auto;
  flex-shrink: 0;
}
.main {
  flex:1;
  padding: 32px 48px;
  max-width: 920px;
}

/* Sidebar */
.logo {
  font-size: 1.2em;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
  color: var(--accent);
}
.logo .icon { font-size: 1.4em; }
.subtitle { color: var(--sub); font-size: 0.82em; margin-bottom: 20px; opacity: 0.8; }

.progress-bar-wrap {
  background: var(--border); border-radius: 8px; height: 6px;
  margin-bottom: 6px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 8px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 12px rgba(88,166,255,0.2);
}
.progress-text { font-size: 0.78em; color: var(--sub); margin-bottom: 20px; }

.nav-module { margin-bottom: 18px; }
.nav-module-title {
  font-size: 0.72em; text-transform: uppercase;
  color: var(--sub); letter-spacing: 1.5px;
  margin-bottom: 8px; padding: 0 8px;
  opacity: 0.7;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 0.88em; color: var(--sub);
  border-left: 3px solid transparent;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--card-hover); color: var(--text); border-left-color: rgba(88,166,255,0.3); }
.nav-item.active { background: rgba(88,166,255,0.12); color: var(--accent); font-weight: 600; border-left-color: var(--accent); }
.nav-item.done { color: var(--green); }
.nav-item .check { width: 20px; text-align: center; font-size: 0.8em; }

.divider { border-top: 1px solid var(--border); margin: 16px 0; }

/* Main Content */
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.lesson-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 34px;
  margin-bottom: 24px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.lesson-card:hover {
  border-color: rgba(88,166,255,0.2);
  box-shadow: 0 2px 20px rgba(88,166,255,0.06);
}
.lesson-card h2 {
  font-size: 1.5em; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.lesson-card h2 .emoji { font-size: 1.3em; }
.lesson-card .meta {
  color: var(--sub); font-size: 0.85em; margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.lesson-card h3 {
  font-size: 1.15em; margin: 28px 0 14px; color: var(--accent);
  position: relative;
  padding-left: 14px;
}
.lesson-card h3::before {
  content: '';
  position: absolute; left: 0; top: 3px; bottom: 3px;
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent2), var(--accent));
}
.lesson-card h4 {
  font-size: 1em; margin: 20px 0 10px; color: var(--yellow);
}
.lesson-card p { margin-bottom: 14px; }
.lesson-card ul, .lesson-card ol { padding-left: 24px; margin-bottom: 14px; }
.lesson-card li { margin-bottom: 8px; }

/* Analogy Box */
.analogy {
  background: linear-gradient(135deg, rgba(88,166,255,0.04), rgba(26,111,196,0.04));
  border: 1px solid rgba(88,166,255,0.15);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius); padding: 18px 22px;
  margin: 20px 0;
  transition: border-color 0.2s;
}
.analogy:hover { border-color: rgba(88,166,255,0.25); }
.analogy .label {
  font-size: 0.78em; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

/* Diagram */
.diagram {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; margin: 16px 0;
  text-align: center;
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
  font-size: 0.85em; line-height: 1.9;
  overflow-x: auto;
  white-space: pre;
}
.diagram-svg {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 12px; margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}
.diagram-svg svg {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}
.diagram-svg text {
  font-family: inherit;
}

/* Callout */
.tip, .warning, .deep {
  border-radius: var(--radius); padding: 18px 22px; margin: 20px 0;
  position: relative;
}
.tip { background: rgba(63,185,80,0.06); border: 1px solid rgba(63,185,80,0.2); border-left: 3px solid var(--green); }
.warning { background: rgba(248,81,73,0.06); border: 1px solid rgba(248,81,73,0.2); border-left: 3px solid var(--red); }
.deep { background: rgba(210,153,29,0.06); border: 1px solid rgba(210,153,29,0.2); border-left: 3px solid var(--yellow); }
.tip .label, .warning .label, .deep .label { font-weight: 700; margin-bottom: 6px; font-size: 0.85em; display: flex; align-items: center; gap: 6px; }
.tip .label { color: var(--green); }
.warning .label { color: var(--red); }
.deep .label { color: var(--yellow); }

/* Quote box */
.quote-box {
  border-left: 3px solid var(--accent);
  padding: 16px 20px; margin: 20px 0;
  background: rgba(88,166,255,0.05);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
}
.quote-box .author {
  color: var(--accent);
  font-size: 0.85rem;
  margin-top: 8px;
  font-style: normal;
}

/* Quiz */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 28px 30px; margin: 28px 0;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.quiz-card:hover {
  border-color: rgba(88,166,255,0.3);
  box-shadow: 0 2px 16px rgba(88,166,255,0.05);
}
.quiz-card h3 {
  font-size: 1.15em; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text);
}
.quiz-question { margin: 18px 0 10px; font-weight: 600; font-size: 0.95em; }
.quiz-option {
  display: block; width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 18px;
  margin: 8px 0; cursor: pointer;
  color: var(--text); font-size: 0.93em;
  transition: all 0.2s ease;
}
.quiz-option:hover { border-color: var(--accent); background: var(--card-hover); transform: translateX(4px); }
.quiz-option.correct { border-color: var(--green); background: rgba(63,185,80,0.08); color: var(--green); }
.quiz-option.wrong { border-color: var(--red); background: rgba(248,81,73,0.08); color: var(--red); }
.quiz-option:disabled { cursor: default; opacity: 0.85; transform: none; }

.quiz-result {
  margin-top: 16px; padding: 16px; border-radius: 8px;
  display: none; font-size: 0.9em;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: rgba(63,185,80,0.1); border: 1px solid var(--green); }
.quiz-result.fail { background: rgba(248,81,73,0.1); border: 1px solid var(--red); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 26px;
  border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.93em; font-weight: 600;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; box-shadow: 0 2px 8px rgba(88,166,255,0.25); }
.btn-primary:hover { box-shadow: 0 4px 16px rgba(88,166,255,0.4); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #3a4a60; }
.btn-success { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(63,185,80,0.3); }
.btn-success:hover { background: #00a381; box-shadow: 0 4px 16px rgba(63,185,80,0.4); }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

/* Step Cards */
.step-list { display: flex; gap: 14px; flex-wrap: wrap; margin: 18px 0; }
.step-card {
  flex: 1; min-width: 160px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px; text-align: center;
  transition: all 0.2s ease;
}
.step-card:hover { border-color: rgba(88,166,255,0.3); transform: translateY(-2px); }
.step-card .num {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-weight: 700; font-size: 0.85em;
  box-shadow: 0 2px 8px rgba(88,166,255,0.25);
}
.step-card .title { font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
.step-card .desc { font-size: 0.82em; color: var(--sub); line-height: 1.6; }

/* Nav btns */
.nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }

/* Certificate */
.certificate {
  display: none;
  background: linear-gradient(135deg, rgba(26,111,196,0.08), rgba(88,166,255,0.06));
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 48px 40px; text-align: center; margin: 28px 0;
  box-shadow: 0 4px 32px rgba(88,166,255,0.08);
}
.certificate.show { display: block; animation: fadeIn 0.5s ease; }
.certificate h2 { font-size: 2em; color: var(--accent); margin-bottom: 8px; }
.certificate .grade { font-size: 3.5em; margin: 20px 0; background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

/* Table */
.table-wrap { overflow-x: auto; margin: 18px 0; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
th { background: rgba(88,166,255,0.08); padding: 12px 16px; text-align: left; font-weight: 600; color: var(--accent); font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(88,166,255,0.03); }

/* Highlight classes */
.hl { color: var(--accent); font-weight: 600; }
.hl2 { color: var(--green); font-weight: 600; }
.hl3 { color: var(--yellow); font-weight: 600; }
.hl4 { color: var(--red); font-weight: 600; }
code { background: rgba(110,118,129,0.2); padding: 2px 6px; border-radius: 4px; font-size: 0.87em; }
pre { background: var(--bg); padding: 16px; border-radius: 8px; font-size: 0.82em; overflow-x: auto; line-height: 1.7; margin: 14px 0; }

/* Practice card */
.practice-card {
  background: linear-gradient(135deg, rgba(88,166,255,0.04), rgba(26,111,196,0.04));
  border: 1px solid rgba(88,166,255,0.15);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 18px 22px; margin: 20px 0;
}
.practice-card .label {
  font-size: 0.78em; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

/* ===== Interactive Calculators ===== */
.calc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;
}
.calc-input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.calc-input label { display: block; font-size: 0.82em; color: var(--sub); margin-bottom: 4px; }
.calc-input input[type="range"] {
  width: 100%; accent-color: var(--accent); margin: 6px 0;
}
.calc-input input[type="number"] {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 0.95em;
  font-family: 'SF Mono', 'Menlo', monospace;
}
.calc-input input:focus { outline: none; border-color: var(--accent); }
.calc-input .range-val {
  display: flex; justify-content: space-between; align-items: center;
}
.calc-input .range-val span { font-size: 0.78em; }
.calc-input .range-val .cur {
  font-weight: 700; font-size: 1.05em; color: var(--accent);
}
.calc-result {
  grid-column: 1/-1;
  background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(26,111,196,0.06));
  border: 1px solid var(--accent); border-radius: var(--radius);
  padding: 24px; text-align: center;
  transition: all 0.3s ease;
}
.calc-result .clabel { font-size: 0.85em; color: var(--sub); margin-bottom: 4px; }
.calc-result .cval { font-size: 2.4em; font-weight: 700; color: var(--accent); margin: 8px 0; }
.calc-result .csub { font-size: 0.88em; color: var(--sub); }
.calc-result .czone {
  display: inline-block; margin-top: 10px; padding: 6px 18px;
  border-radius: 20px; font-size: 0.88em; font-weight: 600;
}
.calc-result.fear  .czone { background: rgba(63,185,80,0.15); color: var(--green); }
.calc-result.greed .czone { background: rgba(248,81,73,0.15); color: var(--red); }
.calc-result.mid   .czone { background: rgba(210,153,29,0.15); color: var(--yellow); }

/* Pendulum slider */
.pendulum-demo {
  display: flex; gap: 20px; flex-wrap: wrap; align-items: center; margin: 16px 0;
}
.pendulum-svg-wrap {
  flex: 1; min-width: 280px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; text-align: center;
}
.pendulum-svg-wrap svg { max-width: 100%; height: auto; }
.pendulum-control {
  flex: 1; min-width: 260px;
}
.pendulum-slider-wrap { margin-bottom: 16px; }
.pendulum-slider-wrap label {
  display: block; font-size: 0.82em; color: var(--sub); margin-bottom: 4px;
}
.pendulum-slider-wrap input[type="range"] {
  width: 100%; accent-color: var(--accent);
}
.pendulum-info {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  font-size: 0.9em; line-height: 1.7;
}

/* Decision matrix selector */
.decision-grid {
  display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0;
}
.decision-selector {
  flex: 1; min-width: 220px;
}
.decision-selector label {
  display: block; font-size: 0.82em; color: var(--sub); margin-bottom: 6px;
}
.decision-selector select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-size: 0.93em; cursor: pointer;
}
.decision-selector select:focus { outline: none; border-color: var(--accent); }
.decision-output {
  background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(26,111,196,0.06));
  border: 1px solid var(--accent); border-radius: var(--radius);
  padding: 20px 24px; margin-top: 16px;
  min-height: 80px; display: flex; align-items: center; gap: 16px;
  transition: all 0.3s ease;
}
.decision-output .d-icon { font-size: 2em; flex-shrink: 0; }
.decision-output .d-strategy { font-size: 1.2em; font-weight: 700; color: var(--accent); }
.decision-output .d-desc { font-size: 0.9em; color: var(--sub); margin-top: 4px; }

/* Phase badges */
.phase-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75em;
  font-weight: 600;
  margin-right: 6px;
}
.phase-green { background: rgba(63,185,80,0.15); color: var(--green); }
.phase-yellow { background: rgba(210,153,29,0.15); color: var(--yellow); }
.phase-red { background: rgba(248,81,73,0.15); color: var(--red); }
.phase-blue { background: rgba(88,166,255,0.15); color: var(--accent); }

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 20px 16px; }
  .step-list { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><span class="icon">🔄</span> 周期与市场心理</div>
  <div class="subtitle">马克斯与索罗斯之间架桥</div>
  <div class="progress-text">课程进度 <span id="progressPct">0%</span></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <a href="课程首页_金融基础.html" style="display:block;margin-bottom:12px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:0.82em;color:var(--sub);text-decoration:none;text-align:center;transition:all 0.15s" onmouseover="this.style.borderColor=this.style.color" onmouseout="this.style.borderColor='var(--border)'" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--sub)'">🏠 回到课程总览</a>
<div id="navContainer"></div>
  <div class="divider"></div>
  <button class="btn btn-success" style="width:100%" onclick="startFinalExam()">🎓 结业测验</button>
  <button class="btn btn-secondary" style="width:100%;margin-top:8px;font-size:0.8em" onclick="resetAll()">🔄 重置进度</button>
</aside>
<main class="main" id="mainContent"></main>
</div>

<script>
// ===== COURSE DATA =====
const modules = [
  {
    title: '🌊 第1-3节 · 周期入门',
    lessons: [
      {
        id: 'cycle-essence',
        title: '周期的本质：为什么市场永远在摆动',
        emoji: '🔄',
        duration: '15分钟',
        level: '🟢 入门',
        content: `
<p>霍华德·马克斯在《投资最重要的事》中写了三条<span class="hl">周期铁律</span>，每一条都值得反复咀嚼：</p>

<div class="step-list">
  <div class="step-card">
    <div class="num">1</div>
    <div class="title">铁律一</div>
    <div class="desc">多数事物都是周期性的。经济、市场、信贷、情绪——无一例外。</div>
  </div>
  <div class="step-card">
    <div class="num">2</div>
    <div class="title">铁律二</div>
    <div class="desc">当人们忘记铁律一时，最大的盈亏机会就会到来。</div>
  </div>
  <div class="step-card">
    <div class="num">3</div>
    <div class="title">铁律三</div>
    <div class="desc">周期永远不会停止。因为人参与其中——人有情绪，情绪永不消失。</div>
  </div>
</div>

<div class="analogy">
  <div class="label">💡 为什么周期存在？——因果链，不是钟摆</div>
  <p>周期 ≠ 规律的钟摆（不是到点就转向）。</p>

  • <strong>安全阀</strong>：如果模型输出"50/50"（各状态概率接近），不调仓——等更明确的信号。</p>

// 3. Six-signal cycle scorer (Lesson 9)
function calcCycleScore() {
  const dims = ['Valuation','Sentiment','Macro','Credit','Rate','Greed'];
  let total = 0;
  dims.forEach(d => {
    const v = parseInt(document.getElementById('sig' + d).value);
    document.getElementById('sig' + d + 'V').textContent = v;
    total += v;
  });

  document.getElementById('scoreTotal').textContent = total + ' / 42';
  const result = document.getElementById('scoreResult');
  const zone = document.getElementById('scoreZone');
  const badge = document.getElementById('scoreBadge');

  result.classList.remove('fear','greed','mid');
  if (total <= 14) {
    result.classList.add('fear');
    zone.innerHTML = '<strong style="color:#3fb950">极度恐惧区</strong> —— 六信号全部偏左，这是最佳建仓时机';
    badge.textContent = '🟢 极度恐惧 · 激进买入';
    badge.className = 'czone';
    badge.style.background = 'rgba(63,185,80,0.15)'; badge.style.color = '#3fb950';
  } else if (total <= 22) {
    result.classList.add('fear');
    zone.innerHTML = '<strong style="color:#3fb950">中性偏恐惧区</strong> —— 可以逐步建仓，分批次买入';

    badge.className = 'czone';
    badge.style.background = 'rgba(63,185,80,0.15)'; badge.style.color = '#3fb950';
  } else if (total <= 28) {
    result.classList.add('mid');
    zone.innerHTML = '<strong style="color:#d2991d">中性区间</strong> —— 信号噪音大，按兵不动是最优选择';
    badge.textContent = '🟡 中性 · 中性仓位';

  }

function currentFlatIndex() {
  let count = 0;
  for (let mi = 0; mi < currentModuleIdx; mi++) {
    count += modules[mi].lessons.length;
  }
  return count + currentLessonIdx;
}

function markComplete() {
  completed.add(currentFlatIndex());
  save();
}

function navigate(direction) {
  const ci = currentFlatIndex();
  if (direction === 'next') {
    markComplete();
    if (ci < flatLessons.length - 1) {
      const next = flatLessons[ci + 1];
      currentModuleIdx = next.modIdx;
      currentLessonIdx = next.lesIdx;
    }
  } else {
    if (ci > 0) {
      const prev = flatLessons[ci - 1];
      currentModuleIdx = prev.modIdx;
      currentLessonIdx = prev.lesIdx;
    }
  }
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function jumpTo(flatIdx) {
  const flat = flatLessons[flatIdx];
  currentModuleIdx = flat.modIdx;
  currentLessonIdx = flat.lesIdx;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

const quizAnswers = [1, 1, 1, 1, 1, 1, 2, 1, 1, 1]; // order matches flatLessons 0-9
let quizState = {}; // key: flatIdx, value: { answered: bool, correct: bool }

// Quick untracked quiz (self-test, not recorded)
function quickQuiz(btn, correctChoice) {
  const quizCard = btn.closest('.quiz-card');
  if (quizCard.dataset.answered === 'true') return;
  quizCard.dataset.answered = 'true';

  const allOpts = quizCard.querySelectorAll('.quiz-option');
  const result = quizCard.querySelector('.quiz-result');

  // Find which button index was clicked
  let clickedIdx = -1;
  allOpts.forEach((o, i) => { if (o === btn) clickedIdx = i; });

  if (clickedIdx === correctChoice) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    allOpts[correctChoice].classList.add('correct');
  }
  allOpts.forEach(o => o.disabled = true);
  result.classList.add('show', clickedIdx === correctChoice ? 'pass' : 'fail');
}

function answer(btn, flatIdx, choice) {
  if (quizState[flatIdx] && quizState[flatIdx].answered) return;
  const correct = choice === quizAnswers[flatIdx];
  quizState[flatIdx] = { answered: true, correct };

  const quizCard = btn.closest('.quiz-card');
  const allOpts = quizCard.querySelectorAll('.quiz-option');
  const result = quizCard.querySelector('.quiz-result');

  if (correct) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    allOpts[quizAnswers[flatIdx]].classList.add('correct');
  }
  allOpts.forEach(o => o.disabled = true);
  result.classList.add('show', correct ? 'pass' : 'fail');

  // Mark lesson as completed when quiz answered
  markComplete();
}

  } else {
    html = `<div class="lesson-card section active">
    <h2><span class="emoji">${current.emoji}</span> ${current.title}</h2>
    <div class="meta">${metaHTML}</div>
    ${current.content}
    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="navigate('prev')" ${flatIdx === 0 ? 'disabled' : ''}>◀ 上一节</button>
      <span style="color:var(--sub);font-size:0.9em">${flatIdx + 1}/${totalLessons}</span>
      <button class="btn btn-primary" onclick="navigate('next')">${isLast ? '✅ 完成' : '下一节 ▶'}</button>
    </div>
  </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ===== INIT =====
load();
render();
</script>
</body>
</html>
