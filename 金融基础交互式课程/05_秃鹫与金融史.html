  {

      {
        id: 'taleb-blackswan',
        title: '塔勒布：黑天鹅与反脆弱——在不可预测的世界里生存',
        emoji: '🦅',
        content: `
<h3>塔勒布提供了投资世界最稀缺的能力</h3>

<div class="analogy">
  <div class="label">🧠 四位大师的分工</div>
  <p>巴菲特：告诉我好公司长什么样（价值本体）<br>
  芒格：告诉我怎么思考好公司（思维框架）<br>
  马克斯：告诉我现在该买还是该卖（时机判断）<br>

<h3>框架一：黑天鹅——不可预测的极端事件</h3>

<div class="deep">
  <div class="label">🦅 黑天鹅三特征</div>
  <div class="table-wrap">
  <table>
    <tr><th>特征</th><th>说明</th><th>投资含义</th></tr>
    <tr><td><strong>稀有性</strong></td><td>在通常预期之外，过去没有证据能预测</td><td>任何基于历史数据的风险模型都会漏掉它</td></tr>
    <tr><td><strong>极端冲击</strong></td><td>一旦发生，改变一切</td><td>一次黑天鹅可以抹掉多年积累的收益</td></tr>
    <tr><td><strong>事后可解释</strong></td><td>发生后人们编造理由，让它看起来可预测</td><td>让我们错误地以为自己下次能预测</td></tr>
  </table>
  </div>
</div>

<div class="warning">
  <div class="label">⚠️ 塔勒布的核心翻转</div>
  <p><strong>传统思维：</strong>我知道的越多 → 越能预测 → 越安全<br>
  <strong>塔勒布：</strong>你不知道的才是危险的 → 承认无知 → 构建结构<br>

<h3>正负黑天鹅</h3>

<div class="table-wrap">
<table>

<h3>框架二：平均斯坦 vs 极端斯坦</h3>

<div class="deep">

  <table>
    <tr><th>维度</th><th>平均斯坦</th><th>极端斯坦</th></tr>

<h3>为什么杠铃策略具有反脆弱性</h3>

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correctChoice) o.classList.add('correct');
    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let totalLessons = 0;
  modules.forEach(m => { totalLessons += m.lessons.length; });
  totalLessons += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / totalLessons) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';
  html += '<span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  nav.innerHTML = html;
}

  currentSection = id;
  updateUI();

  else html += '<div></div>';

  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) nextId = modules[modIndex].lessons[lesIndex + 1].id;
  else if (modIndex < modules.length - 1) nextId = modules[modIndex + 1].lessons[0].id;
  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>';
  else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';

  main.innerHTML = html;

  // Init interactive components from merged modules
  if (id === 'asymmetric-metrics') { setTimeout(function() { if (window.calcKelly) calcKelly(); }, 50); }
  if (id === 'stress-test') { setTimeout(function() { if (window.calcStress) calcStress(); }, 50); }
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save();
  renderContent(lessonId);
}

function startFinalExam() { navigateTo('final'); }

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2>';
  html += '<div class="meta">11道题 · 覆盖全部5个模块 · 70%及格</div>';

  let allAnswered = true;
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    if (!answered) allAnswered = false;
    const isCorrect = answered && ua === q.correct;
    html += '<div class="quiz-card" id="final-q-' + qi + '"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
    html += '<div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFinal(' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
    });
    html += '</div>';
  });
  html += '</div>';

  if (allAnswered) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const pct = Math.round(score / total * 100);
    const passed = pct >= 70;
    const grade = pct >= 90 ? '🏅 S级·秃鹫大师' : pct >= 80 ? '🥇 A级·逆向投资专家' : pct >= 70 ? '🥈 B级·非对称投资者' : '📝 继续加油';
    html += '<div class="certificate show"><div style="font-size:3em">' + (passed ? '🎉' : '💪') + '</div>';
    html += '<h2>' + (passed ? '恭喜毕业！' : '还需要再练练') + '</h2>';
    html += '<div class="grade">' + grade + '</div>';
    html += '<div style="font-size:1.5em;color:var(--accent2)">' + score + ' / ' + total + ' 题正确（' + pct + '%）</div>';
    html += '<p style="margin-top:16px;color:var(--sub)">' + (passed ?
      '你已经完成了秃鹫、逆向与非对称投资课程！从塔勒布的反脆弱体系到老木匠的A股实战智慧、从秃鹫投资与事件驱动到非对称收益量化、从达利欧的债务周期到周金涛的康波——你不仅学会了识别市场极端机会，更学会了<span class="hl">用杠铃策略、凯利公式和压力测试构建一个反脆弱的投资系统</span>。记住：最好的机会出现在市场最恐惧的时候，但前提是你已经准备好了弹药和判断框架。'
      : '再看看薄弱环节，重做一次就能过！') + '</p>';
    html += '<div style="margin-top:20px"><button class="btn btn-secondary" onclick="resetFinalExam()">🔄 重新测验</button>';
    html += '<button class="btn btn-primary" onclick="resetAll()" style="margin-left:8px">🔁 重学全部课程</button></div></div>';
    const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
    if (wrong.length > 0) {
      html += '<div class="tip" style="margin-top:16px"><div class="label">📚 建议补强的知识点</div>';
      const topicMap = {
        0: '→ 复习「模块五：黑天鹅与极端斯坦」',
        1: '→ 复习「模块五：老木匠的散户生存智慧」',
        2: '→ 复习「模块六：达利欧经济机器与去杠杆」',
        3: '→ 复习「模块六：明斯基时刻与泡沫解剖」',
        4: '→ 复习「模块六：周金涛康波周期」',
        5: '→ 复习「模块五：塔勒布反脆弱三元结构」',
        6: '→ 复习「模块五：塔勒布杠铃策略」',
        7: '→ 复习「模块五：老木匠决策启发式」',
        8: '→ 复习「模块八：凯利公式」',
        9: '→ 复习「模块八：戴维斯双杀与安全边际」',
        10: '→ 复习「模块五：老木匠分仓代替止损」'
      };
      wrong.forEach(w => { html += '<p>❌ 第' + (w.i + 1) + '题 ' + topicMap[w.i] + '</p>'; });
      html += '</div>';
    }
  }
  main.innerHTML = html;
  if (allAnswered) updateUI();
}

function answerFinal(qi, oi) {
  quizResults['final_' + qi] = oi;
  save();
  renderFinalExam(document.getElementById('mainContent'));
  updateUI();
}

function resetFinalExam() {
  finalExam.questions.forEach((_, i) => delete quizResults['final_' + i]);
  save(); updateUI();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('master_finance_5_merged_quiz_results');
  localStorage.removeItem('master_finance_5_merged_course_completed');
  location.reload();
}

// ===== INTERACTIVE CALCULATORS =====
window.calcKelly = function() {
  const p = parseInt(document.getElementById('kelly-p').value) / 100;
  const b = parseFloat(document.getElementById('kelly-b').value);
  const f = (p * b - (1 - p)) / b;
  document.getElementById('kelly-p-v').textContent = (p * 100).toFixed(0) + '%';
  document.getElementById('kelly-b-v').textContent = b.toFixed(1);
  let resultEl = document.getElementById('kelly-result');
  let adviceEl = document.getElementById('kelly-advice');
  if (f <= 0) {
    resultEl.textContent = '不下注！';
    resultEl.style.color = '#f85149';
    adviceEl.textContent = '期望值为负或零——放弃这笔交易';
    adviceEl.style.color = '#f85149';
  } else if (f > 0.8) {
    resultEl.textContent = (f * 100).toFixed(1) + '%（过高！）';
    resultEl.style.color = '#d2991d';
    adviceEl.textContent = '你可能高估了胜率。建议仓位：半凯利 ≈ ' + (f * 50).toFixed(1) + '%';
    adviceEl.style.color = '#d2991d';
  } else {
    resultEl.textContent = (f * 100).toFixed(1) + '%';
    resultEl.style.color = '#3fb950';
    adviceEl.textContent = '半凯利建议仓位：' + (f * 50).toFixed(1) + '%';
    adviceEl.style.color = '#3fb950';
  }
};

window.calcStress = function() {
  const price = parseFloat(document.getElementById('st-price').value) || 0;
  const earnDrop = parseInt(document.getElementById('st-earn').value) / 100;
  const peDrop = parseInt(document.getElementById('st-pe').value) / 100;
  const crash = price * (1 - earnDrop) * (1 - peDrop);
  const loss = ((1 - crash / price) * 100).toFixed(0);
  document.getElementById('st-earn-v').textContent = (earnDrop * 100) + '%';
  document.getElementById('st-pe-v').textContent = (peDrop * 100) + '%';
  document.getElementById('st-result').textContent = crash.toFixed(1) + ' 元';
  const advice = document.getElementById('st-advice');
  if (parseInt(loss) > 70) {
    advice.textContent = '亏损幅度：' + loss + '% —— 🔴 极度危险！必须减仓或放弃';
    advice.style.color = '#f85149';
  } else if (parseInt(loss) > 40) {
    advice.textContent = '亏损幅度：' + loss + '% —— 🟡 需要较大的安全边际';
    advice.style.color = '#d2991d';
  } else {
    advice.textContent = '亏损幅度：' + loss + '% —— 🟢 可接受范围';
    advice.style.color = '#3fb950';
  }
};

  currentSection = 'taleb-blackswan';

})();
