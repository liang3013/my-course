</head>

<p>这不是科幻。这就是<span class="hl3">AI Agent量化投研</span>要做的事。</p>

<h3>传统量化 vs Agent量化：认知驱动的范式跃迁</h3>
<div class="compare">

先验（历史准确率）+ 似然（当前数据信号）→ 后验（融合后的概率）</p></div>

<h3>从Agent观点到概率输出</h3>
<p>每个Agent的输出必须是<span class="hl">概率</span>——不是「买」或「不买」，而是「65%概率上涨」。</p>
<p>为什么？因为只有概率才能进行数学融合。二元判断（买/不买）无法进行加权——两个人一个说买一个说不买，你没法折中。</p>

<h3>贝叶斯融合公式</h3>
<div class="diagram">
╔═══════════════════════════════════════════════════════╗
║             贝叶斯融合 —— 朴素贝叶斯加权限              ║
╠═══════════════════════════════════════════════════════╣
║                                                        ║
║  P(H|E₁,E₂...Eₙ) ∝ P(H) × P(E₁|H)ʷ¹ × P(E₂|H)ʷ² ...  ║
║                                                        ║
║  P(H)          = 先验概率（目标上涨的基准概率）           ║
║  P(Eᵢ|H)       = 第i个Agent信号的似然                   ║
║  wᵢ            = 第i个Agent的历史准确率（先验权重）        ║
║  P(H|E₁...Eₙ)  = 后验概率（融合后的上涨概率）             ║
║                                                        ║
║  简化实现（对数空间，避免浮点下溢）：                     ║
║  logit = log(P(H)/(1-P(H))) + Σ wᵢ × LLRᵢ             ║
║  LLRᵢ = log(P(Eᵢ|H) / P(Eᵢ|¬H))  ← 对数似然比         ║
║  P(H|E₁...Eₙ) = 1/(1+exp(-logit))                      ║
║                                                        ║
╚═══════════════════════════════════════════════════════╝
</div>

<h3>代码示例：贝叶斯融合实现</h3>
<pre>
def bayesian_fusion(agent_signals, prior_weights, base_rate=0.55):
    """
    agent_signals: dict {agent_name: P(涨|agent信号)}
    prior_weights: dict {agent_name: 历史准确率}
    base_rate:     市场基准上涨概率
    
    返回: 后验上涨概率, 对数似然比分解
    """
    import numpy as np
    
    # 先验logit
    prior_logit = np.log(base_rate / (1 - base_rate))
    
    # 累积各Agent的对数似然比
    total_llr = 0
    llr_contributions = {}
    
    for agent, likelihood in agent_signals.items():
        weight = prior_weights.get(agent, 0.5)
        # 简化: LLR = likelihood映射
        llr = (likelihood - 0.5) * 2 * weight  # 信号越极端，LLR越大
        total_llr += llr
        llr_contributions[agent] = llr
    
    # 后验logit → 概率
    posterior_logit = prior_logit + total_llr
    posterior_prob = 1 / (1 + np.exp(-posterior_logit))
    
    return posterior_prob, llr_contributions

# 示例
signals = {'巴菲特':0.72, '芒格':0.58, '马克斯':0.68, '索罗斯':0.48, '塔勒布':0.42}
weights = {'巴菲特':0.65, '芒格':0.60, '马克斯':0.55, '索罗斯':0.50, '塔勒布':0.45}
prob, llrs = bayesian_fusion(signals, weights)
print(f"融合后上涨概率: {prob:.2%}")  # 约为 62%
</pre>

<h3>历史准确率如何更新？</h3>
<p>先验权重不是固定的。每过一个月，根据各Agent的实际预测表现更新其权重：</p>
<div class="steps">
<div class="step"><div class="n">1</div><div class="t">记录信号</div><div class="d">Agent发出信号时的时间戳+概率值</div></div>
<div class="step"><div class="n">2</div><div class="t">等待结果</div><div class="d">1个月后看实际涨跌（注意前视偏差！）</div></div>
<div class="step"><div class="n">3</div><div class="t">计算Brier分数</div><div class="d">Brier = (预测概率-实际结果)²，越小越好</div></div>
<div class="step"><div class="n">4</div><div class="t">更新权重</div><div class="d">新的先验 = 旧先验×0.8 + 最近表现×0.2（EMA平滑）</div></div>
</div>

<div class="warn"><div class="lbl">⚠️ 贝叶斯融合中最容易犯的错</div>
<p><strong>把相关性当成独立性。</strong><br>
如果巴菲特Agent和芒格Agent都用了ROE数据 → 它们的信号不是独立的。<br>
朴素贝叶斯假设各信号独立——但这个假设在Agent之间经常不成立。<br>
<strong>缓解方案</strong>：信号相关性矩阵 → 对高度相关的Agent信号自动降权。<br>
如果巴菲特和芒格的信号相关性>0.7 → 两者的综合权重不叠加，取最大值。</p></div>

<div class="tip"><div class="lbl">💡 贝叶斯融合的哲学</div>
<p>贝叶斯融合不是「让Agent投票选总统」——不是数量赢。<br>
它是<span class="hl">「让每个Agent用自己的历史战绩说话」</span>。<br>
一个准确率90%的Agent的反对意见，胜过三个准确率55%的Agent的赞同。<br>
<strong>权重 = 信任 = 历史业绩。</strong></p></div>

<div class="analogy"><div class="lbl">📞 自信的骗子</div>
<p>你问一个自信但无知的人「茅台2024年的毛利率是多少？」<br>

<p>LLM的幻觉就是这样：<strong>它不会说「不知道」，它会编一个听起来很合理的答案。</strong><br>

<h4>防御方案</h4>
<ol>
<li><span class="hl">强制溯源</span>：Agent的每个数字必须附带来源（知识库文件·段落编号·原始数据）</li>
<li><span class="hl">双Agent核查</span>：财务多Agent给出的ROE → 财务空Agent用独立数据源重新计算 → 不一致就标记</li>
<li><span class="hl">数值合理区间</span>：如果Agent输出ROE=150% → 直接拒绝（常识过滤）</li>
<li><span class="hl">知识库约束</span>：Agent回答严格限于知识库范围——「不知道」好过「编一个」</li>
</ol>

<h3>陷阱二：确认偏差放大——Agent互相吹捧</h3>

<h4>防御方案</h4>
<ol>
<li><span class="hl">独立研究</span>：各Agent互不知情地运行，不暴露彼此结论</li>
<li><span class="hl">芒格Agent强制批判</span>：任何正面结论都触发批判审查</li>

    m.l.forEach(l=>{
      let dn=doneL.has(l.id),ac=cur===l.id;
      h+='<div class="nav-i'+(ac?' act':'')+(dn?' done':'')+'" onclick="navTo(\''+l.id+'\')"><span class="ch">'+(dn?'✅':l.em)+'</span>'+l.ti+'</div>';
    });
  });
  let fd=FE.qs.every((_,i)=>qR['f_'+i]!==undefined);
  h+='<div class="nav-i'+(cur==='final'?' act':'')+(fd?' done':'')+'" onclick="navTo(\'final\')"><span class="ch">'+(fd?'✅':'🏆')+'</span>终极测验</div>';
  n.innerHTML=h;
}
function navTo(id){cur=id;upd();render(id);window.scrollTo(0,0);}
function mk(id){if(!doneL.has(id)){doneL.add(id);save();upd();}}

function render(id){
  let main=document.getElementById('mc');
  if(id==='final'){renderF(main);return;}
  let ls=null,mi=-1,li=-1;
  for(let i=0;i<M.length;i++)for(let j=0;j<M[i].l.length;j++)if(M[i].l[j].id===id){ls=M[i].l[j];mi=i;li=j;break;}
  if(!ls){main.innerHTML='<p>未找到</p>';return;}
  let h='';
  if(ls.qz){
    let sv=qR[id]||[];
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>';
    ls.qz.qs.forEach((q,qi)=>{
      let ua=sv[qi],an=ua!==undefined,ok=an&&ua===q.c;
      h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';
      q.o.forEach((o,oi)=>{
        let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';
        h+='<button class="'+cl+'" onclick="ans(\''+id+'\','+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';
      });
      if(an)h+='<div class="q-r show '+(ok?'ok':'no')+'"><strong>'+(ok?'✅ 正确':'❌ 不太对')+'</strong><p>'+q.x+'</p></div>';
      h+='</div>';
    });
    h+='</div>';
  }else{
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>'+ls.c+'</div>';
    mk(id);
  }
  h+='<div class="btns">';
  let pr=null;if(li>0)pr=M[mi].l[li-1].id;else if(mi>0){let pm=M[mi-1];pr=pm.l[pm.l.length-1].id;}
  h+=pr?'<button class="btn btn-s" onclick="navTo(\''+pr+'\')">⬅ 上一节</button>':'<div></div>';
  let nx=null;if(li<M[mi].l.length-1)nx=M[mi].l[li+1].id;else if(mi<M.length-1)nx=M[mi+1].l[0].id;
  h+=nx?'<button class="btn btn-p" onclick="navTo(\''+nx+'\')">下一节 ➡</button>':'<button class="btn btn-go" onclick="navTo(\'final\')">🏆 终极测验 ➡</button>';
  h+='</div>';
  main.innerHTML=h;mk(id);
}
function ans(lid,qi,oi){if(!qR[lid])qR[lid]=[];qR[lid][qi]=oi;save();render(lid);}
function renderF(main){
  let h='<div class="lesson"><h2>🏆 终极测验</h2><div class="meta">8题 · 70%及格（6/8）</div>';
  let ad=true;
  FE.qs.forEach((q,qi)=>{let ua=qR['f_'+qi],an=ua!==undefined;if(!an)ad=false;h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';q.o.forEach((o,oi)=>{let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';h+='<button class="'+cl+'" onclick="ansF('+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';});h+='</div>';});
  h+='</div>';
  if(ad){
    let sc=FE.qs.filter((q,i)=>qR['f_'+i]===q.c).length,pc=Math.round(sc/8*100),pass=pc>=70;
    let gr=pc>=100?'🏅 S级' : pc>=88?'🥇 A级' : pc>=75?'🥈 B级' : '📝 继续加油';
    h+='<div class="cert show"><div style="font-size:3em">'+(pass?'🎉':'💪')+'</div><h2>'+(pass?'恭喜完成量化投研Agent实战！':'还需要再巩固')+'</h2><div class="grade">'+gr+'</div><div style="font-size:1.5em;color:var(--accent)">'+sc+'/8（'+pc+'%）</div><p style="margin-top:16px;color:var(--sub)">'+(pass?'你已掌握将21位大师智慧转化为可工作的AI Agent系统的完整方法论。':'薄弱环节已标出。')+'</p><div style="margin-top:20px"><button class="btn btn-s" onclick="rstF()">🔄 重新测验</button><button class="btn btn-p" onclick="rstA()" style="margin-left:8px">🔁 重学全部</button></div></div>';
    let wr=FE.qs.map((q,i)=>({q,i})).filter(x=>qR['f_'+x.i]!==x.q.c);
    if(wr.length){let mp=['→ 第2节：芒格Agent=批判者','→ 第2节：风控官一票否决','→ 第3节：知识库三大优势','→ 第5节：先验=历史准确率','→ 第4节：辩论独立性','→ 第8节：幻觉防御','→ 第8节：前视偏差防御','→ 第8节：IC独立性检验'];h+='<div class="tip" style="margin-top:16px"><div class="lbl">📚 薄弱环节</div>';wr.forEach(w=>{h+='<p>❌ 第'+(w.i+1)+'题 '+mp[w.i]+'</p>';});h+='</div>';}
  }
  main.innerHTML=h;if(ad)upd();
}
function ansF(qi,oi){qR['f_'+qi]=oi;save();renderF(document.getElementById('mc'));upd();}
function rstF(){FE.qs.forEach((_,i)=>delete qR['f_'+i]);save();upd();renderF(document.getElementById('mc'));}
function rstA(){localStorage.removeItem('agent_quant_course_completed');localStorage.removeItem('agent_quant_course_quiz_results');doneL=new Set();qR={};cur=null;navTo('why-agent');}

(function(){cur='why-agent';upd();render('why-agent');})();
</script>
</body>
</html>
