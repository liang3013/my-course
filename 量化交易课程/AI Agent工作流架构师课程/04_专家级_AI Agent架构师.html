<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏛️ AI Agent 架构师 · 专家级</title>
<style>
:root {
  --bg: #06080d; --card: #0e131f; --card2: #151c2b; --border: #253049;
  --text: #e4eaf2; --sub: #7c8aa2; --accent: #e86040; --accent2: #40a8e0;
  --green: #40c880; --red: #f06060; --yellow: #e0b040; --purple: #a880e0;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(232,96,64,0.3); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #354560; }
body { font-family: -apple-system,'SF Pro Display','PingFang SC',sans-serif; background: radial-gradient(ellipse at 50% 0%, #0c111c 0%, var(--bg) 70%); color: var(--text); line-height: 1.85; min-height:100vh; -webkit-font-smoothing: antialiased; }
.app { display:flex; min-height:100vh; }
.sidebar { width:290px; background:var(--card); border-right:1px solid var(--border); padding:24px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0; }
.main { flex:1; padding:32px 48px; max-width:1000px; }

.logo { font-size:1.15em; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.logo .i { font-size:1.4em; }
.sub { color:var(--sub); font-size:0.8em; margin-bottom:6px; }
.badge { display:inline-block; background:linear-gradient(135deg,#c04030,#e86040); color:#fff; padding:3px 12px; border-radius:20px; font-size:0.7em; font-weight:600; margin-bottom:18px; }
.prog-wrap { background:var(--border); border-radius:8px; height:6px; margin-bottom:22px; overflow:hidden; }
.prog-bar { height:100%; background:linear-gradient(90deg,#c04030,#40a8e0); border-radius:8px; transition:width .6s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 12px rgba(232,96,64,0.2); }
.prog-txt { font-size:0.78em; color:var(--sub); margin-bottom:4px; }
.nav-mod { margin-bottom:18px; }
.nav-mod-t { font-size:0.7em; text-transform:uppercase; color:var(--sub); opacity:0.7; letter-spacing:1.5px; margin-bottom:8px; padding:0 8px; }
.nav-i { display:flex; align-items:center; gap:10px; padding:9px 14px; margin-bottom:2px; border-radius:8px; cursor:pointer; font-size:0.84em; color:var(--sub); transition:.2s ease; border-left:3px solid transparent; }
.nav-i:hover { background:var(--card2); color:var(--text); border-left-color:rgba(232,96,64,0.3); }
.nav-i.act { background:rgba(232,96,64,0.1); color:var(--accent); font-weight:600; border-left-color:var(--accent); }
.nav-i.done { color:var(--green); }
.nav-i .ch { width:20px; text-align:center; font-size:0.75em; }
.dv { border:none; border-top:1px solid var(--border); margin:18px 0; opacity:0.6; }

.lesson { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:34px 36px; margin-bottom:24px; transition:border-color 0.25s,box-shadow 0.25s; }
.lesson:hover { border-color:rgba(232,96,64,0.2); box-shadow:0 2px 20px rgba(232,96,64,0.05); }
.lesson h2 { font-size:1.5em; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
.lesson .meta { color:var(--sub); font-size:0.85em; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.lesson h3 { font-size:1.15em; margin:30px 0 14px; color:var(--accent); position:relative; padding-left:14px; }
.lesson h3::before { content:''; position:absolute; left:0; top:3px; bottom:3px; width:3px; border-radius:2px; background:linear-gradient(180deg,#c04030,var(--accent)); }
.lesson h4 { font-size:1.02em; margin:22px 0 10px; color:var(--accent2); }
.lesson p { margin-bottom:14px; }
.lesson ul,.lesson ol { padding-left:24px; margin-bottom:14px; }
.lesson li { margin-bottom:8px; }

.analogy { background:linear-gradient(135deg,rgba(232,96,64,0.04),rgba(64,168,224,0.04)); border:1px solid rgba(232,96,64,0.14); border-left:3px solid var(--accent); border-radius:var(--radius); padding:18px 22px; margin:20px 0; transition:border-color 0.2s; }
.analogy:hover { border-color:rgba(232,96,64,0.24); }
.analogy .lbl { font-size:0.74em; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; font-weight:600; display:flex; align-items:center; gap:6px; }

.diagram { background:#06080d; border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin:18px 0; text-align:center; font-family:'SF Mono','Menlo',monospace; font-size:0.82em; line-height:2; white-space:pre; overflow-x:auto; }
.diagram-svg { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 12px; margin:20px 0; text-align:center; overflow-x:auto; }
.diagram-svg svg { max-width:100%; height:auto; display:block; margin:0 auto; }
.diagram-svg text { font-family: inherit; }

.tip,.warn,.deep,.decision { border-radius:var(--radius); padding:18px 22px; margin:20px 0; }
.tip { background:rgba(64,200,128,0.05); border:1px solid rgba(64,200,128,0.18); border-left:3px solid var(--green); }
.warn { background:rgba(240,96,96,0.05); border:1px solid rgba(240,96,96,0.18); border-left:3px solid var(--red); }
.deep { background:rgba(168,128,224,0.05); border:1px solid rgba(168,128,224,0.18); border-left:3px solid var(--purple); }
.decision { background:rgba(224,176,64,0.05); border:1px solid rgba(224,176,64,0.18); border-left:3px solid var(--yellow); }
.tip .lbl,.warn .lbl,.deep .lbl,.decision .lbl { font-weight:700; margin-bottom:6px; font-size:0.85em; display:flex; align-items:center; gap:6px; }
.tip .lbl { color:var(--green); }
.warn .lbl { color:var(--red); }
.deep .lbl { color:var(--purple); }
.decision .lbl { color:var(--yellow); }

.quiz { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--radius); padding:28px 30px; margin:28px 0; transition:border-color 0.25s,box-shadow 0.25s; }
.quiz:hover { border-color:rgba(232,96,64,0.3); box-shadow:0 2px 16px rgba(232,96,64,0.04); }
.quiz h3 { margin-bottom:10px; color:var(--text); }
.q-q { margin:18px 0 10px; font-weight:600; font-size:0.95em; }
.q-o { display:block; width:100%; text-align:left; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:13px 18px; margin:8px 0; cursor:pointer; color:var(--text); font-size:0.93em; transition:.2s ease; }
.q-o:hover { border-color:var(--accent); background:var(--card2); transform:translateX(4px); }
.q-o.ok { border-color:var(--green); background:rgba(64,200,128,0.08); color:var(--green); }
.q-o.no { border-color:var(--red); background:rgba(240,96,96,0.08); color:var(--red); }
.q-o:disabled { cursor:default; opacity:0.85; transform:none; }
.q-r { margin-top:14px; padding:14px; border-radius:8px; display:none; }
.q-r.show { display:block; }
.q-r.ok { background:rgba(64,200,128,0.07); border:1px solid var(--green); }
.q-r.no { background:rgba(240,96,96,0.07); border:1px solid var(--red); }

.btn { display:inline-flex; align-items:center; gap:6px; padding:11px 26px; border-radius:8px; border:none; cursor:pointer; font-size:0.93em; font-weight:600; transition:.2s ease; letter-spacing:0.3px; }
.btn:active { transform:scale(0.97); }
.btn-p { background:linear-gradient(135deg,#c04030,#e86040); color:#fff; box-shadow:0 2px 8px rgba(232,96,64,0.25); }
.btn-p:hover { box-shadow:0 4px 16px rgba(232,96,64,0.35); }
.btn-s { background:var(--border); color:var(--text); }
.btn-s:hover { background:#354058; }
.btn-go { background:var(--green); color:#fff; box-shadow:0 2px 8px rgba(64,200,128,0.25); }
.btn-go:hover { box-shadow:0 4px 16px rgba(64,200,128,0.35); }
.btns { display:flex; justify-content:space-between; margin-top:36px; }

.steps { display:flex; gap:14px; flex-wrap:wrap; margin:18px 0; }
.step { flex:1; min-width:160px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px 16px; text-align:center; transition:all 0.2s ease; }
.step:hover { border-color:rgba(232,96,64,0.3); transform:translateY(-2px); }
.step .n { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#c04030,#e86040); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; font-weight:700; font-size:0.85em; box-shadow:0 2px 8px rgba(232,96,64,0.25); }
.step .t { font-weight:600; margin-bottom:6px; font-size:0.9em; }
.step .d { font-size:0.8em; color:var(--sub); line-height:1.6; }

.table-wrap { overflow-x:auto; margin:18px 0; border-radius:var(--radius); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:0.87em; margin:0; }
th { background:rgba(232,96,64,0.06); padding:12px 16px; text-align:left; font-weight:600; color:var(--accent); font-size:0.82em; text-transform:uppercase; letter-spacing:0.5px; }
td { padding:11px 16px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(232,96,64,0.02); }

.matrix { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin:18px 0; }
.m-cell { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.m-cell .icon { font-size:1.8em; margin-bottom:6px; }
.m-cell .title { font-weight:700; margin-bottom:6px; font-size:0.9em; }
.m-cell .val { font-size:1.15em; font-weight:700; color:var(--accent2); }
.m-cell .note { font-size:0.78em; color:var(--sub); margin-top:6px; }

.d-node { display:block; width:100%; text-align:left; background:var(--bg); border:2px solid var(--border); border-radius:10px; padding:14px 18px; margin:8px 0; cursor:pointer; font-size:0.93em; transition:.2s; }
.d-node:hover { border-color:var(--yellow); background:var(--card2); }
.d-node.picked { border-color:var(--green); background:rgba(64,200,128,0.1); cursor:default; }
.d-node.wrong { border-color:var(--red); opacity:0.5; cursor:default; }
.d-result { margin-top:14px; padding:14px; border-radius:8px; display:none; }
.d-result.show { display:block; background:rgba(64,200,128,0.07); border:1px solid var(--green); }

.compare { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:20px 0; }
.comp-box { background:var(--bg); border-radius:var(--radius); padding:22px; }
.comp-box.good { border:2px solid var(--green); }
.comp-box.bad { border:2px solid var(--red); }
.comp-box .t { font-weight:700; font-size:1em; margin-bottom:12px; }
.comp-box.good .t::before { content:'✅ '; }
.comp-box.bad .t::before { content:'❌ '; }

.hl { color:var(--accent); font-weight:600; }
.hl2 { color:var(--accent2); font-weight:600; }
.hl3 { color:var(--green); font-weight:600; }
.hl4 { color:var(--red); font-weight:600; }
.hl5 { color:var(--yellow); font-weight:600; }
code { background:rgba(124,138,162,0.15); padding:2px 6px; border-radius:4px; font-size:0.87em; }
pre { background:var(--bg); padding:16px; border-radius:8px; font-size:0.8em; overflow-x:auto; line-height:1.7; }

.cert { display:none; background:linear-gradient(135deg,rgba(192,64,48,0.05),rgba(64,168,224,0.04)); border:2px solid var(--accent); border-radius:var(--radius); padding:48px 40px; text-align:center; margin:28px 0; box-shadow:0 4px 32px rgba(232,96,64,0.06); }
.cert.show { display:block; animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.cert h2 { font-size:2em; color:var(--accent); margin-bottom:8px; }
.cert .grade { font-size:3.5em; margin:20px 0; background:linear-gradient(135deg,#c04030,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; }

@media(max-width:768px) { .app{flex-direction:column} .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)} .main{padding:20px 16px} .steps,.matrix{flex-direction:column;grid-template-columns:1fr} .compare{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><span class="i">🏛️</span> Agent 架构师</div>
  <div class="sub">专家级 · 企业架构篇</div>
  <div class="badge">⬆ 建议先完成初+中+高级</div>
  <div class="prog-txt">课程进度 <span id="pp">0%</span></div>
  <div class="prog-wrap"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <div id="nav"></div>
  <div class="dv"></div>
  <button class="btn btn-p" style="width:100%" onclick="navTo('final')">🏆 终极测验</button>
  <button class="btn btn-s" style="width:100%;margin-top:8px;font-size:0.8em" onclick="if(confirm('确定要重置所有课程进度吗？'))rstA()">🔄 重置进度</button>
</aside>
<main class="main" id="mc"></main>
</div>

<script>
const M=[
{
  t:'🪜 桥梁：从高级到专家',
  l:[{
    id:'bridge',ti:'你已经是搭建者了——专家是做什么的？',em:'🪜',
    c:`
<h3>先回顾一下：你已经会什么了？</h3>
<p>在初级课你学会了<span class="hl">使用</span>Agent——就像学会了开车。</p>
<p>在中级课你学会了<span class="hl">理解</span>Agent——知道了发动机怎么工作。</p>
<p>在高级课你学会了<span class="hl">搭建</span>Agent——能自己组装一辆车了。</p>

<h3>那专家还差什么？</h3>
<div class="analogy"><div class="lbl">🚗 造车 vs 管车队</div>
<p>高级课学会了「造一辆车」：选底盘、配发动机、装轮子。<br>
专家课要解决的是：<strong>怎么管一个100辆车的车队？</strong></p>
<p>——哪条路线最省油？车坏了怎么处理？司机怎么排班？法规怎么合规？</p></div>

<h3>专家的核心能力——不是你写多少代码</h3>
<table>
<tr><th>能力</th><th>通俗解释</th></tr>
<tr><td><span class="hl">决策力</span></td><td>自建还是买现成？用大模型还是小模型？——选错了代价很大。</td></tr>
<tr><td><span class="hl">风险意识</span></td><td>Agent出事了怎么办？用户数据泄露了谁负责？</td></tr>
<tr><td><span class="hl">成本意识</span></td><td>10个用户便宜，10000个用户可能巨贵——钱花在哪了？</td></tr>
<tr><td><span class="hl">系统观</span></td><td>Agent不是孤岛，它要和公司的其他系统一起工作。</td></tr>
<tr><td><span class="hl">前瞻性</span></td><td>2年后AI会变成什么样？现在做的选择能被淘汰吗？</td></tr>
</table>

<div class="tip"><div class="lbl">💡 一句话总结</div>
<p>前三级的核心是「<strong>怎么做</strong>」。专家级的核心是「<strong>怎么选</strong>」和「<strong>怎么管</strong>」。</p></div>
`
  }]
},
{
  t:'🏗️ 模块一：Agent与企业的「联姻」',
  l:[{
    id:'why-integrate',ti:'1.1 为什么Agent不能单打独斗？',em:'🤝',
    c:`
<div class="analogy"><div class="lbl">🍕 开披萨店</div>
<p>你开发了一个超厉害的「智能点餐Agent」——能跟顾客聊天、推荐口味、记偏好。<br>
<strong>但问题来了：</strong></p>
<p>• 顾客下单了 → Agent知道，但厨房不知道<br>
• 厨房做好了 → 厨房知道，但送餐员不知道<br>
• 顾客付钱了 → 谁告诉会计系统？<br>
• 顾客投诉 → 谁通知店长？</p>
<p>Agent再聪明，<strong>如果它不能和已有的系统（订单系统、库存系统、支付系统、客服系统）对话——它就是个摆设。</strong></p></div>

<h3>真实世界是什么样的？</h3>
<p>没有哪家公司是从零开始的。你入职的时候——</p>
<ul>
<li>ERP系统已经跑了10年了（管财务、采购、库存）</li>
<li>CRM系统里面存着几万客户的数据（管销售、客户）</li>
<li>数据库里有十年的订单记录</li>
<li>消息队列每天处理几十万条异步任务</li>
</ul>
<p><strong>Agent的宿命不是替代它们</strong>——是跟它们一起工作。</p>

<div class="diagram-svg">
<svg viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="exa" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6c5ce7" opacity="0.5"/>
    </marker>
  </defs>
  <text x="250" y="16" text-anchor="middle" fill="#8b90a0" font-size="11">Agent 不替代已有系统，而是「加入他们」</text>
  <rect x="160" y="28" width="180" height="44" rx="12" fill="rgba(108,92,231,0.15)" stroke="#6c5ce7" stroke-width="2" stroke-opacity="0.5"/>
  <text x="250" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">🤖 智能点餐 Agent</text>
  <text x="250" y="66" text-anchor="middle" fill="#8b90a0" font-size="9">统一智能入口</text>
  <line x1="340" y1="50" x2="465" y2="50" stroke="#6c5ce7" stroke-width="1.3" opacity="0.35" marker-end="url(#exa)"/>
  <rect x="380" y="35" width="110" height="30" rx="8" fill="#1a1d27" stroke="#00b894" stroke-width="1" stroke-opacity="0.4"/>
  <text x="435" y="55" text-anchor="middle" fill="#e1e4ed" font-size="11">🗄 商品数据库</text>
  <line x1="250" y1="72" x2="250" y2="88" stroke="#6c5ce7" stroke-width="1.3" opacity="0.35" marker-end="url(#exa)"/>
  <rect x="180" y="90" width="140" height="30" rx="8" fill="#1a1d27" stroke="#fdcb6e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="250" y="110" text-anchor="middle" fill="#e1e4ed" font-size="11">📦 订单系统</text>
  <line x1="250" y1="120" x2="250" y2="136" stroke="#6c5ce7" stroke-width="1" opacity="0.3" marker-end="url(#exa)"/>
  <rect x="180" y="138" width="140" height="30" rx="8" fill="#1a1d27" stroke="#fdcb6e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="250" y="158" text-anchor="middle" fill="#e1e4ed" font-size="11">🍳 厨房显示板</text>
  <line x1="250" y1="72" x2="100" y2="88" stroke="#6c5ce7" stroke-width="1.3" opacity="0.35" marker-end="url(#exa)"/>
  <rect x="10" y="90" width="140" height="30" rx="8" fill="#1a1d27" stroke="#00cec9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="80" y="110" text-anchor="middle" fill="#e1e4ed" font-size="11">📊 库存系统</text>
  <line x1="80" y1="120" x2="80" y2="136" stroke="#e17055" stroke-width="1" opacity="0.35" marker-end="url(#exa)"/>
  <rect x="10" y="138" width="140" height="30" rx="8" fill="rgba(225,112,85,0.08)" stroke="#e17055" stroke-width="1" stroke-opacity="0.4"/>
  <text x="80" y="158" text-anchor="middle" fill="#e1e4ed" font-size="11">🔔 采购系统</text>
  <text x="250" y="252" text-anchor="middle" fill="#6c5ce7" font-size="10">Agent 不存数据 · 只是已有系统的智能入口</text>
</svg>
</div>

<div class="warn"><div class="lbl">⚠️ 新手最容易犯的错</div>
<p>把Agent做成一个「什么都自己来」的独立系统——自己存订单、自己管库存、自己算财务。<br>
<strong>结果</strong>：订单系统和Agent各存一份数据 → 两边对不上 → 不知道以谁为准。</p>
<p>正确做法：Agent不存数据，<strong>它只是已有系统的智能入口</strong>。数据归属权在原有系统。</p></div>
`
  },{
    id:'wrapper-pattern',ti:'1.2 最常用的方式：给老系统装个AI脑袋',em:'🎁',
    c:`
<h3>包装器模式（Wrapper）——成本最低的接入法</h3>
<div class="analogy"><div class="lbl">📱 给老电视装盒子</div>
<p>你家有个老电视，没有智能系统。不用把电视砸了买新的——<br>
<strong>花200块买个电视盒子，插上去，老电视就能看网络视频了。</strong></p>
<p>包装器模式就是这个思路：<br>
老系统（电视）不动，外面包一层Agent（盒子），用户通过Agent跟老系统交互。</p></div>

<div class="diagram-svg">

  <line x1="325" y1="39" x2="370" y2="39" stroke="#8b90a0" stroke-width="1.3" opacity="0.4" marker-end="url(#wpa)"/>

  <rect x="227" y="103" width="166" height="30" rx="10" fill="rgba(108,92,231,0.12)" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="310" y="123" text-anchor="middle" fill="#e1e4ed" font-size="12" font-weight="600">🤖 Agent 包装器</text>
  <line x1="393" y1="118" x2="438" y2="118" stroke="#6c5ce7" stroke-width="1.5" opacity="0.5" marker-end="url(#wpa)"/>
  <rect x="440" y="103" width="70" height="30" rx="8" fill="#1a1d27" stroke="#2a2e3f" stroke-width="1"/>
  <text x="475" y="123" text-anchor="middle" fill="#e1e4ed" font-size="12">老系统</text>
  <text x="260" y="155" text-anchor="middle" fill="#8b90a0" font-size="11">Agent 自动操作 → 老系统返回数据 → Agent 解释 → 结果</text>
  <text x="260" y="190" text-anchor="middle" fill="#6c5ce7" font-size="10">🎁 老系统一行代码没改</text>
</svg>
</div>

<h4>什么时候用包装器模式？</h4>
<ul>
<li>✅ 系统已经很成熟了，不想动它</li>
<li>✅ 快速验证——花几天就接入，不用几个月</li>
<li>✅ 多个老系统需要统一入口（一个Agent接多个系统）</li>
<li>❌ 不适合：系统本身就很烂、数据混乱</li>
</ul>

<div class="tip"><div class="lbl">💡 真实例子</div>
<p>某公司的客服系统是10年前建的，但数据都在里面。花3天做了一个Agent：<br>
用户问「我的订单到哪了」→ Agent自动查老系统 → 用大白话回复用户。<br>
<strong>老系统一行代码没改。</strong></p></div>

<div class="deep"><div class="lbl">🔬 包装器模式的弱点</div>

<h3>Agent不是金鱼——它需要记住很多事</h3>
<div class="analogy"><div class="lbl">🧠 你的三种记忆</div>

<strong>工作记忆</strong>：这个任务做到哪一步了？——像你做菜时记得「下一步该放盐了」<br>
<strong>长期记忆</strong>：以前遇到过类似的事，怎么处理的？——像你的工作经验</p></div>

<table>
<tr><th>记忆层</th><th>存什么</th><th>存多久</th><th>用什么工具存</th></tr>
<tr><td><span class="hl">对话层</span></td><td>当前聊天内容</td><td>这一次对话</td><td>内存 / Redis</td></tr>

</table>

<div class="tip"><div class="lbl">💡 为什么三层要分开存？</div>
<p>对话结束后对话记忆可以扔掉——省资源。<br>
任务做完了任务记忆可以归档——留档备查。<br>

    c:`
<div class="analogy"><div class="lbl">🎮 打游戏存盘</div>
<p>你在玩一个5小时的游戏。打Boss前存个盘。<br>
如果打Boss死了，读档重来——不用从头开始。</p>
<p>Agent做任务也一样：一个任务可能分5-10步，不能做到第9步崩溃了从头来。</p></div>

<h3>断点续传怎么做？</h3>
<pre>
Step 1: 采集数据 ✅ → [存入数据库: 进度=2/5, 数据=xxx]
Step 2: 分析数据 🔄 → [💥 崩溃！]
--- 重启 ---
Agent 读数据库：「进度在 Step 2，恢复继续」
Step 3: 生成报告 ✅
Step 4: 质检 ✅
Step 5: 发布 ✅
</pre>

<div class="warn"><div class="lbl">⚠️ 没做断点续传会发生什么？</div>
<p>用户等了20分钟，Agent做到90%崩了。重来又是20分钟。<br>
用户：这个AI是智障吧？<br>
其实不是AI智障，是你没做断点续传。</p></div>

<div class="tip"><div class="lbl">💡 关键设计细节</div>
<p>• 每次工具调用前后，更新数据库进度<br>
• 状态里存的不是「文本描述」而是「结构化的数据」，恢复时能精确重建<br>
• 用户可见的进度条要同步更新（「已完成3/5步…」）<br>
• 如果一个步骤重复失败3次，不要无限循环——通知人工介入</p></div>
`

    c:`
<div class="analogy"><div class="lbl">🏠 装修 vs 买精装房</div>
<p>自己装修：想怎么设计都行，但要花时间、要盯着工人、要懂材料。<br>
找装修公司：省心，但有些想法实现不了，且贵。<br>
买精装房：三天搬进去，但格局不能改、用料可能不是最好的。</p></div>

<h3>三选一：哪个适合你？</h3>
<table>
<tr><th></th><th>自建(LangChain)</th><th>低代码(Dify)</th><th>采购成品</th></tr>
<tr><td>灵活性</td><td class="hl3">★★★★★</td><td>★★★</td><td>★</td></tr>
<tr><td>上手速度</td><td>4-8周</td><td>1-2周</td><td>1-3天</td></tr>
<tr><td>长期成本</td><td class="hl4">人力成本高</td><td>中等</td><td>按人付费</td></tr>
<tr><td>被绑定风险</td><td class="hl3">无</td><td>受平台限制</td><td class="hl4">受厂商限制</td></tr>
<tr><td>谁来修bug</td><td class="hl4">你</td><td>平台+你</td><td class="hl3">厂商</td></tr>

<ol>

<li><span class="hl5">团队能维护吗？</span>——没人能写代码→别自建。有工程师→可以考虑。</li>
<li><span class="hl5">时间有多紧？</span>——下周就要上线→买/Dify。半年后也行→自建慢慢来。</li>
<li><span class="hl5">预算是什么结构？</span>——一次性投入 → 自建。按月/按年 → Dify或采购。</li>

<strong>教训</strong>：选择前先想清楚，12个月后你的需求会变成什么样？现在的选择能撑到那时候吗？</p></div>

    id:'langchain-deep',ti:'2.2 LangChain 核心知识',em:'⛓️',
    c:`
<div class="analogy"><div class="lbl">⛓️ LangChain 是什么？</div>
<p>LangChain 是当前最主流的 <strong>Agent 开发框架</strong>（Python / JS）。<br>
它不是「帮你写 Agent 的魔法工具」——它是<strong>把 LLM 的零部件标准化、可拼装</strong>的一套乐高积木。</p></div>

<h3>六大核心模块</h3>
<table>
<tr><th>模块</th><th>解决的问题</th><th>举例</th></tr>
<tr><td><strong>Model I/O</strong></td><td>怎么调用各种模型？</td><td>统一接口调 OpenAI、Claude、本地模型</td></tr>
<tr><td><strong>Retrieval</strong></td><td>怎么让模型「看」外部文档？</td><td>向量数据库 + RAG 管线</td></tr>

const FE={qs:[
  {q:'老系统接入Agent，最推荐的模式是？',o:['推倒重建','包装器模式','不用Agent','全微服务'],c:1},
  {q:'多部门共享Agent能力，用什么架构？',o:['微服务','中台模式','事件驱动','单机'],c:1},
  {q:'模型路由后，约80%请求用什么模型？',o:['大模型','小模型','人工','量子计算'],c:1},
  {q:'中国PIPL对企业用海外LLM的核心影响？',o:['无影响','数据可能出境→需评估','必须涨价','禁用AI'],c:1},
  {q:'审计日志中最关键的Agent特有字段？',o:['时间','思考过程（为什么）','Token数','颜色'],c:1},
  {q:'LangChain Agent 执行循环叫什么？',o:['Plan-Do-Check','ReAct（思考-行动-观察）','Input-Process-Output','Ask-Answer'],c:1},
  {q:'Dify 相比 LangChain 的最大劣势？',o:['太贵','复杂逻辑难实现+平台锁定风险','不支持中文','不能部署'],c:1},
  {q:'国内做 Agent 首选哪个模型（性价比+便利）？',o:['GPT-4o','DeepSeek V4-Flash','Claude Opus','Gemini'],c:1},
  {q:'Dify+L LangChain 的最佳组合策略？',o:['永远只用LangChain','先用Dify验证→效果确认后LangChain重写','两个不用，直接买成品','只学Dify'],c:1},
  {q:'DeepSeek V4-Flash 成本约为 GPT-4o 的多少？',o:['差不多','1/30','1/3','一半'],c:1}
]};

let doneL=new Set(JSON.parse(localStorage.getItem('agent_expert_done')||'[]'));
let qR=JSON.parse(localStorage.getItem('agent_expert_quiz')||'{}');
let cur=null;

function save(){localStorage.setItem('agent_expert_done',JSON.stringify([...doneL]));localStorage.setItem('agent_expert_quiz',JSON.stringify(qR));}
function pg(){let t=0;M.forEach(m=>t+=m.l.length);t+=FE.qs.length;let d=doneL.size;for(let i=0;i<FE.qs.length;i++)if(qR['f_'+i]!==undefined)d++;return Math.round(d/t*100);}
function upd(){let p=pg();document.getElementById('pp').textContent=p+'%';document.getElementById('pb').style.width=p+'%';let n=document.getElementById('nav'),h='';M.forEach(m=>{h+='<div class="nav-mod-t">'+m.t+'</div>';m.l.forEach(l=>{let dn=doneL.has(l.id),ac=cur===l.id;h+='<div class="nav-i'+(ac?' act':'')+(dn?' done':'')+'" onclick="navTo(\''+l.id+'\')"><span class="ch">'+(dn?'✅':l.em)+'</span>'+l.ti+'</div>';});});let fd=FE.qs.every((_,i)=>qR['f_'+i]!==undefined);h+='<div class="nav-i'+(cur==='final'?' act':'')+(fd?' done':'')+'" onclick="navTo(\'final\')"><span class="ch">'+(fd?'✅':'🏆')+'</span>终极测验</div>';n.innerHTML=h;}
function navTo(id){cur=id;upd();render(id);window.scrollTo(0,0);}
function mk(id){if(!doneL.has(id)){doneL.add(id);save();upd();}}

function render(id){
  let main=document.getElementById('mc');
  if(id==='final'){renderF(main);return;}
  let ls=null,mi=-1,li=-1;
  for(let i=0;i<M.length;i++)for(let j=0;j<M[i].l.length;j++)if(M[i].l[j].id===id){ls=M[i].l[j];mi=i;li=j;break;}
  if(!ls){main.innerHTML='<p>未找到</p>';return;}
  let h='';
  if(ls.qz){
    let sv=qR[id]||[];
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>';
    ls.qz.qs.forEach((q,qi)=>{
      let ua=sv[qi],an=ua!==undefined,ok=an&&ua===q.c;
      h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';
      q.o.forEach((o,oi)=>{
        let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';
        h+='<button class="'+cl+'" onclick="ans(\''+id+'\','+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';
      });
      if(an)h+='<div class="q-r show '+(ok?'ok':'no')+'"><strong>'+(ok?'✅ 正确':'❌ 不太对')+'</strong><p>'+q.x+'</p></div>';
      h+='</div>';
    });
    h+='</div>';
  }else{
    h+='<div class="lesson"><h2><span>'+ls.em+'</span> '+ls.ti+'</h2><div class="meta">'+M[mi].t+'</div>'+ls.c+'</div>';
    mk(id);
  }
  h+='<div class="btns">';
  let pr=null;if(li>0)pr=M[mi].l[li-1].id;else if(mi>0){let pm=M[mi-1];pr=pm.l[pm.l.length-1].id;}
  h+=pr?'<button class="btn btn-s" onclick="navTo(\''+pr+'\')">⬅ 上一节</button>':'<div></div>';
  let nx=null;if(li<M[mi].l.length-1)nx=M[mi].l[li+1].id;else if(mi<M.length-1)nx=M[mi+1].l[0].id;
  h+=nx?'<button class="btn btn-p" onclick="navTo(\''+nx+'\')">下一节 ➡</button>':'<button class="btn btn-go" onclick="navTo(\'final\')">🏆 终极测验 ➡</button>';
  h+='</div>';
  main.innerHTML=h;mk(id);
}
function ans(lid,qi,oi){if(!qR[lid])qR[lid]=[];qR[lid][qi]=oi;save();render(lid);}
function renderF(main){
  let h='<div class="lesson"><h2>🏆 终极测验</h2><div class="meta">10题 · 70%及格</div>';
  let ad=true;
  FE.qs.forEach((q,qi)=>{let ua=qR['f_'+qi],an=ua!==undefined;if(!an)ad=false;h+='<div class="quiz"><h3>📝 第'+(qi+1)+'题</h3><div class="q-q">'+q.q+'</div>';q.o.forEach((o,oi)=>{let cl='q-o';if(an&&oi===q.c)cl+=' ok';if(an&&oi===ua&&oi!==q.c)cl+=' no';h+='<button class="'+cl+'" onclick="ansF('+qi+','+oi+')" '+(an?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';});h+='</div>';});
  h+='</div>';
  if(ad){
    let sc=FE.qs.filter((q,i)=>qR['f_'+i]===q.c).length,pc=Math.round(sc/10*100),pass=pc>=70;
    let gr=pc>=90?'🏅 S级':pc>=80?'🥇 A级':pc>=70?'🥈 B级':'📝 继续加油';
    h+='<div class="cert show"><div style="font-size:3em">'+(pass?'🎉':'💪')+'</div><h2>'+(pass?'恭喜完成专家级课程！':'还需要再巩固')+'</h2><div class="grade">'+gr+'</div><div style="font-size:1.5em;color:var(--accent)">'+sc+'/10（'+pc+'%）</div><p style="margin-top:16px;color:var(--sub)">'+(pass?'你已走完从「什么是Agent」到「企业级架构决策」的完整旅程。':'薄弱环节已标出。')+'</p><div style="margin-top:20px"><button class="btn btn-s" onclick="rstF()">🔄 重新测验</button><button class="btn btn-p" onclick="rstA()" style="margin-left:8px">🔁 重学全部</button></div></div>';
    let wr=FE.qs.map((q,i)=>({q,i})).filter(x=>qR['f_'+x.i]!==x.q.c);
    if(wr.length){let mp=['→ 模块一：集成模式','→ 模块一：中台模式','→ 模块二：模型路由降本','→ 模块四：GDPR合规','→ 模块四：审计追溯','→ 模块二：LangChain ReAct循环','→ 模块二：Dify平台锁定风险','→ 模块二：DeepSeek中国模型首选','→ 模块二：Dify+LangChain组合策略','→ 模块二：DeepSeek成本优势'];h+='<div class="tip" style="margin-top:16px"><div class="lbl">📚 薄弱环节</div>';wr.forEach(w=>{h+='<p>❌ 第'+(w.i+1)+'题 '+mp[w.i]+'</p>';});h+='</div>';}
  }
  main.innerHTML=h;if(ad)upd();
}
function ansF(qi,oi){qR['f_'+qi]=oi;save();renderF(document.getElementById('mc'));upd();}
function rstF(){FE.qs.forEach((_,i)=>delete qR['f_'+i]);save();upd();renderF(document.getElementById('mc'));}
function rstA(){localStorage.removeItem('agent_expert_done');localStorage.removeItem('agent_expert_quiz');doneL=new Set();qR={};cur=null;navTo('bridge');}

// Decision interactions (unified)
function d(id,ch){
  let r=document.getElementById(id+'-r'),resp={};
  if(id==='p1'){resp={a:'✅ <strong>包装器模式</strong> —— 不动老系统，只加一个AI入口。成本最低、风险最小、上线最快。',b:'✅ <strong>微服务模式</strong> —— Agent作为独立服务接入。弹性伸缩，适合云原生。前提：你们已经是微服务架构。',c:'✅ <strong>事件驱动模式</strong> —— Agent监听消息队列，在后台自动处理。大批量异步任务的最佳选择。'};}
  else if(id==='p2'){resp={a:'<span style="color:var(--red)">❌ 不推荐。</span> 5000次/天全用大模型，月成本数万元。且70%的FAQ根本不需要大模型。',b:'<span style="color:var(--green)">✅ 最优方案！</span> FAQ(70%)用小模型省大钱，查订单(20%)用中模型保证准，投诉(10%)升级人工—愤怒的人不想跟机器人聊天。总成本降到全大模型的30%。',c:'<span style="color:var(--red)">❌ 不合理。</span> 5000次/天全人工=几十个客服轮班。70%的FAQ自动化即可，人处理剩下的30%。'};}
  r.innerHTML=resp[ch];r.className='d-result show';
}

(function(){cur='bridge';upd();render('bridge');})();
</script>
