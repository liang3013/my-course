  <pre><code>from scipy.stats import spearmanr

# 准备数据：每个月的因子值 + 下个月的收益率
# IC = 当月因子排名 与 下月收益排名 之间的Spearman秩相关

def calc_ic(df, factor_col, return_col="下月收益"):
    """计算单个因子的Rank IC"""
    ic_series = []
    for date in df["日期"].unique():
        slice_df = df[df["日期"] == date].dropna(subset=[factor_col, return_col])
        if len(slice_df) < 30:  # 至少30只股票才有统计意义
            continue
        ic, _ = spearmanr(slice_df[factor_col], slice_df[return_col])
        ic_series.append({"日期": date, "IC": ic})

    ic_df = pd.DataFrame(ic_series)
    print(f"{factor_col} Rank IC均值: {ic_df['IC'].mean():.4f}")
    print(f"{factor_col} ICIR（年化）: {ic_df['IC'].mean()/ic_df['IC'].std()*12**0.5:.2f}")
    return ic_df

# 使用示例

def neutralize(df, factor_col):
    """对行业和市值做中性化"""
    # 行业哑变量 + log市值
    X = pd.get_dummies(df["行业"], drop_first=True)
    X["log_mv"] = np.log(df["总市值"])
    y = df[factor_col]

    # 回归 → 取残差 = 纯因子暴露

    model.fit(X.fillna(0), y.fillna(y.median()))
    df[f"{factor_col}_neutral"] = y - model.predict(X.fillna(0))
    return df</code></pre>

<div class="analogy">

<h3>向量化回测：为什么不用逐日循环？</h3>

<div class="deep">

    <tr><td><strong>向量化</strong></td><td><code>df["signal"].shift(1) * df["return"]</code></td><td><strong>0.05秒</strong></td></tr>
  </table>
  <p><span class="hl">向量化把「for循环一个一个算」变成「整列一次性算」——快10-500倍。</span></p>

<h3>实战：均线交叉策略完整回测</h3>

<pre><code>import pandas as pd
import numpy as np

# === Step 1: 准备数据 ===
# df 包含列：日期, 收盘（前复权）, 开盘, 最高, 最低
# 假设已经从 akshare 获取并清洗好的数据

# === Step 2: 计算均线 ===
df["MA_short"] = df["收盘"].rolling(window=20).mean()  # 20日均线
df["MA_long"] = df["收盘"].rolling(window=60).mean()    # 60日均线

# === Step 3: 生成信号 ===
# 金叉：短期均线上穿长期均线 → 买入（信号=1）
# 死叉：短期均线下穿长期均线 → 卖出（信号=0）
df["signal"] = 0
df.loc[df["MA_short"] > df["MA_long"], "signal"] = 1

# === Step 4: 计算每日收益率 ===
df["日收益"] = df["收盘"].pct_change()
# 策略收益 = 昨天的信号 × 今天的涨跌幅（信号用的是昨天的，今天才知道涨跌）
df["策略日收益"] = df["signal"].shift(1) * df["日收益"]

# === Step 5: 计算绩效指标 ===
# 累计收益曲线
df["策略累计"] = (1 + df["策略日收益"]).cumprod()
df["基准累计"] = (1 + df["日收益"]).cumprod()

# 年化收益率
total_days = len(df)
annual_return = df["策略累计"].iloc[-1] ** (252 / total_days) - 1
benchmark_return = df["基准累计"].iloc[-1] ** (252 / total_days) - 1

# 最大回撤
rolling_max = df["策略累计"].cummax()
drawdown = (df["策略累计"] - rolling_max) / rolling_max
max_drawdown = drawdown.min()

# 夏普比率（假设无风险利率=2%）
excess = df["策略日收益"] - 0.02/252
sharpe = np.sqrt(252) * excess.mean() / excess.std()

# === Step 6: 输出结果 ===
print(f"====== 均线交叉策略回测结果 ======")
print(f"回测区间: {df['日期'].iloc[0]} → {df['日期'].iloc[-1]}")
print(f"策略年化收益: {annual_return*100:.2f}%")
print(f"基准买入持有: {benchmark_return*100:.2f}%")
print(f"最大回撤: {max_drawdown*100:.2f}%")
print(f"夏普比率: {sharpe:.2f}")
print(f"总交易天数: {total_days}")</code></pre>

<div class="warn">
  <div class="label">⚠️ 回测的三个陷阱</div>
  <p>① <strong>信号用了「今天」的数据：</strong><code>df["signal"] * df["日收益"]</code>——这是作弊！应该用 <code>df["signal"].shift(1)</code>，用昨天的信号匹配今天的收益。<br>
  ② <strong>忽略交易费用：</strong>A股买卖一次约0.112%，高频策略费用会吃掉大部分利润。加一句 <code>df["策略日收益"] -= 0.00112 * (df["signal"].diff().abs())</code><br>
  ③ <strong>前复权失真：</strong>起始价格如果<1元，回测收益会被严重夸大。打印 <code>df["收盘"].iloc[0]</code> 检查。</p>
</div>

<h3>🧩 随堂测验</h3>

<div class="quiz-card">
  <div class="quiz-question">向量化回测中，为什么要用 df["signal"].shift(1) 而不是 df["signal"]？</div>

// ===== APP STATE =====
let completedLessons = new Set(JSON.parse(localStorage.getItem('csai_python_course_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('csai_python_course_quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);

function save() {
  localStorage.setItem('csai_python_course_completed', JSON.stringify([...completedLessons]));
  localStorage.setItem('csai_python_course_quiz_results', JSON.stringify(quizResults));
}

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correctChoice) o.classList.add('correct');
    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let total = 0;
  modules.forEach(m => { total += m.lessons.length; });
  total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / total) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';
  html += '<span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }
  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }
  let html = '';
  html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
  html += '<div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>';
  html += lesson.content;
  html += '</div>';
  markComplete(id);

  html += '<div class="nav-btns">';
  let prevId = null;
  if (lesIndex > 0) prevId = modules[modIndex].lessons[lesIndex - 1].id;
  else if (modIndex > 0) { const pm = modules[modIndex - 1]; prevId = pm.lessons[pm.lessons.length - 1].id; }
  if (prevId) html += '<button class="btn btn-secondary" onclick="navigateTo(\'' + prevId + '\')">⬅ 上一节</button>';
  else html += '<div></div>';
  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) nextId = modules[modIndex].lessons[lesIndex + 1].id;
  else if (modIndex < modules.length - 1) nextId = modules[modIndex + 1].lessons[0].id;
  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>';
  else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';
  main.innerHTML = html;
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
    updateUI();
  }
}

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">共' + finalExam.questions.length + '题 — 检验你对Python量化编程的掌握</div>';
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    const isCorrect = answered && ua === q.correct;
    html += '<div class="quiz-card"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
    html += '<div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFinalExam(' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
    });
    html += '</div>';
  });
  if (finalExamDone) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const passed = score / total >= 0.6;
    html += '<div class="lesson-card" style="text-align:center"><h2>' + (passed ? '🎉 恭喜通过！' : '📚 还需要再练练') + '</h2>';
    html += '<p style="font-size:2em;margin:20px 0">' + score + ' / ' + total + '</p>';
    html += '<p>' + (passed ? '你已经掌握了用Python做量化分析的核心技能！' : '建议复习薄弱环节后再试。') + '</p>';
    if (!passed) {
      const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
      html += '<div style="margin-top: 16px; text-align: left;"><p style="color: var(--accent);">需要复习的题目：</p>';
      wrong.forEach(w => { html += '<p style="color:var(--sub);font-size:0.9em">• ' + w.q.q.substring(0, 60) + '…</p>'; });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  main.innerHTML = html;
}

function answerFinalExam(qi, choice) {
  quizResults['final_' + qi] = choice;
  if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true;
  save();
  updateUI();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('csai_python_course_completed');
  localStorage.removeItem('csai_python_course_quiz_results');
  location.reload();
}

// ===== INIT =====
(function init() {
  currentSection = 'why-python';
  updateUI();
  renderContent('why-python');
})();
</script>
