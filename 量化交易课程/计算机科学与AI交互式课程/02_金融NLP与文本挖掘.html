<div class="label" style="margin-top:16px">🚲 Level 2：理解上下文（BERT）</div>

  <strong>Query（查询）：</strong>「我最关心什么？」——每人在纸条上写下自己最想知道的事<br>
  <strong>Key（索引）：</strong>「我能提供什么？」——每人写下自己掌握的信息标签<br>
  <strong>Value（内容）：</strong>「我的具体信息是什么？」——每人写下详细信息</p>
  <p><strong>Self-Attention做的事：</strong>每个人拿着自己的Query去匹配所有人的Key——匹配度越高，就越认真听那个人的Value。<span class="hl">一轮交流后，每个人对问题的理解都更新了——融合了所有人的视角。</span></p>
</div>

<h3>为什么Self-Attention对金融文本特别重要</h3>

<div class="deep">
  <div class="label">🔬 三个金融NLP的关键场景</div>
  <p>① <strong>长距离依赖：</strong>「腾讯……（中间200字）……营收增长8%」——传统RNN读到后面已经忘了前面在说腾讯。Self-Attention中「营收增长」直接和「腾讯」建立连接——不管中间隔了多少字。</p>
  <p>② <strong>指代消解：</strong>「该公司表示……其管理层……它们预计」——这些代词指向谁？Self-Attention通过计算每个代词和所有实体的注意力权重，自动找到最强的连接。</p>
  <p>③ <strong>语义消歧：</strong>「增长放缓但仍超预期」——「放缓」是负面词，「超预期」是正面词。Self-Attention同时关注这两个词，综合判断整体情感是中性偏正。</p>
</div>

<h3>多头注意力：8个专家同时看</h3>

<div class="tip">
  <div class="label">💡 Multi-Head = 多角度理解</div>
  <p>单头Attention只能从一个角度理解文本。BERT用12个头——意味着12个「专家」同时阅读同一段文字：<br>
  • 头1关注「谁对谁做了什么」（语法关系）<br>
  • 头2关注「数字和单位」（财务指标）<br>
  • 头3关注「否定和转折」（情感倾向）<br>
  • 头4关注「时间顺序」（事件因果）<br>
  ……</p>
  <p><span class="hl">12个头各自关注不同的维度，最后融合——这就是BERT理解力远超Word2Vec的根源。</span></p>
</div>

let completedLessons = new Set(JSON.parse(localStorage.getItem('csai_nlp_completed') || '[]'));

function save() {

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');

  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => { o.style.pointerEvents = 'none'; if (i === correctChoice) o.classList.add('correct'); else o.classList.add('wrong'); });
  const result = card.querySelector('.quiz-result');
  if (result) result.classList.add('show');
}
function calcProgress() {
  let total = 0; modules.forEach(m => { total += m.lessons.length; }); total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) { if (quizResults['final_' + i] !== undefined) done++; }
  return Math.round((done / total) * 100);
}
function updateUI() {

    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const done = completedLessons.has(lesson.id);
      const active = currentSection === lesson.id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + lesson.id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>' + lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')"><span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';

}
function navigateTo(id) { currentSection = id; updateUI(); renderContent(id); window.scrollTo(0, 0); }
function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }
  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) { lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break; }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }
  let html = '';

    const savedAnswers = quizResults[id] || [];

    lesson.quiz.questions.forEach((q, qi) => {
      const ua = savedAnswers[qi]; const answered = ua !== undefined; const isCorrect = answered && ua === q.correct;
      html += '<div class="quiz-card"><h3>📝 第 ' + (qi + 1) + ' 题</h3><div class="quiz-question">' + q.q + '</div>';
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answered && oi === q.correct) cls += ' correct';
        if (answered && oi === ua && oi !== q.correct) cls += ' wrong';

      });

      html += '</div>';
    });

    html += '<div class="lesson-card"><h2>' + lesson.emoji + ' ' + lesson.title + '</h2>';
    html += '<div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>';

  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>'; else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';

}
function answerFE(qi, choice) { quizResults['final_' + qi] = choice; if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true; save(); renderFinalExam(document.getElementById('mainContent')); }
