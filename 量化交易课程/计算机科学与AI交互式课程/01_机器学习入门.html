  <p><strong>机器学习中的「尝味道」= 计算误差。「调整盐量」= 更新参数。</strong></p>
</div>

<div class="tip">
  <div class="label">🚲 比喻三：机器学习 = 学生备考</div>

<div class="quiz-card">

        title: '三个最基础的概念：数据、模型、训练',
        emoji: '📦',
        content: `
<h3>概念一：什么是「数据」？</h3>

<div class="analogy">
  <div class="label">📦 数据 = 被记录下来的事实</div>
  <p><strong>你每天就在产生数据：</strong><br>
  • 你今天走了8000步 → 这是一个<strong>数据点</strong><br>
  • 你这个月每天的步数 → 这是一列<strong>时间序列数据</strong><br>
  • 你今天步数+睡眠时间+心率+体重 → 这是一行<strong>结构化数据</strong>（表格中的一行）</p>
  
  <p><strong>在量化投资中：</strong><br>

  <p><span class="hl">数据就是「被记录下来的信息」。你手机上任何一个数字，都可以成为数据。</span></p>
</div>

<h3>概念二：什么是「模型」？</h3>

<div class="deep">
  <div class="label">📦 模型 = 从数据中总结出来的规律</div>
  <p><strong>最简单的模型：</strong>y = ax + b<br>

  <p><strong>模型的两面性：</strong><br>

  • <span class="hl">好的模型 = 在简单和复杂之间找到最佳平衡点</span></p>
</div>

<div class="tip">

  模型：成绩 = a × 学习时间 + b</p>
  
  <p><strong>训练过程：</strong><br>
  ① 随便猜：a=10, b=50 → 预测：学1小时=60分（对），学2小时=70分（实际65，错！）<br>

  ③ 再微调：a=6, b=54 → 预测：学1小时=60，学2小时=66（差1），学3小时=72（对！）<br>

</div>

<h3>用你完全能理解的例子走一遍完整流程</h3>

<div class="analogy">
  <div class="label">🗺️ 问题：预测一个学生期末考试能考多少分？</div>

<h3>Baum-Welch算法：HMM的学习引擎——用直觉理解，不用公式背诵</h3>

<div class="analogy">
  <div class="label">🔬 一句话概括Baum-Welch</div>
  <p><strong>你有一堆观测数据（PMI、利差、库存），但不知道背后有几个隐藏状态。HMM的学习算法（Baum-Welch）做一件事：</strong></p>
  <p>猜一组参数 → 看数据符不符合 → 调整参数让数据更符合 → 重复直到收敛</p>
  <p>这和训练XGBoost没有本质区别——都是「猜→验证→调整→再猜」的循环。区别在于HMM的「猜」涉及到隐变量（你看不到的状态）。</p>
</div>

<h3>三步循环——就像调收音机</h3>

<div class="deep">
  <div class="label">🔬 Baum-Welch = E步 + M步 + 循环</div>
  <p><strong>类比：调一台老式收音机</strong><br>
  你调到某个频率→听到模糊的音乐+大量噪音→你微调旋钮→声音清晰了一点→再微调→直到最清晰</p>
  
  <p><strong>E步（Expectation——「猜」）：</strong><br>
  给定当前的参数（旋钮位置），计算「每个时刻属于每个隐藏状态的概率」。<br>
  例：基于当前的模型，「2023年3月是衰退的概率=0.73，是复苏的概率=0.22，是过热的概率=0.05」</p>
  
  <p><strong>M步（Maximization——「调」）：</strong><br>
  基于E步算出的概率，重新估计最优参数（状态转移概率、观测概率分布）。<br>
  例：「如果大多数观测的概率都指向衰退→提高衰退状态的观测概率参数」</p>
  
  <p><strong>循环：</strong>E步→M步→E步→M步→……直到参数不再显著变化（收敛）。<br>
  <span class="hl">每一轮循环，模型对「哪个观测属于哪个状态」的判断都更准确一点。</span></p>
</div>

<h3>为什么HMM需要EM算法——而XGBoost不需要？</h3>

<div class="tip">

  <p><span class="hl">理解这一点比记住任何公式都重要。</span></p>
</div>

<h3>🧩 随堂测验</h3>

</div>

}

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correctChoice) o.classList.add('correct');
    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let total = 0;
  modules.forEach(m => { total += m.lessons.length; });
  total += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / total) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';

  nav.innerHTML = html;
}

function answerQuiz(lessonId, qi, choice) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];

    if (allAnswered) markComplete(lessonId);

      wrong.forEach(w => { html += '<p style="color:var(--sub);font-size:0.9em">• ' + w.q.q.substring(0, 60) + '…</p>'; });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  main.innerHTML = html;
}

function answerFinalExam(qi, choice) {
  quizResults['final_' + qi] = choice;
  if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true;
  save();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('csai_course_completed');
  localStorage.removeItem('csai_course_quiz_results');
  location.reload();
}

// ===== INIT =====
(function init() {
  currentSection = 'zero-what-is-ml';
  updateUI();
  renderContent('zero-what-is-ml');
})();
</script>
</body>
</html>
