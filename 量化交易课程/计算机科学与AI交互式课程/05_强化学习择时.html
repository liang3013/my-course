<h3>投资常识惩罚函数</h3>

<pre><code>def reward_function(action, portfolio_state):
    # 基础奖励：风险调整收益
    reward = sharpe_ratio * 0.01
    
    # 惩罚1：过度集中
    if max_position > 0.30:

    # 惩罚2：过度换手
    if daily_turnover > 0.20:
        reward -= 5.0   # 日换手>20%→扣分
    
    # 惩罚3：追涨停

<h3>Q值的直觉：每个动作都有一个「长期价值评分」</h3>

  <p>Q-Learning做的事：<strong>不断更新每个(状态, 动作)组合的Q值——直到Q值反映真实的长期收益。</strong></p>

<h3>Bellman方程：Q-Learning的核心更新规则——拆开看</h3>

<div class="deep">
  <div class="label">🔬 一条公式，三个部分</div>
  <p><strong>Q_new(s,a) = Q_old(s,a) + α × [ reward + γ × max_a' Q(s',a') - Q_old(s,a) ]</strong></p>
  
  <p><strong>逐个拆解：</strong><br>
  <strong>Q_old(s,a)：</strong>当前你对「在状态s做动作a」的估值<br>
  <strong>reward：</strong>做完动作a后，立即得到的奖励（这步交易赚了还是亏了）<br>
  <strong>γ × max_a' Q(s',a')：</strong>到达新状态s'后，未来能获得的最大Q值×折扣因子（未来的钱不如现在的钱值钱）<br>
  <strong>reward + γ × max Q - Q_old：</strong>TD误差——「实际经历的结果」和「你之前的估计」之间的差距<br>
  <strong>α：</strong>学习率——你有多相信这次新经历（α=0.1表示10%相信新经历，90%保留旧估计）</p>
  
  <p><strong>翻译成人话：</strong><br>

  <p><strong>γ=0.9：</strong>未来的奖励打九折——Agent更看重眼前的收益。对应「短线交易」心态。</p>

  <p><span class="hl">DQN = Q-Learning + 神经网络 = 从「查表」变成「学会规律」。</span></p>
</div>
