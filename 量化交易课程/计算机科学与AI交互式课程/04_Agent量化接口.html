let completedLessons = new Set(JSON.parse(localStorage.getItem('csai_agent_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('csai_agent_quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);
function save() { localStorage.setItem('csai_agent_completed', JSON.stringify([...completedLessons])); localStorage.setItem('csai_agent_quiz_results', JSON.stringify(quizResults)); }
function quickQuiz(btn, c) { const card = btn.closest('.quiz-card'); if (card.dataset.answered) return; card.dataset.answered = 'true'; card.querySelectorAll('.quiz-option').forEach((o, i) => { o.style.pointerEvents = 'none'; if (i === c) o.classList.add('correct'); else o.classList.add('wrong'); }); const r = card.querySelector('.quiz-result'); if (r) r.classList.add('show'); }
function calcProgress() { let t = 0; modules.forEach(m => t += m.lessons.length); t += finalExam.questions.length; let d = completedLessons.size; for (let i = 0; i < finalExam.questions.length; i++) if (quizResults['final_' + i] !== undefined) d++; return Math.round(d / t * 100); }
function updateUI() { document.getElementById('progressPct').textContent = calcProgress() + '%'; document.getElementById('progressBar').style.width = calcProgress() + '%'; let h = ''; modules.forEach(m => { h += '<div class="nav-module-title">' + m.title + '</div>'; m.lessons.forEach(l => { const done = completedLessons.has(l.id), a = currentSection === l.id; h += '<div class="nav-item' + (a ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + l.id + '\')"><span class="check">' + (done ? '✅' : l.emoji || '📖') + '</span>' + l.title + '</div>'; }); }); h += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')"><span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>'; document.getElementById('navContainer').innerHTML = h; }
function navigateTo(id) { currentSection = id; updateUI(); renderContent(id); window.scrollTo(0, 0); }
function renderContent(id) { const main = document.getElementById('mainContent'); if (id === 'final') { renderFinalExam(main); return; } let lesson = null, mi = -1, li = -1; for (let i = 0; i < modules.length; i++) for (let j = 0; j < modules[i].lessons.length; j++) if (modules[i].lessons[j].id === id) { lesson = modules[i].lessons[j]; mi = i; li = j; } if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; } let html = ''; if (lesson.quiz) { const saved = quizResults[id] || []; html += '<div class="lesson-card"><h2>' + lesson.emoji + ' ' + lesson.title + '</h2><div class="meta">共' + lesson.quiz.questions.length + '题</div>'; lesson.quiz.questions.forEach((q, qi) => { const ua = saved[qi], ans = ua !== undefined, ok = ans && ua === q.correct; html += '<div class="quiz-card"><h3>📝 第' + (qi + 1) + '题</h3><div class="quiz-question">' + q.q + '</div>'; q.options.forEach((o, oi) => { let cls = 'quiz-option'; if (ans && oi === q.correct) cls += ' correct'; if (ans && oi === ua && oi !== q.correct) cls += ' wrong'; html += '<button class="' + cls + '" onclick="answerQuiz(\'' + id + '\',' + qi + ',' + oi + ')" ' + (ans ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + o + '</button>'; }); if (ans) html += '<div class="quiz-result show ' + (ok ? 'pass' : 'fail') + '"><strong>' + (ok ? '✅ 正确！' : '❌ 不太对') + '</strong><p>' + (q.explain || '') + '</p></div>'; html += '</div>'; }); html += '</div>'; } else { html += '<div class="lesson-card"><h2>' + lesson.emoji + ' ' + lesson.title + '</h2><div class="meta">' + modules[mi].title.replace(/^[^\s]+\s/, '') + '</div>' + lesson.content + '</div>'; markComplete(id); } html += '<div class="nav-btns">'; let prev = null; if (li > 0) prev = modules[mi].lessons[li - 1].id; else if (mi > 0) prev = modules[mi - 1].lessons[modules[mi - 1].lessons.length - 1].id; html += prev ? '<button class="btn btn-secondary" onclick="navigateTo(\'' + prev + '\')">⬅ 上一节</button>' : '<div></div>'; let next = null; if (li < modules[mi].lessons.length - 1) next = modules[mi].lessons[li + 1].id; else if (mi < modules.length - 1) next = modules[mi + 1].lessons[0].id; html += next ? '<button class="btn btn-primary" onclick="navigateTo(\'' + next + '\')">下一节 ➡</button>' : '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>'; html += '</div>'; main.innerHTML = html; }
function answerQuiz(id, qi, c) { if (!quizResults[id]) quizResults[id] = []; quizResults[id][qi] = c; save(); const l = modules.flatMap(m => m.lessons).find(x => x.id === id); if (l && l.quiz && quizResults[id].filter(v => v !== undefined).length === l.quiz.questions.length) markComplete(id); renderContent(id); }
function markComplete(id) { if (!completedLessons.has(id)) { completedLessons.add(id); save();  } }
function renderFinalExam(main) { let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">共' + finalExam.questions.length + '题</div>'; finalExam.questions.forEach((q, qi) => { const ua = quizResults['final_' + qi], ans = ua !== undefined, ok = ans && ua === q.correct; html += '<div class="quiz-card"><h3>📝 第' + (qi + 1) + '题</h3><div class="quiz-question">' + q.q + '</div>'; q.options.forEach((o, oi) => { let cls = 'quiz-option'; if (ans && oi === q.correct) cls += ' correct'; if (ans && oi === ua && oi !== q.correct) cls += ' wrong'; html += '<button class="' + cls + '" onclick="answerFE(' + qi + ',' + oi + ')" ' + (ans ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + o + '</button>'; }); html += '</div>'; }); if (finalExamDone) { const s = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length, t = finalExam.questions.length, p = s / t >= 0.6; html += '<div style="text-align:center"><h2>' + (p ? '🎉 恭喜通过！' : '📚 再练练') + '</h2><p style="font-size:2em">' + s + '/' + t + '</p></div>'; } html += '</div>'; main.innerHTML = html; }
function answerFE(qi, c) { quizResults['final_' + qi] = c; if (finalExam.questions.every((_, i) => quizResults['final_' + i] !== undefined)) finalExamDone = true; save(); renderFinalExam(document.getElementById('mainContent')); }
function resetAll() { localStorage.removeItem('csai_agent_completed'); localStorage.removeItem('csai_agent_quiz_results'); location.reload(); }
