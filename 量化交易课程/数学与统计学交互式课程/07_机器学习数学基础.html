const modules = [
  {

    lessons: [
      {
        id: 'bias-variance',
        title: '偏差-方差分解——ML在金融中的核心矛盾',
        emoji: '⚖️',
        content: `
<h3>MSE = 偏差² + 方差 + 不可约误差</h3>

<div class="formula">
  MSE = E[(ŷ−y)²] = (E[ŷ]−y)² + Var(ŷ) + σ²<br>
  <span style="font-size:0.8em;color:var(--sub)">偏差²=模型平均离真值多远 · 方差=每次训练结果差多少 · σ²=数据本身的噪声</span>
</div>

<div class="analogy">
  <div class="label">🏹 射箭类比——偏差和方差的直观理解</div>
  <p><strong>高偏差（欠拟合）：</strong>所有箭都射在靶子左边——模型太简单，学不到真实规律。投资中=只用PE一个因子。</p>
  <p><strong>高方差（过拟合）：</strong>每次射箭都散在不同位置——模型过度记住训练数据中的噪声。投资中=1000个因子回测IC=0.6，样本外IC=−0.1。</p>
</div>

<div class="warning">
  <div class="label">⚠️ 金融ML的独特挑战——信噪比极低</div>
  <p>图像识别：信号/噪声≈10:1（猫就是猫）。金融预测：信号/噪声≈1:10。<strong>不可约误差σ²远大于ML其他领域→过拟合是默认状态，不是意外。</strong></p>
</div>

<h3>📝 案例：不同复杂度的模型在A股上的表现</h3>
<div class="deep">
  <div class="label">💰 预测下月收益——线性 vs 10树 vs 500树XGBoost</div>
  <div class="table-wrap"><table>
    <tr><th>模型</th><th>参数</th><th>样本内IC</th><th>样本外IC</th><th>问题</th></tr>
    <tr><td>线性回归</td><td>5个因子</td><td>0.08</td><td>0.06</td><td>高偏差（模型太简单）</td></tr>
    <tr><td>XGBoost(10树)</td><td>~200</td><td>0.12</td><td>0.09</td><td class="hl2">偏差-方差平衡</td></tr>
    <tr><td>XGBoost(500树)</td><td>~10000</td><td>0.38</td><td class="hl4">−0.05</td><td>严重过拟合</td></tr>
  </table></div>
  <p><strong>教训：</strong>500树IC=0.38看起来超棒→<span class="hl4">样本外−0.05，方向都反了。</span>这就是过拟合的经典症状——记住了历史噪声而非真实规律。</p>
</div>

<h3>📝 案例：用交叉验证找最优模型复杂度</h3>
<div class="deep"><div class="label">💰 50只股票，逐步增加XGBoost树数→看验证集IC</div>
  <div class="table-wrap"><table>
    <tr><th>树数</th><th>训练集IC</th><th>验证集IC</th><th>测试集IC</th><th>判断</th></tr>
    <tr><td>10棵</td><td>0.08</td><td>0.06</td><td>0.05</td><td>偏差大→太简单</td></tr>
    <tr><td>50棵</td><td>0.12</td><td>0.10</td><td>0.09</td><td class="hl2">验证集最优→选这个</td></tr>
    <tr><td>100棵</td><td>0.18</td><td>0.09</td><td>0.04</td><td>开始过拟合</td></tr>
    <tr><td>300棵</td><td>0.32</td><td>0.05</td><td class="hl4">−0.03</td><td>严重过拟合</td></tr>
  </table></div>
  <p><strong>选50棵——</strong>验证集IC最高的点。300棵训练IC=0.32但验证已暴跌→<span class="hl">训练和验证的差距就是过拟合的量——差距越大越危险。</span></p>
</div>

<div class="quiz-card"><h3>🧩 随堂测验</h3>
  <div class="quiz-question">金融ML为什么比图像ML更容易过拟合？</div>
  <button class="quiz-option" onclick="answerQuiz('bias-variance',0,0)">A. 数据更多</button>
  <button class="quiz-option" onclick="answerQuiz('bias-variance',0,1)">B. 信噪比极低——不可约误差σ²远大于其他领域。金融≈1:10，图像≈10:1。ML很容易学到噪声模式</button>
  <button class="quiz-option" onclick="answerQuiz('bias-variance',0,2)">C. 模型更复杂</button>
  <button class="quiz-option" onclick="answerQuiz('bias-variance',0,3)">D. 没有验证集</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'regularization',
        title: '正则化——L1/L2的数学直觉与量化应用',
        emoji: '🏋️',
        content: `
<h3>给模型加「约束」——不让它太自由</h3>

<div class="formula">
  L1(Lasso): Loss + λ·Σ|wᵢ|  → 产生稀疏解（很多系数=0）<br>
  L2(Ridge): Loss + λ·Σwᵢ² → 产生平滑解（系数都小但不为0）
</div>

<div class="analogy">
  <div class="label">🏋️ L1=健身教练让你只练三个动作。L2=让你每个动作都练但别太重</div>
  <p><strong>L1(Lasso)：</strong>倾向于把不重要的系数压到0→自动特征选择。量化中用L1筛选因子：50个候选因子→L1后只剩8个非零→这8个就是最强的。</p>
  <p><strong>L2(Ridge)：</strong>把所有系数向0压缩但不等于0。量化中用于控制模型复杂度：500棵树+L2→等效于减到~100棵的效果。</p>
</div>

<h3>📝 案例：L1筛选A股因子——从50个到8个</h3>
<div class="deep"><div class="label">💰 50个基本面+技术面因子→L1回归→8个非零</div>
  <p><strong>L1选出的8个：</strong>PE倒数、ROE、动量(12-1)、换手率倒数、股息率、市值对数、波动率倒数、应计比率。</p>
  <p><strong>L1淘汰的42个：</strong>毛利率、净利率、收入增速、现金流比率……不是它们没用——<span class="hl">是它们的预测信息已被8个核心因子覆盖了。</span>L1自动去除了高度共线的冗余因子。</p>
</div>

<div class="quiz-card"><h3>🧩 随堂测验</h3>
  <div class="quiz-question">L1(Lasso)为什么能自动选因子？</div>
  <button class="quiz-option" onclick="answerQuiz('regularization',0,0)">A. 人为选择</button>
  <button class="quiz-option" onclick="answerQuiz('regularization',0,1)">B. L1惩罚的几何形状是菱形→最优解在坐标轴上→很多系数精确=0。L2惩罚是圆形→系数小但不为0。菱形接触坐标轴=自动筛选</button>
  <button class="quiz-option" onclick="answerQuiz('regularization',0,2)">C. 这是巧合</button>
  <button class="quiz-option" onclick="answerQuiz('regularization',0,3)">D. 通过p值选择</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'elastic-net',
        title: '弹性网——L1+L2的黄金组合',
        emoji: '🎯',
        content: `
<h3>Elastic Net = L1 + L2——鱼与熊掌兼得</h3>

<div class="formula">
  Loss + lambda1 * sum|wi| + lambda2 * sum(wi^2)
</div>

<div class="deep">
  <div class="label">🎯 L1选因子(稀疏)+L2稳定(平滑)=Elastic Net</div>
  <p><strong>L1的缺陷：</strong>如果两个因子高度相关，L1只能选一个——另一个被随意丢弃。</p>
  <p><strong>Elastic Net解法：</strong>lambda1做筛选、lambda2让相关因子共享权重——<span class="hl">既稀疏又不会随意丢弃相关信息。</span></p>
  <p><strong>量化参数：</strong>alpha=lambda1/(lambda1+lambda2)控制L1/L2比例。alpha=0.5=各一半。CV选最优alpha。</p>
</div>

<div class="quiz-card"><h3>🧩 随堂测验</h3>
  <div class="quiz-question">Elastic Net相比纯L1的优势？</div>
  <button class="quiz-option" onclick="answerQuiz('elastic-net',0,0)">A. 更快</button>
  <button class="quiz-option" onclick="answerQuiz('elastic-net',0,1)">B. L1选因子+L2让相关因子共享权重——不会在高相关因子中随便丢弃信息</button>
  <button class="quiz-option" onclick="answerQuiz('elastic-net',0,2)">C. 更简单</button>
  <button class="quiz-option" onclick="answerQuiz('elastic-net',0,3)">D. 没有优势</button>
  <div class="quiz-result"></div>
</div>
`

        content: `
<h3>五层防御——每一层都在拦住过拟合</h3>

<div class="table-wrap"><table>
  <tr><th>层级</th><th>防御</th><th>具体做法</th><th>如果没做→</th></tr>
  <tr><td><strong>①数据层</strong></td><td>时间序列CV</td><td>不用随机K-Fold。用滚动窗口：训练[1-36月]→验证[37-48月]→测试[49-60月]</td><td class="hl4">前视泄漏→样本内IC虚高</td></tr>
  <tr><td><strong>②模型层</strong></td><td>正则化(L1/L2)</td><td>损失函数+λ·‖w‖₁(Lasso)或λ·‖w‖²₂(Ridge)</td><td>500棵树完美拟合噪声</td></tr>
  <tr><td><strong>③特征层</strong></td><td>维度控制</td><td>样本量至少>50×特征数。1000周数据→最多20个因子</td><td class="hl4">维度灾难→虚假相关</td></tr>
  <tr><td><strong>④验证层</strong></td><td>样本外测试</td><td>最后20%数据从未参与任何训练。只用一次——最后评估</td><td>过拟合不被发现</td></tr>
  <tr><td><strong>⑤生产层</strong></td><td>衰减监控</td><td>IC跌破阈值→自动触发重训练。IC衰减=策略老化</td><td>过期模型继续亏钱</td></tr>
</table></div>

<h3>📝 案例：随机K-Fold vs 时间序列CV——同一个模型天差地别</h3>

  'gradient-boosting-math': [{ correct:1, explain:'正确。小η=每棵树增量小→需要更多树来拟合信号→但每棵树过拟合风险低。这是Boosting的核心trade-off：η小→树多→每棵树风险低→总风险可控。XGBoost默认η=0.3但实践中0.05-0.1更稳健。' }],
  'feature-importance': [{ correct:1, explain:'正确。Gain(默认)会高估高基数特征(如股票ID→能给每只股票一个不同预测→信息增益看似巨大但完全不可泛化)。Permutation打乱特征看性能→才是真实贡献。' }],
  'overfitting-signals': [{ correct:1, explain:'正确。A股多因子策略Sharpe天花板约1.5-2.0(年化)。Sharpe>3要么天才(Top0.01%)要么bug。实践中99.99%是bug——前视泄漏或过度参数化。' }],
  'live-monitoring': [{ correct:1, explain:'正确。连续3月IC<0不是「还能抢救」的信号——这是「策略已死」的信号。市场结构可能变了(如风格切换)。不应试图微调拯救→应该重新审视因子逻辑或启用备用策略。' }],
};

const finalExam = [
  { q:'MSE=偏差²+方差+不可约误差。金融ML中哪一项最棘手？', opts:['偏差','方差——信噪比极低→过拟合是默认状态','不可约误差','都一样'], correct:1 },
  { q:'随机K-Fold CV在金融中最大的问题？', opts:['太慢','前视泄漏——未来信息混入训练集→样本内表现虚高3-6倍','太复杂','结果不稳定'], correct:1 },
  { q:'随机森林降低的是什么？', opts:['偏差','方差——Bagging取平均让各自过拟合互相抵消','不可约误差','计算量'], correct:1 },
  { q:'XGBoost在量化中的正确用法？', opts:['直接预测收益率','合成非线性因子→IC验证→纳入线性模型。保留可解释性','替代所有线性模型','不需要验证'], correct:1 },
  { q:'前视泄漏最隐蔽的形式？', opts:['数据打乱','标准化用全样本μ/σ→间接引入了未来信息','缺失值填充','异常值处理'], correct:1 },
  { q:'Boosting vs Bagging的核心区别？', opts:['速度不同','Bagging并行(Bootstrap+投票)降方差；Boosting串行(拟合残差)降偏差','没有区别','Bagging更复杂'], correct:1 },
  { q:'ML Agent相比传统线性分析的最大增量？', opts:['速度','发现交互效应(A×B)和非线性(U型)模式——这些是线性模型的盲区','更简单','不需要数据'], correct:1 },
  { q:'500树XGBoost样本内IC=0.38→样本外−0.05说明了什么？', opts:['模型太简单','严重过拟合——记住了历史噪声。需要正则化、减树数、时间序列CV','数据太少','参数不对'], correct:1 },
];

let completedLessons = new Set(JSON.parse(localStorage.getItem('ml_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('ml_course_quiz') || '{}');
let finalDone = false, currentSection = 'bias-variance';

function save() {
  localStorage.setItem('ml_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('ml_course_quiz', JSON.stringify(quizResults));
}

function updateUI() {
  const totalLessons = modules.reduce((s,m)=>s+m.lessons.length,0);
  const done = completedLessons.size;
  const pct = Math.round(done/totalLessons*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = pct+'%';
  let navHTML = '';
  modules.forEach((m,mi) => {
    navHTML += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach((l) => {
      const isActive = l.id === currentSection;
      const isDone = completedLessons.has(l.id);
      navHTML += '<div class="nav-item'+(isActive?' active':'')+(isDone?' done':'')+'" onclick="navigateTo(\''+l.id+'\')">';
      navHTML += '<span class="check">'+(isDone?'✅':'○')+'</span>';
      navHTML += '<span>'+l.emoji+' '+l.title+'</span></div>';
    });
    navHTML += '</div>';
  });
  navHTML += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div>';
  navHTML += '<div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = navHTML;
}

function navigateTo(id) {
  currentSection = id;
  completedLessons.add(id);
  if (id !== 'final') save();
  updateUI();
  if (id === 'final') renderFinalExam();
  else renderContent(id);
  window.scrollTo(0,0);
}

function renderContent(id) {
  let lesson = null;
  for (const m of modules) { const found = m.lessons.find(l => l.id === id); if (found) { lesson = found; break; } }
  if (!lesson) return;
  let allLessons = []; modules.forEach(m => allLessons.push(...m.lessons));
  const idx = allLessons.findIndex(l => l.id === id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  let html = '<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html += '<div class="meta">📈 时间序列与动态建模 · 第二课</div>';
  html += lesson.content;
  const qd = quizData[id];
  if (qd) {
    const script = '\n<script>\n(function(){\n  const answers = '+JSON.stringify(qd)+';\n  const userAnswers = quizResults[\''+id+'\'] || [];\n  answers.forEach((a,qi) => {\n    if (userAnswers[qi] !== undefined) {\n      const card = document.querySelectorAll(\'.quiz-card\')[qi];\n      if (!card) return;\n      const btns = card.querySelectorAll(\'.quiz-option\');\n      const result = card.querySelector(\'.quiz-result\');\n      btns.forEach((b,oi) => {\n        b.disabled = true;\n        if (oi === a.correct) b.classList.add(\'correct\');\n        if (oi === userAnswers[qi] && oi !== a.correct) b.classList.add(\'wrong\');\n      });\n      if (result) {\n        result.innerHTML = \'<span class=\"ans\">✅ 正确！</span> \' + a.explain;\n        result.classList.add(\'show\', userAnswers[qi]===a.correct ? \'pass\' : \'fail\');\n      }\n    }\n  });\n})();\n<\\/script>\n';
    html += script;
  }
  html += '<div class="nav-btns">';
  if (prev) html += '<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>';
  else html += '<span></span>';
  if (next) html += '<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>';
  else html += '<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
  if (typeof simAR1 === 'function') simAR1();
  if (typeof simGARCH === 'function') simGARCH();
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save(); renderContent(lessonId);
}

// ===== SIMULATORS =====
function simAR1() {
  const phi = parseFloat(document.getElementById('ar1-phi')?.value||0.7);
  const n = parseInt(document.getElementById('ar1-n')?.value||50);
  const el = document.getElementById('ar1Val');
  if (!el) return;
  let y = 0, vals = [];
  for (let t = 0; t < n; t++) { y = phi*y + (Math.random()-0.5)*2; vals.push(y); }
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min || 1;
  const lines = [];
  for (let i = 0; i < Math.min(10, n); i++) {
    const pct = Math.round((vals[i]-min)/range*100);
    lines.push('█'.repeat(Math.max(1,Math.round(pct/5))));
  }
  el.textContent = 'φ₁='+phi+' | '+(phi>0?'动量延续':phi<0?'反转回归':'白噪声')+'\n前10期: '+vals.slice(0,10).map(v=>v.toFixed(1)).join(' ');
}

function simGARCH() {
  const alpha = parseFloat(document.getElementById('garch-alpha')?.value||0.1);
  const beta = parseFloat(document.getElementById('garch-beta')?.value||0.85);
  const el = document.getElementById('garchVal');
  const sumEl = document.getElementById('garchSum');
  if (!el) return;
  if (sumEl) sumEl.textContent = (alpha+beta).toFixed(2);
  let sigma2 = 1;
  const sigmas = [];
  for (let t = 0; t < 40; t++) {
    const eps = (Math.random()-0.5)*2;
    sigma2 = 0.05 + alpha*eps*eps + beta*sigma2;
    sigmas.push(Math.sqrt(sigma2));
  }
  const lines = sigmas.map((s,i) => {
    const bar = '█'.repeat(Math.round(s*10));
    return bar + ' ' + s.toFixed(2);
  });
  el.textContent = 'α+β='+(alpha+beta).toFixed(2)+' | '+(alpha+beta>0.97?'高持续（恐慌持久）':alpha+beta>0.9?'中等持续':'低持续（快速衰减）')+'\n' + lines.join('\n');
}

// ===== FINAL EXAM =====
function startFinalExam() { navigateTo('final'); }
function renderFinalExam() {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8道题 · 覆盖本课全部模块 · 70%及格</div>';
  let allAnswered = true;
  finalExam.forEach((q,qi) => {
    const ua = quizResults['final_'+qi];
    if (ua === undefined) allAnswered = false;
    html += '<div class="quiz-card"><h3>📝 第'+(qi+1)+'题</h3><div class="quiz-question">'+q.q+'</div>';
    q.opts.forEach((opt,oi) => {
      let cls = 'quiz-option';
      if (ua !== undefined && oi === q.correct) cls += ' correct';
      if (ua !== undefined && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="'+cls+'" onclick="answerFinal('+qi+','+oi+')" '+(ua!==undefined?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+opt+'</button>';
    });
    html += '</div>';
  });
  html += '</div>';
  if (allAnswered) {
    const score = finalExam.filter((q,i) => quizResults['final_'+i] === q.correct).length;
    const pct = Math.round(score/8*100);
    const passed = pct >= 70;
    html += '<div class="certificate show"><div style="font-size:3em">'+(passed?'🎉':'💪')+'</div>';
    html += '<h2>'+(passed?'恭喜毕业！':'还需要再练练')+'</h2>';
    html += '<div class="grade">'+score+' / 8 （'+pct+'%）</div>';
    html += '<p style="color:var(--sub)">'+(passed?'你已掌握时间序列分析的核心工具。下一步：随机过程与连续金融——学习股价的随机运动规律。':'再看看薄弱环节——GARCH和HMM是量化周期策略的核心。')+'</p>';
    html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}

function answerFinal(qi, oi) {
  quizResults['final_'+qi] = oi;
  save();
  finalDone = finalExam.every((_,i) => quizResults['final_'+i] !== undefined);
  if (finalDone) completedLessons.add('final');
  updateUI(); renderFinalExam();
}

function resetFinal() {
  finalExam.forEach((_,i) => delete quizResults['final_'+i]);
  completedLessons.delete('final'); finalDone = false;
  save(); updateUI(); renderFinalExam();
}

function resetAll() {
  localStorage.removeItem('ml_course_done');
  localStorage.removeItem('ml_course_quiz');
  completedLessons = new Set(); quizResults = {}; finalDone = false;
  currentSection = 'bias-variance';
  save(); updateUI(); renderContent('bias-variance'); window.scrollTo(0,0);
}
window.resetAll = resetAll;

// ===== INIT =====
(function() {
  currentSection = 'bias-variance';
  updateUI();
  renderContent('bias-variance');
})();
</script>
