      {
        id: 'why-causality',
        title: '为什么相关不等于因果——金融中最贵的错误',
        emoji: '🔬',
        content: `
<h3>三个经典案例——每个都值1000亿</h3>

<div class="warning">
  <div class="label">⚠️ 案例一：冰淇淋销量与溺水死亡（r=0.8）</div>
  <p><strong>结论：</strong>冰淇淋导致溺水？错。<strong>遗漏变量：夏天。</strong>夏天→人们吃更多冰淇淋 AND 更多人去游泳→两者同时上升。</p>
  <p><strong>投资映射：</strong>「高ROE的股票未来收益更高」→ 是ROE导致的，还是「低估值」（遗漏变量）同时导致高ROE和高未来收益？不控制估值，你分不清。</p>
</div>

<div class="deep">
  <div class="label">🔬 因果推理的黄金标准——反事实框架</div>
  <p><strong>反事实：</strong>如果发生了X，结果Y=？如果没发生X，结果Y=？两者的差=因果效应。</p>
  <p><strong>问题：</strong>你永远只能看到一个结果——一个人要么吃了药，要么没吃。你不可能同时观察两个世界。</p>
  <p><strong>解法：</strong>计量经济学的一切方法（DID、RDD、IV）都在试图<span class="hl">「构造」反事实</span>——找一个合理的对照组来替代「如果没发生X会怎样」。</p>
</div>

<h3>金融量化中最常见的三种伪相关</h3>

<div class="table-wrap">
<table>
  <tr><th>伪相关类型</th><th>表现</th><th>防御方法</th></tr>
  <tr><td><strong>遗漏变量</strong></td><td>X和Y都受Z影响→X和Y看起来相关</td><td>控制变量·固定效应·DID</td></tr>
  <tr><td><strong>反向因果</strong></td><td>不是X导致Y，是预期Y导致X</td><td>工具变量(IV)·Granger因果</td></tr>
  <tr><td><strong>幸存者偏差</strong></td><td>你只看到活下来的公司→低估了风险</td><td>全样本·前视偏差检查</td></tr>
</table>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">发现「高研发投入的公司收益更高」——这一定是因果关系吗？</div>
  <button class="quiz-option" onclick="answerQuiz('why-causality',0,0)">A. 是——数据证明了</button>
  <button class="quiz-option" onclick="answerQuiz('why-causality',0,1)">B. 不一定——可能是反向因果（预期高收益→才有钱研发）或遗漏变量（好管理层→又搞研发又高收益）</button>
  <button class="quiz-option" onclick="answerQuiz('why-causality',0,2)">C. 是——回归系数显著</button>
  <button class="quiz-option" onclick="answerQuiz('why-causality',0,3)">D. 一定是伪相关</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'endogeneity',
        title: '内生性——为什么OLS回归系数不可信',
        emoji: '🔄',
        content: `
<h3>X和误差项相关→OLS有偏→系数不是你想要的因果效应</h3>

<div class="warning">
  <div class="label">⚠️ 内生性的三种来源</div>
  <p><strong>1. 遗漏变量：</strong>同时影响X和Y的变量没放入模型→X和误差项相关<br>
  <strong>2. 反向因果：</strong>Y也在影响X→X不是外生的<br>
  <strong>3. 测量误差：</strong>X测量不准确→衰减偏误（系数被低估）</p>
</div>

<h3>📝 案例：研发投入→未来收益——OLS vs IV</h3>

<div class="deep">
  <div class="label">🔬 A股制造业公司(2015-2020)</div>
  <div class="table-wrap">
  <table>
    <tr><th>方法</th><th>系数(研发每+1%→收益+?)</th><th>问题</th></tr>
    <tr><td>OLS回归</td><td>+0.35%</td><td class="hl4">有偏——好公司同时搞研发和赚钱</td></tr>
    <tr><td>IV(行业平均研发作工具)</td><td>+0.12%</td><td class="hl2">更接近真实因果效应</td></tr>
  </table>
  </div>
  <p><strong>差距：</strong>OLS高估了近3倍——因为它把「好公司→研发多 AND 收益高」的关联也算进去了。IV去掉了这部分内生性。<span class="hl">这就是为什么只看回归系数做投资决策会翻车。</span></p>
</div>

<h3>📝 案例：广告投入→销售收入——OLS vs IV的差距</h3>

<div class="deep">
  <div class="label">📺 某消费品公司12个季度数据</div>
  <p><strong>OLS回归：</strong>广告每+100万→收入+320万。看起来广告回报率320%——太好了，好到不真实。</p>
  <p><strong>内生性在哪？</strong>公司在旺季（Q4）同时加大广告和自然销售收入高→遗漏了「季节效应」。而且收入好的时候公司才有钱投广告→反向因果。</p>
  <p><strong>IV（用竞争对手同期广告作工具）：</strong>广告每+100万→收入<strong>+140万</strong>。<span class="hl">OLS高估了128%。</span>去掉季节效应和反向因果后，真实广告回报率只有40%。</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">内生性导致OLS系数有偏的根本原因是什么？</div>
  <button class="quiz-option" onclick="answerQuiz('endogeneity',0,0)">A. 样本太小</button>
  <button class="quiz-option" onclick="answerQuiz('endogeneity',0,1)">B. X和误差项相关→违反OLS核心假设E[ε|X]=0→系数不但不准还有系统性偏差</button>
  <button class="quiz-option" onclick="answerQuiz('endogeneity',0,2)">C. 数据不完整</button>
  <button class="quiz-option" onclick="answerQuiz('endogeneity',0,3)">D. 模型太简单</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'fama-macbeth',
        title: 'Fama-MacBeth两步法——因子检验的黄金标准',
        emoji: '🏆',
        content: `
<h3>为什么简单IC不够——Fama-MacBeth给你「纯溢价」</h3>

<div class="deep">
  <div class="label">🏆 FM两步法（1973·因子投资奠基之作）</div>
  <p><strong>第一步（时间序列）：</strong>对每只股票，用历史数据回归→估计它对每个因子的暴露βᵢ<br>
  Rᵢₜ − Rfₜ = αᵢ + βᵢ₁·F₁ₜ + βᵢ₂·F₂ₜ + ... + εᵢₜ</p>
  <p><strong>第二步（横截面）：</strong>每个时间点t，对所有股票的收益 vs 因子暴露做横截面回归→估计每个因子的溢价λₜ<br>
  Rᵢₜ = λ₀ₜ + λ₁ₜ·βᵢ₁ + λ₂ₜ·βᵢ₂ + ... + ηᵢₜ</p>
  <p><strong>最终：</strong>对λₜ序列取均值+Newey-West标准误→判断因子溢价的显著性。</p>
</div>

<div class="deep">
  <div class="label">🏆 为什么FM优于简单IC？</div>
  <p><span class="hl2">FM控制其他因子→测的是「纯溢价」（一个因子对收益的边际贡献）。</span></p>
  <p>简单IC只看了单因子与收益的相关性→可能被遗漏变量污染。比如你发现「市盈率倒数（E/P）与收益正相关」→「这到底是价值因子的贡献，还是规模因子的贡献（低PE的公司往往也小）？」FM在第二步控制了规模因子后，才能回答这个问题。</p>
</div>

<h3>📝 案例：中国A股的三因子FM回归（简化版）</h3>

<div class="deep">
  <div class="label">🇨🇳 市场因子(MKT)+规模因子(SMB)+价值因子(HML)</div>
  <p><strong>数据：</strong>沪深300成分股，2015-2020月度数据。</p>
  <div class="table-wrap">
  <table>
    <tr><th>因子</th><th>FM溢价λ(年化)</th><th>Newey-West t</th><th>显著？</th></tr>
    <tr><td>市场(MKT)</td><td>6.5%</td><td>3.21</td><td class="hl2">✅ t>2.0</td></tr>
    <tr><td>规模(SMB)</td><td>2.8%</td><td>1.85</td><td class="hl3">⚠️ 边缘显著</td></tr>
    <tr><td>价值(HML)</td><td>4.2%</td><td>2.45</td><td class="hl2">✅ t>2.0</td></tr>
  </table>
  </div>
  <p><strong>解读：</strong>在控制了市场和规模后，价值因子仍有4.2%年化纯溢价(t=2.45)→A股价值因子有效。规模因子在控制其他两因子后仅边缘显著(t=1.85<2.0)→<span class="hl">单独看可能显著，但部分效果被价值因子「吸收」了。</span></p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>

  { q:'事件研究中CAR[0,+2]=+3%意味着什么？', opts:['公司赚了3%','事件本身为股东创造了3%的异常收益（扣除市场走势后）','股价涨了3%','分红3%'], correct:1 },
  { q:'PMI Granger-cause工业收益说明什么？', opts:['PMI是工业收益的原因','PMI的历史数据有助于预测未来工业收益——时序预测关系','Granger因果=真因果','工业决定PMI'], correct:1 },
  { q:'工具变量(IV)需要满足哪两个条件？', opts:['大样本和正态性','相关性(IV与X相关)和外生性(IV只通过X影响Y)','线性和可逆','显著和不显著'], correct:1 },
  { q:'为何A股价值因子(HML)的FM溢价显著但规模因子(SMB)边缘显著？', opts:['数据问题','规模因子的效果被价值因子部分吸收——在控制价值后规模溢价减弱。说明两个因子有重叠','计算错误','模型问题'], correct:1 },
];

let completedLessons = new Set(JSON.parse(localStorage.getItem('econ_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('econ_course_quiz') || '{}');
let finalDone = false, currentSection = 'why-causality';


function save() {
  localStorage.setItem('econ_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('econ_course_quiz', JSON.stringify(quizResults));
}

function updateUI() {
  const totalLessons = modules.reduce((s,m)=>s+m.lessons.length,0);
  const done = completedLessons.size;
  const pct = Math.round(done/totalLessons*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = pct+'%';
  let navHTML = '';
  modules.forEach((m,mi) => {
    navHTML += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach((l) => {
      const isActive = l.id === currentSection;
      const isDone = completedLessons.has(l.id);
      navHTML += '<div class="nav-item'+(isActive?' active':'')+(isDone?' done':'')+'" onclick="navigateTo(\''+l.id+'\')">';
      navHTML += '<span class="check">'+(isDone?'✅':'○')+'</span>';
      navHTML += '<span>'+l.emoji+' '+l.title+'</span></div>';
    });
    navHTML += '</div>';
  });
  navHTML += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div>';
  navHTML += '<div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = navHTML;
}

function navigateTo(id) {
  currentSection = id;
  completedLessons.add(id);
  if (id !== 'final') save();
  updateUI();
  if (id === 'final') renderFinalExam();
  else renderContent(id);
  window.scrollTo(0,0);
}

function renderContent(id) {
  let lesson = null;
  for (const m of modules) { const found = m.lessons.find(l => l.id === id); if (found) { lesson = found; break; } }
  if (!lesson) return;
  let allLessons = []; modules.forEach(m => allLessons.push(...m.lessons));
  const idx = allLessons.findIndex(l => l.id === id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  let html = '<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html += '<div class="meta">📈 时间序列与动态建模 · 第二课</div>';
  html += lesson.content;
  const qd = quizData[id];
  if (qd) {
    const script = '\n<script>\n(function(){\n  const answers = '+JSON.stringify(qd)+';\n  const userAnswers = quizResults[\''+id+'\'] || [];\n  answers.forEach((a,qi) => {\n    if (userAnswers[qi] !== undefined) {\n      const card = document.querySelectorAll(\'.quiz-card\')[qi];\n      if (!card) return;\n      const btns = card.querySelectorAll(\'.quiz-option\');\n      const result = card.querySelector(\'.quiz-result\');\n      btns.forEach((b,oi) => {\n        b.disabled = true;\n        if (oi === a.correct) b.classList.add(\'correct\');\n        if (oi === userAnswers[qi] && oi !== a.correct) b.classList.add(\'wrong\');\n      });\n      if (result) {\n        result.innerHTML = \'<span class=\"ans\">✅ 正确！</span> \' + a.explain;\n        result.classList.add(\'show\', userAnswers[qi]===a.correct ? \'pass\' : \'fail\');\n      }\n    }\n  });\n})();\n<\\/script>\n';
    html += script;
  }
  html += '<div class="nav-btns">';
  if (prev) html += '<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>';
  else html += '<span></span>';
  if (next) html += '<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>';
  else html += '<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
  if (typeof simAR1 === 'function') simAR1();
  if (typeof simGARCH === 'function') simGARCH();
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save(); renderContent(lessonId);
}

// ===== SIMULATORS =====
function simAR1() {
  const phi = parseFloat(document.getElementById('ar1-phi')?.value||0.7);
  const n = parseInt(document.getElementById('ar1-n')?.value||50);
  const el = document.getElementById('ar1Val');
  if (!el) return;
  let y = 0, vals = [];
  for (let t = 0; t < n; t++) { y = phi*y + (Math.random()-0.5)*2; vals.push(y); }
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min || 1;
  const lines = [];
  for (let i = 0; i < Math.min(10, n); i++) {
    const pct = Math.round((vals[i]-min)/range*100);
    lines.push('█'.repeat(Math.max(1,Math.round(pct/5))));
  }
  el.textContent = 'φ₁='+phi+' | '+(phi>0?'动量延续':phi<0?'反转回归':'白噪声')+'\n前10期: '+vals.slice(0,10).map(v=>v.toFixed(1)).join(' ');
}

function simGARCH() {
  const alpha = parseFloat(document.getElementById('garch-alpha')?.value||0.1);
  const beta = parseFloat(document.getElementById('garch-beta')?.value||0.85);
  const el = document.getElementById('garchVal');
  const sumEl = document.getElementById('garchSum');
  if (!el) return;
  if (sumEl) sumEl.textContent = (alpha+beta).toFixed(2);
  let sigma2 = 1;
  const sigmas = [];
  for (let t = 0; t < 40; t++) {
    const eps = (Math.random()-0.5)*2;
    sigma2 = 0.05 + alpha*eps*eps + beta*sigma2;
    sigmas.push(Math.sqrt(sigma2));
  }
  const lines = sigmas.map((s,i) => {
    const bar = '█'.repeat(Math.round(s*10));
    return bar + ' ' + s.toFixed(2);
  });
  el.textContent = 'α+β='+(alpha+beta).toFixed(2)+' | '+(alpha+beta>0.97?'高持续（恐慌持久）':alpha+beta>0.9?'中等持续':'低持续（快速衰减）')+'\n' + lines.join('\n');
}

// ===== FINAL EXAM =====
function startFinalExam() { navigateTo('final'); }
function renderFinalExam() {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8道题 · 覆盖本课全部模块 · 70%及格</div>';
  let allAnswered = true;
  finalExam.forEach((q,qi) => {
    const ua = quizResults['final_'+qi];
    if (ua === undefined) allAnswered = false;
    html += '<div class="quiz-card"><h3>📝 第'+(qi+1)+'题</h3><div class="quiz-question">'+q.q+'</div>';
    q.opts.forEach((opt,oi) => {
      let cls = 'quiz-option';
      if (ua !== undefined && oi === q.correct) cls += ' correct';
      if (ua !== undefined && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="'+cls+'" onclick="answerFinal('+qi+','+oi+')" '+(ua!==undefined?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+opt+'</button>';
    });
    html += '</div>';
  });
  html += '</div>';
  if (allAnswered) {
    const score = finalExam.filter((q,i) => quizResults['final_'+i] === q.correct).length;
    const pct = Math.round(score/8*100);
    const passed = pct >= 70;
    html += '<div class="certificate show"><div style="font-size:3em">'+(passed?'🎉':'💪')+'</div>';
    html += '<h2>'+(passed?'恭喜毕业！':'还需要再练练')+'</h2>';
    html += '<div class="grade">'+score+' / 8 （'+pct+'%）</div>';
    html += '<p style="color:var(--sub)">'+(passed?'你已掌握时间序列分析的核心工具。下一步：随机过程与连续金融——学习股价的随机运动规律。':'再看看薄弱环节——GARCH和HMM是量化周期策略的核心。')+'</p>';
    html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}

function answerFinal(qi, oi) {
  quizResults['final_'+qi] = oi;
  save();
  finalDone = finalExam.every((_,i) => quizResults['final_'+i] !== undefined);
  if (finalDone) completedLessons.add('final');
  updateUI(); renderFinalExam();
}

function resetFinal() {
  finalExam.forEach((_,i) => delete quizResults['final_'+i]);
  completedLessons.delete('final'); finalDone = false;
  save(); updateUI(); renderFinalExam();
}

function resetAll() {
  localStorage.removeItem('econ_course_done');
  localStorage.removeItem('econ_course_quiz');
  completedLessons = new Set(); quizResults = {}; finalDone = false;
  currentSection = 'why-causality';
  save(); updateUI(); renderContent('why-causality'); window.scrollTo(0,0);
}
window.resetAll = resetAll;

// ===== INIT =====
(function() {
  currentSection = 'why-causality';
  updateUI();
  renderContent('why-causality');
})();
</script>
