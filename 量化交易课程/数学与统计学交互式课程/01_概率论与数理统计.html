.lesson-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:32px 34px; margin-bottom:24px; transition:border-color 0.25s; }
.lesson-card:hover { border-color:rgba(0,184,148,0.2); }

.lesson-card h2 .emoji { font-size:1.2em; }

.analogy .label { font-size:0.78em; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; font-weight:600; display:flex; align-items:center; gap:6px; }

.diagram-svg { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 12px; margin:18px 0; text-align:center; overflow-x:auto; }

.warning { background:rgba(248,81,73,0.06); border:1px solid rgba(248,81,73,0.2); border-left:3px solid var(--red); }
.deep { background:rgba(0,184,148,0.05); border:1px solid rgba(0,184,148,0.12); border-left:3px solid var(--accent); }

.warning .label { color:var(--red); }

.step-list { display:flex; gap:12px; flex-wrap:wrap; margin:16px 0; }

tr:hover td { background:rgba(0,184,148,0.03); }

.quiz-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--radius); padding:26px 28px; margin:24px 0; transition:border-color 0.25s; }

.quiz-card h3 { font-size:1.1em; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.quiz-question { margin:16px 0 8px; font-weight:600; font-size:0.93em; }

.quiz-option.correct { border-color:var(--green); background:rgba(63,185,80,0.08); color:var(--green); }
.quiz-option.wrong { border-color:var(--red); background:rgba(248,81,73,0.08); color:var(--red); }

.quiz-result { margin-top:14px; padding:14px; border-radius:8px; display:none; font-size:0.88em; }
.quiz-result.show { display:block; }
.quiz-result.pass { background:rgba(63,185,80,0.1); border:1px solid var(--green); }
.quiz-result.fail { background:rgba(248,81,73,0.1); border:1px solid var(--red); }
.quiz-result .ans { color:var(--green); font-weight:600; }

.calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0; }
.calc-input { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; }
.calc-input label { display:block; font-size:0.8em; color:var(--sub); margin-bottom:4px; }

.calc-input input:focus,.calc-input select:focus { outline:none; border-color:var(--accent); }
.calc-result { grid-column:1/-1; background:linear-gradient(135deg, rgba(0,184,148,0.08), rgba(0,206,201,0.06)); border:1px solid var(--accent2); border-radius:var(--radius); padding:18px; text-align:center; }
.calc-result .clabel { font-size:0.82em; color:var(--sub); }
.calc-result .cval { font-size:1.8em; font-weight:700; color:var(--accent); margin:6px 0; }
.calc-result .csub { font-size:0.8em; color:var(--sub); }

.btn { display:inline-flex; align-items:center; gap:6px; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; font-size:0.9em; font-weight:600; transition:all 0.2s; letter-spacing:0.3px; }
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--accent); color:#000; box-shadow:0 2px 8px rgba(0,184,148,0.25); }
.btn-primary:hover { background:#00a884; }
.btn-secondary { background:var(--border); color:var(--text); }
.btn-secondary:hover { background:#3a4a60; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.nav-btns { display:flex; justify-content:space-between; margin-top:28px; }

.certificate { display:none; background:linear-gradient(135deg, rgba(0,184,148,0.08), rgba(0,206,201,0.05)); border:2px solid var(--accent2); border-radius:var(--radius); padding:44px 36px; text-align:center; margin:24px 0; box-shadow:0 4px 32px rgba(0,206,201,0.06); }
.certificate.show { display:block; animation:fadeIn 0.5s ease; }
.certificate h2 { font-size:1.8em; color:var(--accent2); margin-bottom:6px; }
.certificate .grade { font-size:2.5em; color:var(--accent); font-weight:800; margin:14px 0 6px; }

.hl { color:var(--accent); font-weight:600; }
.hl2 { color:var(--green); font-weight:600; }
.hl3 { color:var(--yellow); font-weight:600; }

@media(max-width:768px) {
  .app { flex-direction:column; }
  .sidebar { width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border); }
  .main { padding:20px 16px; }
  .step-list { flex-direction:column; }
  .calc-grid { grid-template-columns:1fr; }
}

const modules = [
  {

      {
        id: 'why-probability',
        title: '为什么量化投资用概率说话',
        emoji: '🎲',
        content: `
<h3>从「我觉得」到「数据显示」</h3>

<div class="analogy">
  <div class="label">🏥 医生 vs 占卜师</div>
  <p><strong>占卜师说：</strong>「这只股票会涨。」<br>
  <strong>医生说：</strong>「根据5000例临床数据，这个治疗方案的有效率是78%（95%CI: 72%-83%）。」</p>
  <p style="margin-top:8px"><span class="hl">量化投资 = 用量化医生的方式做决策，不是用量化占卜师的方式。</span></p>
</div>

<p>量化投资的全部工作可以浓缩为一句话：<strong>把「我觉得这公司好」转化为「这个因子的Rank IC均值=0.12，年化ICIR=0.68，20日Rank IC显著不为零的概率>99%」。</strong></p>

<h3>概率思维的三个核心转变</h3>

<div class="step-list">
  <div class="step-card">
    <div class="num">1</div>
    <div class="title">从「对/错」到「概率」</div>
    <div class="desc">不判断「这个因子好不好」，而是问「这个因子有效的概率是多少？」</div>
  </div>
  <div class="step-card">
    <div class="num">2</div>
    <div class="title">从「一个数字」到「一个分布」</div>
    <div class="desc">不输出「内在价值=500元」，而是输出「内在价值在350-720之间的概率=90%」</div>
  </div>
  <div class="step-card">
    <div class="num">3</div>
    <div class="title">从「静止」到「更新」</div>
    <div class="desc">不是把结论定死，而是每次看到新数据就更新信念——贝叶斯式的持续学习</div>
  </div>
</div>

<div class="deep">
  <div class="label">🎲 这门课你会学到什么</div>
  <p>• 用概率分布描述不确定性——不再给出虚假的精确答案<br>
  • 用贝叶斯法则更新信念——先验（经验）+ 似然（数据）→ 后验（新信念）<br>
  • 用统计推断区分信号和噪声——这个因子是真的有效还是运气？<br>
  • 用IC分析量化因子预测力——量化策略的核心性能指标</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">量化投资的「概率思维」与传统基本面分析的「判断思维」最本质的区别是什么？</div>
  <button class="quiz-option" onclick="answerQuiz('why-probability',0,0)">A. 量化投资用更多数据</button>
  <button class="quiz-option" onclick="answerQuiz('why-probability',0,1)">B. 量化投资把观点表达为概率分布而非二元判断——「因子有效的概率>99%」替代「这个因子好」</button>
  <button class="quiz-option" onclick="answerQuiz('why-probability',0,2)">C. 量化投资使用计算机</button>
  <button class="quiz-option" onclick="answerQuiz('why-probability',0,3)">D. 量化投资更复杂</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'distributions-basics',
        title: '概率分布：描述不确定性的语言',
        emoji: '📊',
        content: `
<h3>为什么金融数据不能用正态分布？</h3>

<div class="analogy">
  <div class="label">🌡️ 正态分布——物理世界的规律</div>
  <p>人的身高：大多数在170±10cm，几乎不可能有3米的人。<br>
  工厂零件：公差范围内集中，极端偏差极罕见。</p>
  <p style="margin-top:8px"><strong>但金融市场不是这样的。</strong></p>
</div>

<h3>正态 vs 真实：1987年黑色星期一说了一切</h3>

<div class="diagram-svg">
<svg viewBox="0 0 780 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Normal curve -->
  <path d="M40,230 C120,230 200,40 390,40 C580,40 660,230 740,230" fill="none" stroke="#00b894" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="390" y="28" text-anchor="middle" fill="#00b894" font-size="13" font-weight="600">正态分布预测：日跌>5%的概率≈0.00003%</text>

  <!-- Fat tail curve -->
  <path d="M40,235 C120,235 200,60 300,90 C350,100 390,40 480,90 C530,100 580,60 660,235 700,240 740,235" fill="none" stroke="#e28413" stroke-width="2.5"/>
  <text x="390" y="160" text-anchor="middle" fill="#e28413" font-size="13" font-weight="600">真实分布（肥尾）：日跌>5%的概率≈0.5%</text>

  <!-- Extreme event marker -->
  <circle cx="390" cy="90" r="6" fill="#f85149"/>
  <text x="390" y="112" text-anchor="middle" fill="#f85149" font-size="11">黑色星期一：日跌20%</text>
  <text x="390" y="128" text-anchor="middle" fill="#f85149" font-size="10">正态分布预测概率：10⁻¹⁸⁰（不可能）</text>
  <text x="390" y="144" text-anchor="middle" fill="#f85149" font-size="10">实际：每10-20年发生一次</text>
</svg>
</div>

<div class="warning">
  <div class="label">⚠️ 金融数据三大特征</div>
  <p><strong>1. 肥尾（Fat Tail）：</strong>极端事件比正态预测的多10-100倍——1987一天跌20%，按正态分布几十亿年才发生一次<br>
  <strong>2. 波动率聚集（Volatility Clustering）：</strong>大波动后面跟着大波动，小波动后面跟着小波动——不是随机的<br>
  <strong>3. 尾部依赖（Tail Dependence）：</strong>崩盘时所有资产的相关性突然飙升——平时分散的资产，危机时一起跳水</p>

<h3>量化投资中最重要的三种分布</h3>

<div class="table-wrap">
<table>
  <tr><th>分布</th><th>特征</th><th>量化应用</th></tr>

</table>

  <div class="quiz-result"></div>
</div>
`

        emoji: '🎯',
        content: `
<h3>两个定理，量化投资的底层逻辑</h3>

<div class="deep">

<h3>什么是Copula？</h3>

<div class="formula">
  C(u₁, u₂) = P(U₁ ≤ u₁, U₂ ≤ u₂)<br>

  <div class="label">🔗 Copula的核心价值</div>
  <p><strong>问题：</strong>你知道每只股票各自的收益分布（边缘分布），但你不知道它们一起跌的概率（联合分布）。</p>
  <p><strong>Copula解法：</strong>把「各自的分布」和「它们怎么一起动」分开建模。Copula只负责相关性结构，不碰边缘分布——两件事互不干扰。</p>

    { correct:1, explain:'正确。Gaussian Copula假设尾部相关性=0→「所有人同时违约」几乎不可能。2008年前用此模型为次贷CDO定价，违约潮到来时所有资产一起暴跌（相关性→0.8），模型瞬间失效。Taleb称此「知识分子的狂妄」。' }
  ]
};

// ===== FINAL EXAM =====
const finalExam = [
  { q:'量化投资的「概率思维」最核心的特征是什么？', opts:['给出精确的预测数字','用概率分布描述不确定性——输出的是分布而非点估计','使用大量数据','使用计算机'], correct:1 },
  { q:'贝叶斯公式中P(θ)代表什么？', opts:['似然——新数据提供的证据','先验概率——看到数据前的初始信念','后验概率——更新后的信念','边际概率'], correct:1 },
  { q:'金融收益为什么不能用正态分布建模？', opts:['正态分布太简单','肥尾——极端事件发生概率比正态预测高10-100倍，且存在波动率聚集','金融数据太少','正态分布计算太慢'], correct:1 },
  { q:'Spearman Rank IC比Pearson IC好的原因是什么？', opts:['计算更快','只看排名关系——抗异常值，一只股票涨了500%不会主导整个分析','结果更好看','历史更悠久'], correct:1 },
  { q:'你测试了1000个因子，在α=0.05水平下，预期有多少个「显著」的结果纯属运气？', opts:['5个','50个','100个','0个，p值是精确的'], correct:1 },
  { q:'Black-Litterman模型解决了Markowitz优化器的什么致命缺陷？', opts:['计算太慢','输入敏感——μ的微小误差→w的巨大变化（误差最大化器），BL用均衡权重作为稳健先验','不能处理做空','需要太多数据'], correct:1 },
  { q:'CVaR（条件风险价值）比VaR好在哪里？', opts:['计算更简单','CVaR告诉我们超过VaR阈值后平均亏多少——VaR对尾部一无所知','CVaR更常用','两者没有区别'], correct:1 },
  { q:'Alpha检验三层体系中，第三层Fama-MacBeth的核心价值是什么？', opts:['速度最快','控制其他因子后测「纯溢价」——不像简单IC可能被遗漏变量污染','不需要数据','更适合A股'], correct:1 },
];

// ===== STATE =====
let completedLessons = new Set(JSON.parse(localStorage.getItem('prob_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('prob_course_quiz') || '{}');
let finalDone = false;
let currentSection = 'why-probability';


function save() {
  localStorage.setItem('prob_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('prob_course_quiz', JSON.stringify(quizResults));
}

function updateUI() {
  const totalLessons = modules.reduce((s,m)=>s+m.lessons.length,0);
  const done = completedLessons.size;
  const pct = Math.round(done/totalLessons*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = pct+'%';
  let navHTML = '';
  modules.forEach((m,mi) => {
    navHTML += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach((l) => {
      const isActive = l.id === currentSection;
      const isDone = completedLessons.has(l.id);
      navHTML += '<div class="nav-item'+(isActive?' active':'')+(isDone?' done':'')+'" onclick="navigateTo(\''+l.id+'\')">';
      navHTML += '<span class="check">'+(isDone?'✅':'○')+'</span>';
      navHTML += '<span>'+l.emoji+' '+l.title+'</span></div>';
    });
    navHTML += '</div>';
  });
  navHTML += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div>';
  navHTML += '<div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = navHTML;
}

function navigateTo(id) {
  currentSection = id;
  completedLessons.add(id);
  if (id !== 'final') save();
  updateUI();
  if (id === 'final') renderFinalExam();
  else renderContent(id);
  window.scrollTo(0,0);
}

function renderContent(id) {
  let lesson = null;
  for (const m of modules) { const found = m.lessons.find(l => l.id === id); if (found) { lesson = found; break; } }
  if (!lesson) return;
  let allLessons = []; modules.forEach(m => allLessons.push(...m.lessons));
  const idx = allLessons.findIndex(l => l.id === id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  let html = '<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html += '<div class="meta">📈 时间序列与动态建模 · 第二课</div>';
  html += lesson.content;
  const qd = quizData[id];
  if (qd) {
    const script = '\n<script>\n(function(){\n  const answers = '+JSON.stringify(qd)+';\n  const userAnswers = quizResults[\''+id+'\'] || [];\n  answers.forEach((a,qi) => {\n    if (userAnswers[qi] !== undefined) {\n      const card = document.querySelectorAll(\'.quiz-card\')[qi];\n      if (!card) return;\n      const btns = card.querySelectorAll(\'.quiz-option\');\n      const result = card.querySelector(\'.quiz-result\');\n      btns.forEach((b,oi) => {\n        b.disabled = true;\n        if (oi === a.correct) b.classList.add(\'correct\');\n        if (oi === userAnswers[qi] && oi !== a.correct) b.classList.add(\'wrong\');\n      });\n      if (result) {\n        result.innerHTML = \'<span class=\"ans\">✅ 正确！</span> \' + a.explain;\n        result.classList.add(\'show\', userAnswers[qi]===a.correct ? \'pass\' : \'fail\');\n      }\n    }\n  });\n})();\n<\\/script>\n';
    html += script;
  }
  html += '<div class="nav-btns">';
  if (prev) html += '<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>';
  else html += '<span></span>';
  if (next) html += '<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>';
  else html += '<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
  if (typeof simAR1 === 'function') simAR1();
  if (typeof simGARCH === 'function') simGARCH();
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save(); renderContent(lessonId);
}

// ===== SIMULATORS =====
function simAR1() {
  const phi = parseFloat(document.getElementById('ar1-phi')?.value||0.7);
  const n = parseInt(document.getElementById('ar1-n')?.value||50);
  const el = document.getElementById('ar1Val');
  if (!el) return;
  let y = 0, vals = [];
  for (let t = 0; t < n; t++) { y = phi*y + (Math.random()-0.5)*2; vals.push(y); }
  const min = Math.min(...vals), max = Math.max(...vals), range = max-min || 1;
  const lines = [];
  for (let i = 0; i < Math.min(10, n); i++) {
    const pct = Math.round((vals[i]-min)/range*100);
    lines.push('█'.repeat(Math.max(1,Math.round(pct/5))));
  }
  el.textContent = 'φ₁='+phi+' | '+(phi>0?'动量延续':phi<0?'反转回归':'白噪声')+'\n前10期: '+vals.slice(0,10).map(v=>v.toFixed(1)).join(' ');
}

function simGARCH() {
  const alpha = parseFloat(document.getElementById('garch-alpha')?.value||0.1);
  const beta = parseFloat(document.getElementById('garch-beta')?.value||0.85);
  const el = document.getElementById('garchVal');
  const sumEl = document.getElementById('garchSum');
  if (!el) return;
  if (sumEl) sumEl.textContent = (alpha+beta).toFixed(2);
  let sigma2 = 1;
  const sigmas = [];
  for (let t = 0; t < 40; t++) {
    const eps = (Math.random()-0.5)*2;
    sigma2 = 0.05 + alpha*eps*eps + beta*sigma2;
    sigmas.push(Math.sqrt(sigma2));
  }
  const lines = sigmas.map((s,i) => {
    const bar = '█'.repeat(Math.round(s*10));
    return bar + ' ' + s.toFixed(2);
  });
  el.textContent = 'α+β='+(alpha+beta).toFixed(2)+' | '+(alpha+beta>0.97?'高持续（恐慌持久）':alpha+beta>0.9?'中等持续':'低持续（快速衰减）')+'\n' + lines.join('\n');
}

// ===== FINAL EXAM =====
function startFinalExam() { navigateTo('final'); }
function renderFinalExam() {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8道题 · 覆盖本课全部模块 · 70%及格</div>';
  let allAnswered = true;
  finalExam.forEach((q,qi) => {
    const ua = quizResults['final_'+qi];
    if (ua === undefined) allAnswered = false;
    html += '<div class="quiz-card"><h3>📝 第'+(qi+1)+'题</h3><div class="quiz-question">'+q.q+'</div>';
    q.opts.forEach((opt,oi) => {
      let cls = 'quiz-option';
      if (ua !== undefined && oi === q.correct) cls += ' correct';
      if (ua !== undefined && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="'+cls+'" onclick="answerFinal('+qi+','+oi+')" '+(ua!==undefined?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+opt+'</button>';
    });
    html += '</div>';
  });
  html += '</div>';
  if (allAnswered) {
    const score = finalExam.filter((q,i) => quizResults['final_'+i] === q.correct).length;
    const pct = Math.round(score/8*100);
    const passed = pct >= 70;
    html += '<div class="certificate show"><div style="font-size:3em">'+(passed?'🎉':'💪')+'</div>';
    html += '<h2>'+(passed?'恭喜毕业！':'还需要再练练')+'</h2>';
    html += '<div class="grade">'+score+' / 8 （'+pct+'%）</div>';
    html += '<p style="color:var(--sub)">'+(passed?'你已掌握时间序列分析的核心工具。下一步：随机过程与连续金融——学习股价的随机运动规律。':'再看看薄弱环节——GARCH和HMM是量化周期策略的核心。')+'</p>';
    html += '<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML = html;
}

function answerFinal(qi, oi) {
  quizResults['final_'+qi] = oi;
  save();
  finalDone = finalExam.every((_,i) => quizResults['final_'+i] !== undefined);
  if (finalDone) completedLessons.add('final');
  updateUI(); renderFinalExam();
}

function resetFinal() {
  finalExam.forEach((_,i) => delete quizResults['final_'+i]);
  completedLessons.delete('final'); finalDone = false;
  save(); updateUI(); renderFinalExam();
}

function resetAll() {
  localStorage.removeItem('prob_course_done');
  localStorage.removeItem('prob_course_quiz');
  completedLessons = new Set(); quizResults = {}; finalDone = false;
  currentSection = 'why-probability';
  save(); updateUI(); renderContent('why-probability'); window.scrollTo(0,0);
}
window.resetAll = resetAll;

// ===== INIT =====
(function() {
  currentSection = 'why-probability';
  updateUI();
  renderContent('why-probability');
})();
</script>
