<script>
const modules = [
  {
    title: '⚡ 模块一：优化基础——从无约束到有约束',
    lessons: [
      {
        id: 'why-optimization',
        title: '为什么量化投资到处都是优化问题',
        emoji: '⚡',
        content: `
<h3>量化投资的每个阶段都在求解一个优化问题</h3>

<div class="deep">
  <div class="label">⚡ 一条量化流水线 = 一串优化问题</div>
  <p><strong>选股：</strong>max Sharpe Ratio = max(收益/风险)——最大化风险调整后收益<br>
  <strong>因子组合：</strong>min 多重共线性——最小化因子间的冗余<br>
  <strong>资金分配：</strong>max 期望收益 s.t. 风险预算——在风控约束下追求收益<br>
  <strong>交易执行：</strong>min 冲击成本——最小化大单对市场的扰动</p>
  <p style="margin-top:8px"><span class="hl">优化不是锦上添花，是量化策略的核心引擎——没有优化，选出来的股票只是一串名字，不是投资组合。</span></p>
</div>

<h3>优化问题的三要素</h3>

<div class="step-list">
  <div class="step-card"><div class="num">1</div><div class="title">目标函数</div><div class="desc">你想最大化/最小化什么？Sharpe Ratio、收益率、波动率</div></div>
  <div class="step-card"><div class="num">2</div><div class="title">决策变量</div><div class="desc">你能调整什么？各股票权重 w₁,w₂,...,wₙ</div></div>
  <div class="step-card"><div class="num">3</div><div class="title">约束条件</div><div class="desc">限制是什么？满仓、做空限制、行业上限、个股上限</div></div>
</div>

<h3>无约束优化——梯度下降的直觉</h3>

<div class="deep">
  <div class="label">⚡ 下山最快的路</div>
  <p><strong>问题：</strong>你在山顶，雾很大，看不见山脚。怎么最快下山？<br>
  <strong>答案：</strong>每一步都往最陡的方向走——这就是梯度下降。w_new = w_old − α·∇f(w)。</p>
  <p><strong>α（学习率）：</strong>步长太大→可能冲过头（震荡）。太小→下山太慢。量化中α=换手率上限——每次调仓幅度多大。</p>
  <p><strong>在量化中：</strong>梯度下降用于<strong>单因子参数扫描</strong>——找到最优的参数组合（如移动平均窗口长度）。但对于组合优化（有约束），梯度下降不够，需要拉格朗日+KKT。</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">量化投资中，组合构建的优化目标通常是什么？</div>
  <button class="quiz-option" onclick="answerQuiz('why-optimization',0,0)">A. 最大化股票数量</button>
  <button class="quiz-option" onclick="answerQuiz('why-optimization',0,1)">B. 最大化风险调整后收益（如Sharpe Ratio），在满仓、做空限制、行业上限等约束下</button>
  <button class="quiz-option" onclick="answerQuiz('why-optimization',0,2)">C. 最小化手续费</button>
  <button class="quiz-option" onclick="answerQuiz('why-optimization',0,3)">D. 最大化换手率</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'optimization-types',
        title: '优化问题的分类——线性、二次、凸与非凸',
        emoji: '🗺️',
        content: `
<h3>不是所有优化都一样——不同问题用不同工具</h3>

<div class="table-wrap">
<table>
  <tr><th>类型</th><th>形式</th><th>难度</th><th>量化例子</th><th>求解器</th></tr>
  <tr><td><strong>线性规划(LP)</strong></td><td>目标+约束都是线性的</td><td class="hl2">★ 最简单</td><td>min 交易成本 s.t. 行业中性</td><td>单纯形法</td></tr>
  <tr><td><strong>二次规划(QP)</strong></td><td>目标二次+约束线性</td><td class="hl2">★★ 标准</td><td><strong>Markowitz</strong>(目标=wᵀΣw)</td><td>cvxopt</td></tr>
  <tr><td><strong>凸优化</strong></td><td>目标凸+约束凸</td><td class="hl3">★★★ 中</td><td>交易执行(冲击成本)</td><td>cvxpy</td></tr>
  <tr><td><strong>非凸优化</strong></td><td>目标或约束非凸</td><td class="hl4">★★★★ 最难</td><td>选股（整数约束=选或不选）</td><td>启发式·遗传算法</td></tr>
</table>
</div>

<div class="deep">
  <div class="label">🗺️ 凸 vs 非凸——为什么这个区别生死攸关</div>
  <p><strong>凸函数：</strong>只有一个「山谷」（全局最优）。梯度下降一定能找到它——不管你从哪出发。</p>
  <p><strong>非凸函数：</strong>有多个「山谷」（局部最优）。梯度下降可能卡在浅谷里错过深谷。<span class="hl">组合优化加整数约束（wᵢ∈{0,1}）瞬间从凸变非凸——这就是为什么选股优化比权重优化难得多。</span></p>
</div>

<h3>📝 案例：三种组合——等权 vs 最小方差 vs 最大Sharpe</h3>

<div class="deep">
  <div class="label">💰 同样的五只股票，三种优化目标→三个完全不同的组合</div>
  <div class="table-wrap">
  <table>
    <tr><th>方法</th><th>目标</th><th>优化类型</th><th>权重分布</th><th>年化σ</th><th>Sharpe</th></tr>
    <tr><td>等权（基准）</td><td>无（各20%）</td><td>无优化</td><td>[20,20,20,20,20]%</td><td>18%</td><td>0.45</td></tr>
    <tr><td>最小方差</td><td>min wᵀΣw</td><td class="hl2">QP</td><td>[35,28,15,12,10]%</td><td class="hl2">12%</td><td>0.52</td></tr>
    <tr><td>最大Sharpe</td><td>max (wᵀμ)/√(wᵀΣw)</td><td class="hl4">非凸！</td><td>[12,18,38,22,10]%</td><td>22%</td><td class="hl2">0.68</td></tr>
  </table>
  </div>
  <p><strong>洞察：</strong>最大Sharpe是非凸问题——你不能直接用QP求解。解法：对每个目标收益跑一次QP→画出有效前沿→选Sharpe最大的点。<span class="hl">这就是为什么有效前沿这么重要——它是解决非凸问题的间接路径。</span></p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">Markowitz组合优化属于哪类优化？为什么？</div>
  <button class="quiz-option" onclick="answerQuiz('optimization-types',0,0)">A. 线性规划——目标线性</button>
  <button class="quiz-option" onclick="answerQuiz('optimization-types',0,1)">B. 二次规划(QP)——目标=wᵀΣw是二次型，约束(Σw=1,w≥0)都是线性的。这是QP求解器的标准输入</button>
  <button class="quiz-option" onclick="answerQuiz('optimization-types',0,2)">C. 非凸优化</button>
  <button class="quiz-option" onclick="answerQuiz('optimization-types',0,3)">D. 无分类</button>
  <div class="quiz-result"></div>
</div>
`
      },
      {
        id: 'gradient-descent-detail',
        title: '梯度下降——从山顶到山谷的每一步',
        emoji: '🏔️',
        content: `
<h3>迭代公式——一条路走到黑</h3>

<div class="formula">
  w_{k+1} = w_k − α · ∇f(w_k)<br>
  <span style="font-size:0.8em;color:var(--sub)">α=学习率（步长）· ∇f=梯度（最陡方向）</span>
</div>

<div class="deep">
  <div class="label">🏔️ α太大 vs α太小——两种死法</div>
  <p><strong>α太大（莽撞）：</strong>一步跨过山谷→下一次又跨回来→永远到不了底（震荡）<br>
  <strong>α太小（胆小）：</strong>走了1000步还在半山腰→收敛太慢<br>
  <strong>自适应α：</strong>Adam/RMSprop专治这个——前期大步快走，后期小步精调</p>
  <p><strong>投资映射：</strong>α=换手率。α大=每次换半仓→组合震荡→交易成本吞收益。α小=每次微调→反应太慢→错过机会。<span class="hl">最优α=最优换手率。</span></p>
</div>

<h3>📝 案例：梯度下降拟合线性回归——从随机w到最优w</h3>

<div class="deep">
  <div class="label">📊 y=3x+2的真实关系，从w₀=[0,0]出发</div>
  <p><strong>迭代过程（α=0.1）：</strong>w₀=[0,0]→w₁=[1.4,1.0]→w₂=[2.2,1.6]→w₃=[2.6,1.9]→收敛到[2.98, 2.01]≈真值[3,2]。</p>
  <p><strong>量化对应：</strong>神经网络的训练就是梯度下降——只不过目标函数不是MSE，可能是IC的负数（最大化IC）。每个epoch都在做「向更优参数迈一小步」。</p>
</div>

<div class="quiz-card">
  <h3>🧩 随堂测验</h3>
  <div class="quiz-question">梯度下降中学习率α太大导致「震荡」。在量化组合优化中对应什么？</div>

const quizData = {
  'why-optimization': [{ correct:1, explain:'正确。量化投资的每个环节（选股·因子·配置·交易）都是一个约束优化问题。没有优化，因子IC再好也只是信号不是组合。优化把「好想法」变成「可执行的权重」。' }],
  'lagrange': [{ correct:1, explain:'正确。λ是约束的影子价格——每放松1单位约束，目标值改善λ单位。在组合优化中，满仓约束的λ=0.008→每允许1%的现金，方差降低0.008%。这就是「持有现金的机会成本」的精确量化。' }],
  'kkt': [{ correct:1, explain:'正确。互补松弛是KKT最妙的性质——如果约束不紧（wᵢ>0），乘子自动归零，等于这个约束不存在。优化器只关心「卡住」的约束。在组合中，被个股权重上限卡住的股票产生非零乘子，其余乘子=0。' }],
  'markowitz': [{ correct:1, explain:'正确。Var(w₁X₁+w₂X₂)=w₁²σ₁²+w₂²σ₂²+2w₁w₂ρσ₁σ₂。ρ<1时交叉项<w₁²σ₁²+w₂²σ₂²→组合方差<加权平均方差。ρ=−1时甚至可以压到0——两只完全负相关的股票构建无风险组合。' }],
  'markowitz-flaws': [{ correct:1, explain:'正确。Markowitz的输入敏感性来自它的数学结构——二次优化天然把资金集中在「看起来最好」的资产上。你只要稍微高估一只股票的μ，优化器就会给它不成比例的高权重。Blac-Litterman通过贝叶斯先验压制了这个放大效应。' }],
  'robust-optimization': [{ correct:1, explain:'正确。压缩估计=Ledoit-Wolf=贝叶斯收缩。样本Σ在n/T比率大时极不稳定（5050个参数从25000个数据点估=信息不足）。压缩估计向一个稳定目标收缩，牺牲一点偏差换取大幅方差降低。' }],
  'gradient-descent-detail': [{ correct:1, explain:'正确。梯度下降的α=步长，组合优化的换手率=调仓幅度。α太大→震荡不收敛；换手太高→交易成本吃掉超额收益。两者的最优解都是「适度最快」而非「绝对最快」。' }],

  'kkt-practice': [{ correct:1, explain:'正确。8%<10%的上限→差距2%>0→互补松弛：μ×2%=0→μ=0。只有被恰好卡在10%上限的股票(如完美公司但被上限抑制)，乘子才>0。' }],

let completedLessons = new Set(JSON.parse(localStorage.getItem('opt_course_done') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('opt_course_quiz') || '{}');
let finalDone = false, currentSection = 'why-optimization';

function save() {
  localStorage.setItem('opt_course_done', JSON.stringify([...completedLessons]));
  localStorage.setItem('opt_course_quiz', JSON.stringify(quizResults));
}
function updateUI() {
  const total = modules.reduce((s,m)=>s+m.lessons.length,0);
  const pct = Math.round(completedLessons.size/total*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = pct+'%';
  let nav = '';
  modules.forEach(m => {
    nav += '<div class="nav-module"><div class="nav-module-title">'+m.title+'</div>';
    m.lessons.forEach(l => {
      const isA=l.id===currentSection, isD=completedLessons.has(l.id);
      nav += '<div class="nav-item'+(isA?' active':'')+(isD?' done':'')+'" onclick="navigateTo(\''+l.id+'\')"><span class="check">'+(isD?'✅':'○')+'</span><span>'+l.emoji+' '+l.title+'</span></div>';
    });
    nav += '</div>';
  });
  nav += '<div class="nav-module"><div class="nav-module-title">🏆 考核</div><div class="nav-item'+(currentSection==='final'?' active':'')+'" onclick="navigateTo(\'final\')"><span class="check">'+(finalDone?'✅':'○')+'</span><span>终极测验</span></div></div>';
  document.getElementById('navContainer').innerHTML = nav;
}
function navigateTo(id) {
  currentSection=id; completedLessons.add(id);
  if(id!=='final')save(); updateUI();
  if(id==='final')renderFinalExam(); else renderContent(id);
  window.scrollTo(0,0);
}
function renderContent(id) {
  let lesson=null;
  for(const m of modules){const f=m.lessons.find(l=>l.id===id);if(f){lesson=f;break;}}
  if(!lesson)return;
  let all=[]; modules.forEach(m=>all.push(...m.lessons));
  const idx=all.findIndex(l=>l.id===id);
  const prev=idx>0?all[idx-1]:null,next=idx<all.length-1?all[idx+1]:null;
  let html='<div class="lesson-card"><h2><span class="emoji">'+lesson.emoji+'</span>'+lesson.title+'</h2>';
  html+='<div class="meta">⚡ 最优化理论 · 第四课</div>'+lesson.content;
  const qd=quizData[id];
  if(qd){
    html+='\n<script>\n(function(){const a='+JSON.stringify(qd)+';const u=quizResults[\''+id+'\']||[];a.forEach((x,qi)=>{if(u[qi]!==undefined){const c=document.querySelectorAll(\'.quiz-card\')[qi];if(!c)return;c.querySelectorAll(\'.quiz-option\').forEach((b,oi)=>{b.disabled=true;if(oi===x.correct)b.classList.add(\'correct\');if(oi===u[qi]&&oi!==x.correct)b.classList.add(\'wrong\')});const r=c.querySelector(\'.quiz-result\');if(r){r.innerHTML=\'<span class=\"ans\">✅ 正确！</span> \'+x.explain;r.classList.add(\'show\',u[qi]===x.correct?\'pass\':\'fail\')}}});})();\n<\\/script>\n';
  }
  html+='<div class="nav-btns">';
  if(prev)html+='<button class="btn btn-secondary" onclick="navigateTo(\''+prev.id+'\')">⬅ '+prev.title+'</button>';
  else html+='<span></span>';
  if(next)html+='<button class="btn btn-primary" onclick="navigateTo(\''+next.id+'\')">'+next.title+' ➡</button>';
  else html+='<button class="btn btn-primary" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html+='</div></div>';
  document.getElementById('mainContent').innerHTML=html;
}
function answerQuiz(lessonId,qi,oi){if(!quizResults[lessonId])quizResults[lessonId]=[];quizResults[lessonId][qi]=oi;save();renderContent(lessonId);}
function startFinalExam(){navigateTo('final');}
function renderFinalExam(){
  let html='<div class="lesson-card"><h2>🏆 终极测验</h2><div class="meta">8道题 · 覆盖三大模块 · 70%及格</div>';
  let allDone=true;
  finalExam.forEach((q,qi)=>{
    const ua=quizResults['final_'+qi];if(ua===undefined)allDone=false;
    html+='<div class="quiz-card"><h3>📝 第'+(qi+1)+'题</h3><div class="quiz-question">'+q.q+'</div>';
    q.opts.forEach((o,oi)=>{
      let cls='quiz-option';
      if(ua!==undefined&&oi===q.correct)cls+=' correct';
      if(ua!==undefined&&oi===ua&&oi!==q.correct)cls+=' wrong';
      html+='<button class="'+cls+'" onclick="answerFinal('+qi+','+oi+')" '+(ua!==undefined?'disabled':'')+'>'+['A','B','C','D'][oi]+'. '+o+'</button>';
    });
    html+='</div>';
  });
  html+='</div>';

    html+='<div class="grade">'+score+'/8 ('+pct+'%)</div>';
    html+='<p style="color:var(--sub)">'+(passed?'你已掌握最优化理论的核心。':'再看看薄弱环节。')+'</p>';
    html+='<div class="btn-group" style="justify-content:center"><button class="btn btn-secondary" onclick="resetFinal()">🔄 重新测验</button></div></div>';
  }
  document.getElementById('mainContent').innerHTML=html;
}
function answerFinal(qi,oi){quizResults['final_'+qi]=oi;save();finalDone=finalExam.every((_,i)=>quizResults['final_'+i]!==undefined);if(finalDone)completedLessons.add('final');updateUI();renderFinalExam();}
function resetFinal(){finalExam.forEach((_,i)=>delete quizResults['final_'+i]);completedLessons.delete('final');finalDone=false;save();updateUI();renderFinalExam();}
function resetAll(){localStorage.removeItem('opt_course_done');localStorage.removeItem('opt_course_quiz');completedLessons=new Set();quizResults={};finalDone=false;currentSection='why-optimization';save();updateUI();renderContent('why-optimization');window.scrollTo(0,0);}

(function(){currentSection='why-optimization';updateUI();renderContent('why-optimization');})();
