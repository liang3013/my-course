<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 像巴菲特一样读财报 · 金融基础交互式课程</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card-hover: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --sub: #8b949e;
  --accent: #f0a040;
  --accent2: #d2991d;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d2991d;
  --orange: #e28413;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(240,160,64,0.35); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3e50; }
body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #1a1510 0%, var(--bg) 70%);
  color: var(--text);
  line-height: 1.75;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar {
  width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky; top:0; height:100vh;
  overflow-y: auto;
  flex-shrink: 0;
}
.main {
  flex:1;
  padding: 32px 48px;
  max-width: 900px;
}

/* Sidebar */
.logo {
  font-size: 1.2em;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.logo .icon { font-size: 1.4em; }
.subtitle { color: var(--sub); font-size: 0.82em; margin-bottom: 20px; opacity: 0.8; }

.progress-bar-wrap {
  background: var(--border); border-radius: 8px; height: 6px;
  margin-bottom: 22px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 8px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 12px rgba(240,160,64,0.25);
}
.progress-text { font-size: 0.78em; color: var(--sub); margin-bottom: 4px; }

.nav-module { margin-bottom: 18px; }
.nav-module-title {
  font-size: 0.72em; text-transform: uppercase;
  color: var(--sub); letter-spacing: 1.5px;
  margin-bottom: 8px; padding: 0 8px;
  opacity: 0.7;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 0.88em; color: var(--sub);
  border-left: 3px solid transparent;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--card-hover); color: var(--text); border-left-color: rgba(240,160,64,0.3); }
.nav-item.active { background: rgba(240,160,64,0.12); color: var(--accent2); font-weight: 600; border-left-color: var(--accent2); }
.nav-item.done { color: var(--green); }
.nav-item .check { width: 20px; text-align: center; font-size: 0.8em; }

.divider { border-top: 1px solid var(--border); margin: 16px 0; }

/* Main Content */
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.lesson-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 34px;
  margin-bottom: 24px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.lesson-card:hover {
  border-color: rgba(240,160,64,0.2);
  box-shadow: 0 2px 20px rgba(240,160,64,0.06);
}
.lesson-card h2 {
  font-size: 1.5em; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.lesson-card h2 .emoji { font-size: 1.3em; }
.lesson-card .meta {
  color: var(--sub); font-size: 0.85em; margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.lesson-card h3 {
  font-size: 1.1em; margin: 28px 0 14px; color: var(--accent2);
  position: relative;
  padding-left: 14px;
}
.lesson-card h3::before {
  content: '';
  position: absolute; left: 0; top: 3px; bottom: 3px;
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
}
.lesson-card p { margin-bottom: 14px; }
.lesson-card ul, .lesson-card ol { padding-left: 24px; margin-bottom: 14px; }
.lesson-card li { margin-bottom: 8px; }

/* Analogy Box */
.analogy {
  background: linear-gradient(135deg, rgba(210,153,29,0.06), rgba(240,160,64,0.06));
  border: 1px solid rgba(210,153,29,0.15);
  border-left: 3px solid var(--accent2);
  border-radius: var(--radius); padding: 18px 22px;
  margin: 20px 0;
  transition: border-color 0.2s;
}
.analogy:hover { border-color: rgba(210,153,29,0.25); }
.analogy .label {
  font-size: 0.78em; color: var(--accent2); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

/* Diagram */
.diagram {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; margin: 16px 0;
  text-align: center;
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
  font-size: 0.85em; line-height: 1.9;
  overflow-x: auto;
  white-space: pre;
}
.diagram-svg {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 12px; margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}
.diagram-svg svg {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}
.diagram-svg text {
  font-family: inherit;
}
.diagram-svg .sub {
  fill: var(--sub);
}
.diagram-svg .accent {
  fill: var(--accent);
}

/* Callout */
.tip, .warning {
  border-radius: var(--radius); padding: 18px 22px; margin: 20px 0;
  position: relative;
}
.tip { background: rgba(63,185,80,0.06); border: 1px solid rgba(63,185,80,0.2); border-left: 3px solid var(--green); }
.warning { background: rgba(248,81,73,0.06); border: 1px solid rgba(248,81,73,0.2); border-left: 3px solid var(--red); }
.tip .label, .warning .label { font-weight: 700; margin-bottom: 6px; font-size: 0.85em; display: flex; align-items: center; gap: 6px; }
.tip .label { color: var(--green); }
.warning .label { color: var(--red); }

/* Quiz */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 28px 30px; margin: 28px 0;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.quiz-card:hover {
  border-color: rgba(240,160,64,0.3);
  box-shadow: 0 2px 16px rgba(240,160,64,0.05);
}
.quiz-card h3 {
  font-size: 1.15em; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.quiz-question { margin: 18px 0 10px; font-weight: 600; font-size: 0.95em; }
.quiz-option {
  display: block; width: 100%; text-align: left;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 18px;
  margin: 8px 0; cursor: pointer;
  color: var(--text); font-size: 0.93em;
  transition: all 0.2s ease;
}
.quiz-option:hover { border-color: var(--accent); background: var(--card-hover); transform: translateX(4px); }
.quiz-option.correct { border-color: var(--green); background: rgba(63,185,80,0.08); color: var(--green); }
.quiz-option.wrong { border-color: var(--red); background: rgba(248,81,73,0.08); color: var(--red); }
.quiz-option:disabled { cursor: default; opacity: 0.8; transform: none; }

.quiz-result {
  margin-top: 16px; padding: 16px; border-radius: 8px;
  display: none;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: rgba(63,185,80,0.1); border: 1px solid var(--green); }
.quiz-result.fail { background: rgba(248,81,73,0.1); border: 1px solid var(--red); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 26px;
  border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.93em; font-weight: 600;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #000; box-shadow: 0 2px 8px rgba(240,160,64,0.3); }
.btn-primary:hover { background: #d18d30; box-shadow: 0 4px 16px rgba(240,160,64,0.4); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #3a3e50; }
.btn-success { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(63,185,80,0.3); }
.btn-success:hover { background: #00a381; box-shadow: 0 4px 16px rgba(63,185,80,0.4); }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

/* Step Cards */
.step-list { display: flex; gap: 14px; flex-wrap: wrap; margin: 18px 0; }
.step-card {
  flex: 1; min-width: 180px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px; text-align: center;
  transition: all 0.2s ease;
}
.step-card:hover { border-color: rgba(240,160,64,0.3); transform: translateY(-2px); }
.step-card .num {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #c08020);
  color: #000;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-weight: 700; font-size: 0.85em;
  box-shadow: 0 2px 8px rgba(240,160,64,0.3);
}
.step-card .title { font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
.step-card .desc { font-size: 0.82em; color: var(--sub); line-height: 1.6; }

/* Nav btns */
.nav-btns { display: flex; justify-content: space-between; margin-top: 32px; }

/* Final exam */
.final-exam { display: none; }
.final-exam.active { display: block; }
.certificate {
  display: none;
  background: linear-gradient(135deg, rgba(240,160,64,0.08), rgba(210,153,29,0.06));
  border: 2px solid var(--accent2);
  border-radius: var(--radius);
  padding: 48px 40px; text-align: center; margin: 28px 0;
  box-shadow: 0 4px 32px rgba(210,153,29,0.08);
}
.certificate.show { display: block; animation: fadeIn 0.5s ease; }
.certificate h2 { font-size: 2em; color: var(--accent2); margin-bottom: 8px; }
.certificate .grade { font-size: 3.5em; margin: 20px 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

/* Table */
.table-wrap { overflow-x: auto; margin: 18px 0; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
th { background: rgba(240,160,64,0.08); padding: 12px 16px; text-align: left; font-weight: 600; color: var(--accent2); font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(240,160,64,0.03); }

/* Interactive calculator */
.calc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0;
}
.calc-input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
}
.calc-input label { display: block; font-size: 0.82em; color: var(--sub); margin-bottom: 4px; }
.calc-input input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 0.95em;
  font-family: 'SF Mono', 'Menlo', monospace;
}
.calc-input input:focus { outline: none; border-color: var(--accent); }
.calc-result {
  grid-column: 1/-1;
  background: linear-gradient(135deg, rgba(240,160,64,0.08), rgba(210,153,29,0.06));
  border: 1px solid var(--accent2); border-radius: var(--radius);
  padding: 20px; text-align: center;
}
.calc-result .clabel { font-size: 0.85em; color: var(--sub); }
.calc-result .cval { font-size: 2.2em; font-weight: 700; color: var(--accent); }

/* Cash-flow mode selector */
.cf-selector { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
.cf-mode {
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--sub); font-size: 0.82em; transition: all 0.2s;
}
.cf-mode:hover { border-color: var(--accent); color: var(--text); }
.cf-mode.active { background: rgba(240,160,64,0.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }

/* Highlight */
.hl { color: var(--accent2); font-weight: 600; }
.hl2 { color: var(--yellow); font-weight: 600; }
.hl3 { color: var(--green); font-weight: 600; }
.hl4 { color: var(--red); font-weight: 600; }

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 20px 16px; }
  .step-list { flex-direction: column; }
  .calc-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo"><span class="icon">📊</span> 读财报</div>
  <div class="subtitle">像巴菲特一样理解商业语言</div>

</div>

<script>
// ===== COURSE DATA =====
const modules = [
  {
    title: '🍳 模块一：会计是商业的语言',
    lessons: [
      {
        id: 'welcome',
        title: '为什么巴菲特把会计放在第一位',
        emoji: '📖',
        content: `
<p>你好！假设你要学做菜——你走进厨房，第一件事做什么？</p>
<div class="analogy">
  <div class="label">🍳 厨房类比</div>

  <p>学投资第一步：<span class="hl">认识财报</span>——什么是收入、什么是利润、什么是现金流。</p>

</div>

<p>巴菲特从1956年写第一封合伙人信到2025年——整整70年。他说过：</p>
<div class="analogy">
  <div class="label">🧠 巴菲特原话</div>
  <p>"会计是商业的语言。如果你不懂这门语言，你就无法真正理解一家企业。我阅读年报的方式和大多数人不一样——我看的不是数字，是<strong>数字背后的故事</strong>。"</p>

<h3>这门课你会学到什么</h3>
<div class="step-list">
  <div class="step-card">
    <div class="num">1</div>
    <div class="title">📊 三张报表</div>

      {
        id: 'accrual',
        title: '权责发生制 vs 收付实现制：利润≠现金',
        emoji: '🔄',
        content: `
<h3>一个改变一切的概念</h3>
<p>先看一个故事：</p>
<div class="analogy">
  <div class="label">📱 小明卖手机</div>
  <p>小明12月28日卖了100台手机给客户，总共100万元。<br>

<p><span class="hl">全世界的上市公司都使用权责发生制。</span>这意味着什么？</p>
<ul>

  <li>公司可以「确认」了利润但还没收到现金</li>

</ul>

<div class="diagram-svg">

</svg>
</div>

<h3>三位大师，三种估值哲学——同一家公司，三种视角</h3>

<h3>三种方法的核心公式与思维差异</h3>

<div class="table-wrap">
<table>
  <tr><th>维度</th><th>DCF（巴菲特）</th><th>唐朝简化法</th><th>段永平法</th></tr>

<h3>唐朝法的精髓——为什么它对中国投资者特别有用？</h3>

<div class="deep">
  <div class="label">⚖️ 唐朝：「三年后合理估值 = 当年净利润 × 1/无风险利率」</div>
  <p><strong>核心思想：</strong>如果你把买股票看作买一个「能产生利润的资产」，那么它的合理价值 = 年利润 ÷ 无风险收益率（相当于你买国债的替代）。</p>
  <p><strong>为什么×1/无风险利率？</strong>如果无风险利率=3%，那1元利润值1÷3%=33元。因为如果你买国债，要33元才能产生1元年收益。利润值不值这个价，取决于利润的确定性。</p>
  <p><strong>为什么打七折？</strong>安全边际——你估算的「合理估值」可能因为利润下滑而高估，打七折给你犯错的空间。</p>
  <p><strong>A股实战优势：</strong>不需要预测增长率、不需要估算WACC——只需要知道当前利润和无风险利率。适合「不懂预测但会看报表」的人。</p>

  <p>2. <strong>再问：</strong>如果股市关门5年，我持有这个公司，会担心吗？（这才是真懂）</p>
  <p>3. <strong>最后问：</strong>现在的价格，未来5年的年化回报大概是多少？（不需要精确到小数点）</p>

let completedLessons = new Set(JSON.parse(localStorage.getItem('finance_course_completed') || '[]'));
let quizResults = JSON.parse(localStorage.getItem('finance_course_quiz_results') || '{}');
let currentSection = null;
let finalExamDone = finalExam.questions.every((_,i) => quizResults['final_' + i] !== undefined);

function save() {
  localStorage.setItem('finance_course_completed', JSON.stringify([...completedLessons]));
  localStorage.setItem('finance_course_quiz_results', JSON.stringify(quizResults));
}

function quickQuiz(btn, correctChoice) {
  const card = btn.closest('.quiz-card');
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  const options = card.querySelectorAll('.quiz-option');
  options.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correctChoice) o.classList.add('correct');
    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let totalLessons = 0;
  modules.forEach(m => { totalLessons += m.lessons.length; });
  totalLessons += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / totalLessons) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji) + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';
  html += '<span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
    updateUI();
  }
}

window.updateCF=function(i){var m=window.cfModes[i];document.getElementById('cfCurrent').textContent='#'+(i+1)+' '+m.name;document.getElementById('cfDisplay').innerHTML='<div style="display:flex;gap:24px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:12px"><div style="text-align:center"><div style="font-size:2.4em">'+(m.ops==='+'?'🟢':'🔴')+'</div><div style="font-size:13px;margin-top:4px">经营: '+m.ops+'</div></div><div style="text-align:center"><div style="font-size:2.4em">'+(m.inv==='+'?'🟢':'🔴')+'</div><div style="font-size:13px;margin-top:4px">投资: '+m.inv+'</div></div><div style="text-align:center"><div style="font-size:2.4em">'+(m.fin.includes('+')?'🟢':'🔴')+'</div><div style="font-size:13px;margin-top:4px">筹资: '+m.fin+'</div></div></div><div style="font-size:1.2em;font-weight:700;color:'+m.color+'">'+m.name+'</div><div style="margin-top:8px;font-size:0.95em;color:#8b949e">'+m.desc+'</div>';var btns=document.querySelectorAll('.cf-mode');btns.forEach(function(b,j){b.classList.toggle('active',j===i);});};
window.calcDCF=function(){var f=parseFloat(document.getElementById('dcf-fcf').value)||0,g1=parseFloat(document.getElementById('dcf-g1').value)/100,g2=parseFloat(document.getElementById('dcf-g2').value)/100,w=parseFloat(document.getElementById('dcf-wacc').value)/100,pv=0,cf=f;for(var y=1;y<=5;y++){cf*=1+g1;pv+=cf/Math.pow(1+w,y);}var tv=(cf*(1+g2))/(w-g2);pv+=tv/Math.pow(1+w,5);document.getElementById('dcf-val').textContent=pv.toFixed(0)+' 亿元';document.getElementById('dcf-buy').textContent='安全买点：'+(pv*0.7).toFixed(0)+' 亿元（内在价值×0.7）';};
window.updateROE=function(){var n=parseInt(document.getElementById('roe-npm').value)/100,t=parseFloat(document.getElementById('roe-tat').value),l=parseFloat(document.getElementById('roe-fl').value),roe=n*t*l*100;document.getElementById('roe-result').textContent=roe.toFixed(1)+'%';document.getElementById('roe-npm-v').textContent=(n*100).toFixed(0)+'%';document.getElementById('roe-tat-v').textContent=t.toFixed(1);document.getElementById('roe-fl-v').textContent=l.toFixed(2);var a='';if(n>0.3)a='💰 高利润率驱动（茅台型）';else if(t>2)a='🔄 高周转驱动（沃尔玛型）';else if(l>4)a='⚠️ 高杠杆驱动（银行型）——风险大';else a='📊 均衡型';a+=' | '+(l>3?'⚠️杠杆偏高':'✅杠杆安全');document.getElementById('roe-analysis').textContent=a;};
window.calcFCFInteractive=function(){var ocf=parseInt(document.getElementById('fcf-ocf').value),capex=parseInt(document.getElementById('fcf-capex').value),fcf=ocf-capex,ratio=ocf>0?(fcf/ocf*100).toFixed(0):0;document.getElementById('fcf-result').textContent=fcf+' 亿';document.getElementById('fcf-ocf-v').textContent=ocf+'亿';document.getElementById('fcf-capex-v').textContent=capex+'亿';document.getElementById('fcf-ratio').textContent=ratio+'%';var q='',bg='';if(ratio>=85){q='🟢 印钞机级';bg='rgba(63,185,80,0.15)';}else if(ratio>=60){q='🟡 健康级';bg='rgba(210,153,29,0.12)';}else if(ratio>=30){q='🟠 关注级·利润含水分';bg='rgba(240,160,64,0.1)';}else{q='🔴 危险级·维持都难';bg='rgba(248,81,73,0.1)';}document.getElementById('fcf-quality').textContent=q;document.getElementById('fcf-quality').style.background=bg;};

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }

  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }

  let html = '';

  if (lesson.quiz) {
    const savedAnswers = quizResults[id] || [];
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">测试你对' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '的理解—共' + lesson.quiz.questions.length + '题</div>';
    lesson.quiz.questions.forEach((q, qi) => {
      const userAnswer = savedAnswers[qi];
      const answered = userAnswer !== undefined;
      const isCorrect = answered && userAnswer === q.correct;
      html += '<div class="quiz-card" id="quiz-' + qi + '"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
      html += '<div class="quiz-question">' + q.q + '</div>';
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answered && oi === q.correct) cls += ' correct';
        if (answered && oi === userAnswer && oi !== q.correct) cls += ' wrong';
        html += '<button class="' + cls + '" onclick="answerQuiz(\'' + id + '\', ' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
      });
      if (answered) {
        html += '<div class="quiz-result show ' + (isCorrect ? 'pass' : 'fail') + '" id="result-' + id + '-' + qi + '">';
        html += '<strong>' + (isCorrect ? '✅ 正确！' : '❌ 不太对') + '</strong><p>' + q.explain + '</p></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>';
    html += lesson.content;
    html += '</div>';
    markComplete(id);
  }

  html += '<div class="nav-btns">';
  let prevId = null;
  if (lesIndex > 0) prevId = modules[modIndex].lessons[lesIndex - 1].id;
  else if (modIndex > 0) { const pm = modules[modIndex - 1]; prevId = pm.lessons[pm.lessons.length - 1].id; }
  if (prevId) html += '<button class="btn btn-secondary" onclick="navigateTo(\'' + prevId + '\')">⬅ 上一节</button>';
  else html += '<div></div>';

  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) nextId = modules[modIndex].lessons[lesIndex + 1].id;
  else if (modIndex < modules.length - 1) nextId = modules[modIndex + 1].lessons[0].id;
  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>';
  else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';

  main.innerHTML = html;

  // Init interactive components
  if (id === 'cashflow-patterns') {
    setTimeout(function() {
      var sel = document.getElementById('cfSelector');
      if (!sel) return;
      sel.innerHTML = '';
      for (var i = 0; i < window.cfModes.length; i++) {
        sel.innerHTML += '<div class="cf-mode' + (i === 0 ? ' active' : '') + '" onclick="updateCF(' + i + ')">#' + (i + 1) + '</div>';
      }
      updateCF(0);
    }, 50);
  }
  if (id === 'dcf-basics') { setTimeout(function() { if (window.calcDCF) calcDCF(); }, 50); }
  if (id === 'roe-models') { setTimeout(function() { if (window.updateROE) updateROE(); }, 50); }
  if (id === 'fcf-lesson') { setTimeout(function() { if (window.calcFCFInteractive) calcFCFInteractive(); }, 50); }
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save();
  renderContent(lessonId);
}

function startFinalExam() { navigateTo('final'); }

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2>';
  html += '<div class="meta">8道题 · 覆盖全部8个模块 · 70%及格</div>';

  let allAnswered = true;
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    if (!answered) allAnswered = false;
    const isCorrect = answered && ua === q.correct;
    html += '<div class="quiz-card" id="final-q-' + qi + '"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
    html += '<div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFinal(' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
    });
    html += '</div>';
  });
  html += '</div>';

  if (allAnswered) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const pct = Math.round(score / total * 100);
    const passed = pct >= 70;
    const grade = pct >= 90 ? '🏅 S级' : pct >= 80 ? '🥇 A级' : pct >= 70 ? '🥈 B级' : '📝 继续加油';
    html += '<div class="certificate show"><div style="font-size:3em">' + (passed ? '🎉' : '💪') + '</div>';
    html += '<h2>' + (passed ? '恭喜毕业！' : '还需要再练练') + '</h2>';
    html += '<div class="grade">' + grade + '</div>';
    html += '<div style="font-size:1.5em;color:var(--accent2)">' + score + ' / ' + total + ' 题正确（' + pct + '%）</div>';
    html += '<p style="margin-top:16px;color:var(--sub)">' + (passed ? '你已经掌握了像巴菲特一样读财报的核心技能！接下来挑战模块二：周期、宏观与市场心理学。' : '再看看薄弱环节，重做一次就能过！') + '</p>';
    html += '<div style="margin-top:20px"><button class="btn btn-secondary" onclick="resetFinalExam()">🔄 重新测验</button>';
    html += '<button class="btn btn-primary" onclick="resetAll()" style="margin-left:8px">🔁 重学全部课程</button></div></div>';
    const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
    if (wrong.length > 0) {
      html += '<div class="tip" style="margin-top:16px"><div class="label">📚 建议补强的知识点</div>';
      const topicMap = {0:'→ 复习「模块一：权责发生制」',1:'→ 复习「模块二：三张报表」',2:'→ 复习「模块六：ROE杜邦分解」',3:'→ 复习「模块三：盈利质量」',4:'→ 复习「模块五：现金流组合」',5:'→ 复习「模块四：商誉风险」',6:'→ 复习「模块八：安全边际」',7:'→ 复习「模块七：附注」'};
      wrong.forEach(w => { html += '<p>❌ 第' + (w.i + 1) + '题 ' + topicMap[w.i] + '</p>'; });
      html += '</div>';
    }
  }
  main.innerHTML = html;
  if (allAnswered) updateUI();
}

function answerFinal(qi, oi) {
  quizResults['final_' + qi] = oi;
  save();
  renderFinalExam(document.getElementById('mainContent'));
  updateUI();
}

function resetFinalExam() {
  finalExam.questions.forEach((_, i) => delete quizResults['final_' + i]);
  save(); updateUI();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('finance_course_quiz_results');
  localStorage.removeItem('finance_course_completed');
  location.reload();
}

// ===== INIT =====
(function init() {
  currentSection = 'welcome';
  updateUI();
  renderContent('welcome');
})();
</script>
