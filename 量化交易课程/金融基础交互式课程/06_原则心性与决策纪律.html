    else o.classList.add('wrong');
  });
  const result = card.querySelector('.quiz-result');
  if (result) { result.classList.add('show'); }
}

function calcProgress() {
  let totalLessons = 0;
  modules.forEach(m => { totalLessons += m.lessons.length; });
  totalLessons += finalExam.questions.length;
  let done = completedLessons.size;
  for (let i = 0; i < finalExam.questions.length; i++) {
    if (quizResults['final_' + i] !== undefined) done++;
  }
  return Math.round((done / totalLessons) * 100);
}

function updateUI() {
  const pct = calcProgress();
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  const nav = document.getElementById('navContainer');
  let html = '';
  modules.forEach((mod) => {
    html += '<div class="nav-module-title">' + mod.title + '</div>';
    mod.lessons.forEach((lesson) => {
      const id = lesson.id;
      const done = completedLessons.has(id);
      const active = currentSection === id;
      html += '<div class="nav-item' + (active ? ' active' : '') + (done ? ' done' : '') + '" onclick="navigateTo(\'' + id + '\')">';
      html += '<span class="check">' + (done ? '✅' : lesson.emoji || '📖') + '</span>';
      html += lesson.title + '</div>';
    });
  });
  html += '<div class="nav-item' + (currentSection === 'final' ? ' active' : '') + (finalExamDone ? ' done' : '') + '" onclick="navigateTo(\'final\')">';
  html += '<span class="check">' + (finalExamDone ? '✅' : '🏆') + '</span> 终极测验</div>';
  nav.innerHTML = html;
}

function navigateTo(id) {
  currentSection = id;
  updateUI();
  renderContent(id);
  window.scrollTo(0, 0);
}

function markComplete(id) {
  if (!completedLessons.has(id)) {
    completedLessons.add(id);
    save();
    updateUI();
  }
}

function renderContent(id) {
  const main = document.getElementById('mainContent');
  if (id === 'final') { renderFinalExam(main); return; }

  let lesson = null, modIndex = -1, lesIndex = -1;
  for (let mi = 0; mi < modules.length; mi++) {
    for (let li = 0; li < modules[mi].lessons.length; li++) {
      if (modules[mi].lessons[li].id === id) {
        lesson = modules[mi].lessons[li]; modIndex = mi; lesIndex = li; break;
      }
    }
    if (lesson) break;
  }
  if (!lesson) { main.innerHTML = '<p>课程未找到</p>'; return; }

  let html = '';

  if (lesson.quiz) {
    const savedAnswers = quizResults[id] || [];
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">测试你对' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '的理解—共' + lesson.quiz.questions.length + '题</div>';
    lesson.quiz.questions.forEach((q, qi) => {
      const userAnswer = savedAnswers[qi];
      const answered = userAnswer !== undefined;
      const isCorrect = answered && userAnswer === q.correct;
      html += '<div class="quiz-card" id="quiz-' + qi + '"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
      html += '<div class="quiz-question">' + q.q + '</div>';
      q.options.forEach((opt, oi) => {
        let cls = 'quiz-option';
        if (answered && oi === q.correct) cls += ' correct';
        if (answered && oi === userAnswer && oi !== q.correct) cls += ' wrong';
        html += '<button class="' + cls + '" onclick="answerQuiz(\'' + id + '\', ' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
      });
      if (answered) {
        html += '<div class="quiz-result show ' + (isCorrect ? 'pass' : 'fail') + '" id="result-' + id + '-' + qi + '">';
        html += '<strong>' + (isCorrect ? '✅ 正确！' : '❌ 不太对') + '</strong><p>' + q.explain + '</p></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="lesson-card"><h2><span class="emoji">' + lesson.emoji + '</span> ' + lesson.title + '</h2>';
    html += '<div class="meta">' + modules[modIndex].title.replace(/^[^\s]+\s/, '') + '</div>';
    html += lesson.content;
    html += '</div>';
    markComplete(id);
  }

  html += '<div class="nav-btns">';
  let prevId = null;
  if (lesIndex > 0) prevId = modules[modIndex].lessons[lesIndex - 1].id;
  else if (modIndex > 0) { const pm = modules[modIndex - 1]; prevId = pm.lessons[pm.lessons.length - 1].id; }
  if (prevId) html += '<button class="btn btn-secondary" onclick="navigateTo(\'' + prevId + '\')">⬅ 上一节</button>';
  else html += '<div></div>';

  let nextId = null;
  if (lesIndex < modules[modIndex].lessons.length - 1) nextId = modules[modIndex].lessons[lesIndex + 1].id;
  else if (modIndex < modules.length - 1) nextId = modules[modIndex + 1].lessons[0].id;
  if (nextId) html += '<button class="btn btn-primary" onclick="navigateTo(\'' + nextId + '\')">下一节 ➡</button>';
  else html += '<button class="btn btn-success" onclick="navigateTo(\'final\')">🏆 去终极测验 ➡</button>';
  html += '</div>';

  main.innerHTML = html;
}

function answerQuiz(lessonId, qi, oi) {
  if (!quizResults[lessonId]) quizResults[lessonId] = [];
  quizResults[lessonId][qi] = oi;
  save();
  renderContent(lessonId);
}

function startFinalExam() { navigateTo('final'); }

function renderFinalExam(main) {
  let html = '<div class="lesson-card"><h2>🏆 终极测验</h2>';
  html += '<div class="meta">8道题 · 覆盖全部3个模块 · 70%及格</div>';

  let allAnswered = true;
  finalExam.questions.forEach((q, qi) => {
    const ua = quizResults['final_' + qi];
    const answered = ua !== undefined;
    if (!answered) allAnswered = false;
    const isCorrect = answered && ua === q.correct;
    html += '<div class="quiz-card" id="final-q-' + qi + '"><h3>📝 第 ' + (qi + 1) + ' 题</h3>';
    html += '<div class="quiz-question">' + q.q + '</div>';
    q.options.forEach((opt, oi) => {
      let cls = 'quiz-option';
      if (answered && oi === q.correct) cls += ' correct';
      if (answered && oi === ua && oi !== q.correct) cls += ' wrong';
      html += '<button class="' + cls + '" onclick="answerFinal(' + qi + ', ' + oi + ')" ' + (answered ? 'disabled' : '') + '>' + ['A','B','C','D'][oi] + '. ' + opt + '</button>';
    });
    html += '</div>';
  });
  html += '</div>';

  if (allAnswered) {
    const score = finalExam.questions.filter((q, i) => quizResults['final_' + i] === q.correct).length;
    const total = finalExam.questions.length;
    const pct = Math.round(score / total * 100);
    const passed = pct >= 70;
    const grade = pct >= 90 ? '🏅 S级·格栅大师' : pct >= 80 ? '🥇 A级·跨学科思维者' : pct >= 70 ? '🥈 B级·格栅学徒' : '📝 继续加油';
    html += '<div class="certificate show"><div style="font-size:3em">' + (passed ? '🎉' : '💪') + '</div>';
    html += '<h2>' + (passed ? '恭喜毕业！' : '还需要再练练') + '</h2>';
    html += '<div class="grade">' + grade + '</div>';
    html += '<div style="font-size:1.5em;color:var(--accent2)">' + score + ' / ' + total + ' 题正确（' + pct + '%）</div>';
    html += '<p style="margin-top:16px;color:var(--sub)">' + (passed ?
      '你已经完成了金融大师头脑培养课程的第五课——也是最后三块拼图。从塔勒布的反脆弱到老木匠的A股实战、从达利欧的债务周期到周金涛的康波、从段永平的本分到纳瓦尔的判断力到21位大师的十大原则——你不仅学会了怎么分析公司（课1-4），更学会了<span class="hl">怎么构建一个让你活下来并持续进化的投资操作系统</span>。记住：投资最终比的不是谁更聪明，而是谁的系统更不容易出错。每次决策前跑一次检查清单，让董事会Agent帮你审视盲区，保持「知止」的智慧。'
      : '再看看薄弱环节，重做一次就能过！') + '</p>';
    html += '<div style="margin-top:20px"><button class="btn btn-secondary" onclick="resetFinalExam()">🔄 重新测验</button>';
    html += '<button class="btn btn-primary" onclick="resetAll()" style="margin-left:8px">🔁 重学全部课程</button></div></div>';
    const wrong = finalExam.questions.map((q, i) => ({ q, i })).filter(x => quizResults['final_' + x.i] !== x.q.correct);
    if (wrong.length > 0) {
      html += '<div class="tip" style="margin-top:16px"><div class="label">📚 建议补强的知识点</div>';
      const topicMap = {
        0: '→ 复习「模块五：黑天鹅与极端斯坦」',
        1: '→ 复习「模块五：老木匠的散户生存智慧」',
        2: '→ 复习「模块六：达利欧经济机器与去杠杆」',
        3: '→ 复习「模块六：明斯基时刻与泡沫解剖」',
        4: '→ 复习「模块七：段永平的不懂不做」',
        5: '→ 复习「模块七：风控Agent一票否决权」',
        6: '→ 复习「模块七：个人投资检查清单」',
        7: '→ 复习「模块六：周金涛康波周期」'
      };
      wrong.forEach(w => { html += '<p>❌ 第' + (w.i + 1) + '题 ' + topicMap[w.i] + '</p>'; });
      html += '</div>';
    }
  }
  main.innerHTML = html;
  if (allAnswered) updateUI();
}

function answerFinal(qi, oi) {
  quizResults['final_' + qi] = oi;
  save();
  renderFinalExam(document.getElementById('mainContent'));
  updateUI();
}

function resetFinalExam() {
  finalExam.questions.forEach((_, i) => delete quizResults['final_' + i]);
  save(); updateUI();
  renderFinalExam(document.getElementById('mainContent'));
}

function resetAll() {
  localStorage.removeItem('master_finance_6_final_course_completed');
  localStorage.removeItem('master_finance_6_final_quiz_results');
  location.reload();
}

// ===== INIT =====
(function init() {
  currentSection = 'top10-principles';
  updateUI();
  renderContent('top10-principles');
})();

</script>
</body>
</html>
